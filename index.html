<body class="antialiased min-h-screen relative">

    <div class="ambient-bg">
        <div class="blob-1 animate-blob"></div>
        <div class="blob-2 animate-blob-reverse"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const formatTitleCase = (str) => {
            if (!str) return 'TL';
            return String(str).split(/[\s_-]+/).map(word => {
                if (!word) return '';
                return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
            }).join(' ');
        };

        const CustomSelect = ({ value, options, onChange, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [dropDirection, setDropDirection] = useState('down');
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                };
                if (isOpen) {
                    if (dropdownRef.current) {
                        const rect = dropdownRef.current.getBoundingClientRect();
                        const spaceBelow = window.innerHeight - rect.bottom;
                        const estimatedHeight = Object.keys(options).length * 40;
                        if (spaceBelow < estimatedHeight + 20 && rect.top > estimatedHeight + 20) {
                            setDropDirection('up');
                        } else {
                            setDropDirection('down');
                        }
                    }
                    document.addEventListener("mousedown", handleClickOutside);
                    if (dropdownRef.current) {
                        let el = dropdownRef.current;
                        while(el && el !== document.body) {
                            if (el.classList && (el.classList.contains('relative') || el.classList.contains('glass-card') || el.classList.contains('glass-surface'))) {
                                el.dataset.oldZ = el.style.zIndex || '';
                                el.style.zIndex = '99999';
                            }
                            el = el.parentElement;
                        }
                    }
                } else {
                    if (dropdownRef.current) {
                        let el = dropdownRef.current;
                        while(el && el !== document.body) {
                            if (el.dataset && el.dataset.oldZ !== undefined) {
                                el.style.zIndex = el.dataset.oldZ;
                                delete el.dataset.oldZ;
                            }
                            el = el.parentElement;
                        }
                    }
                }
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [isOpen]);

            return (
                <div ref={dropdownRef} className={`relative flex ${className}`} onClick={(e) => e.stopPropagation()}>
                    <div 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full h-full flex items-center justify-center cursor-pointer px-1 sm:px-2 text-[9px] sm:text-[10px] font-bold outline-none no-arrow hover:bg-white/5 transition-colors whitespace-nowrap"
                    >
                        {formatTitleCase(options[value] || value)}
                    </div>
                    {isOpen && (
                        <div className={`absolute right-0 min-w-[120px] w-max bg-zinc-900 border border-white/20 rounded-xl shadow-[0_0_40px_rgba(0,0,0,0.8)] z-[999999] overflow-hidden py-1.5 animate-fade-in-up ${dropDirection === 'up' ? 'bottom-[110%] mb-1' : 'top-[110%] mt-1'}`}>
                            {Object.entries(options).map(([key, label]) => (
                                <div 
                                    key={key}
                                    onClick={(e) => { e.stopPropagation(); onChange(key); setIsOpen(false); }}
                                    className={`px-4 py-2.5 text-[11px] font-bold text-center cursor-pointer transition-colors ${value === key ? 'bg-emerald-500/20 text-emerald-400' : 'text-zinc-300 hover:bg-white/10 hover:text-white'}`}
                                >
                                    {formatTitleCase(label)}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const PortfolioApp = () => {
            const [appState, setAppState] = useState('loading_vault');

            // Cihaza kayıtlı konfigürasyon (Sadece açılışta veya Bağla dendiğinde okunur/yazılır)
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });

            // Form için geçici konfigürasyon (Her tuşa basıldığında API isteği atılmasını engeller!)
            const [formConfig, setFormConfig] = useState(githubConfig);

            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1, STOCK: 1 });

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});
            const [expandedAssets, setExpandedAssets] = useState({});

            const [currencyLabels, setCurrencyLabels] = useState({ USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata', STOCK: 'Hisse' });
            const [portfolio, setPortfolio] = useState([]);

            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000);
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            const isInitialMount = React.useRef(true);
            const skipNextSave = React.useRef(true);

            useEffect(() => {
                if (isInitialMount.current) {
                    isInitialMount.current = false;
                    return;
                }
                if (appState === 'app' && vaultPassword && !isSaving) {
                    if (skipNextSave.current) {
                        skipNextSave.current = false;
                        return;
                    }
                    const handler = setTimeout(() => {
                        handleSaveToGithub(true);
                    }, 3000);
                    return () => clearTimeout(handler);
                }
            }, [portfolio, currencyLabels]);

            useEffect(() => {
                if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                    setAppState('setup_github');
                    return;
                }

                const initializeApp = async () => {
                    setAppState('loading_vault');
                    setAuthError(""); // Önceki hataları kesinlikle temizle
                    try {
                        const cleanUser = githubConfig.username.trim();
                        const cleanRepo = githubConfig.repo.trim();
                        const cleanToken = githubConfig.token.trim();
                        const timestamp = new Date().getTime();

                        const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                            headers: {
                                'Authorization': `Bearer ${cleanToken}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (response.status === 404) {
                            const repoCheck = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}?t=${timestamp}`, {
                                headers: { 'Authorization': `Bearer ${cleanToken}` }
                            });
                            if (repoCheck.status === 404) throw new Error("Depo bulunamadı! Ayarları ve depo adını kontrol edin.");
                            else if (!repoCheck.ok) throw new Error("GitHub erişim izni vermedi.");
                            setAppState('set_password');
                            return;
                        } else if (response.status === 401) {
                            throw new Error("Erişim reddedildi: Token geçersiz veya süresi dolmuş.");
                        } else if (response.ok) {
                            const data = await response.json();
                            setFileSha(data.sha);

                            const decodedContent = decodeURIComponent(escape(atob(data.content)));
                            if (!decodedContent || decodedContent === "[]") {
                                setAppState('set_password');
                                return;
                            }

                            const vaultData = JSON.parse(decodedContent);

                            if (vaultData.isEncrypted) {
                                const sessionStr = localStorage.getItem('vault_session_v4');
                                if (sessionStr) {
                                    try {
                                        const session = JSON.parse(sessionStr);
                                        if (session.expiry > new Date().getTime()) {
                                            const bytes = CryptoJS.AES.decrypt(vaultData.payload, session.password);
                                            const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                                            if (decryptedString) {
                                                const parsedData = JSON.parse(decryptedString);
                                                if (Array.isArray(parsedData)) {
                                                    setPortfolio(parsedData);
                                                } else {
                                                    setPortfolio(parsedData.portfolio || []);
                                                    if (parsedData.labels) {
                                                        const lbls = parsedData.labels;
                                                        if (!lbls.STOCK) lbls.STOCK = 'Hisse';
                                                        setCurrencyLabels(lbls);
                                                    }
                                                }
                                                setVaultPassword(session.password);
                                                setVaultSession(session.password);
                                                setAuthError(""); // Başarılı girişte hata temizlenir
                                                setAppState('app');
                                                const expandedInit = {};
                                                (Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || [])).forEach(p => expandedInit[p.id] = true);
                                                setExpandedPersons(expandedInit);
                                                return;
                                            }
                                        } else { clearVaultSession(); }
                                    } catch (e) { clearVaultSession(); }
                                }
                                setAuthError(""); // Kasaya giriş ekranına geçerken de sıfırla
                                setAppState('enter_password');
                                sessionStorage.setItem('locked_vault', vaultData.payload);
                            } else {
                                if (Array.isArray(vaultData)) {
                                    setPortfolio(vaultData);
                                } else {
                                    setPortfolio(vaultData.portfolio || []);
                                    if (vaultData.labels) {
                                        const lbls = vaultData.labels;
                                        if (!lbls.STOCK) lbls.STOCK = 'Hisse';
                                        setCurrencyLabels(lbls);
                                    }
                                }
                                setAppState('app');
                                const expandedInit = {};
                                (Array.isArray(vaultData) ? vaultData : (vaultData.portfolio || [])).forEach(p => expandedInit[p.id] = true);
                                setExpandedPersons(expandedInit);
                            }
                        }
                    } catch (error) {
                        setAuthError(error.message);
                        setAppState('setup_github');
                    }
                };
                initializeApp();
                // githubConfig dependency'si artık sadece localStorage değiştiğinde (reload) güvenli tetiklenecek.
            }, [githubConfig]);

            const unlockVault = (e) => {
                e.preventDefault();
                setAuthError("");
                const encryptedPayload = sessionStorage.getItem('locked_vault');
                if (!encryptedPayload) { setAuthError("Kriptolu veri bulunamadı."); return; }
                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedPayload, passwordInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decryptedString) throw new Error("Yanlış şifre");
                    const parsedData = JSON.parse(decryptedString);
                    if (Array.isArray(parsedData)) {
                        setPortfolio(parsedData);
                    } else {
                        setPortfolio(parsedData.portfolio || []);
                        if (parsedData.labels) setCurrencyLabels(parsedData.labels);
                    }
                    setVaultPassword(passwordInput);
                    setVaultSession(passwordInput);
                    sessionStorage.removeItem('locked_vault');
                    setAppState('app');

                    const expandedInit = {};
                    (Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || [])).forEach(p => expandedInit[p.id] = true);
                    setExpandedPersons(expandedInit);
                } catch (error) {
                    setAuthError("Hatalı Şifre!");
                    setPasswordInput("");
                }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput);
                setPortfolio([]);
                setAppState('app');
            };

            const handleSaveToGithub = async (isAutoSave = false) => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify({ portfolio, labels: currencyLabels });
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));

                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${githubConfig.token.trim()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: isAutoSave ? "🤖 Oto-Kayıt" : "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword);
                        if (!isAutoSave) showToast("Kasa başarıyla senkronize edildi", "success");
                        setTimeout(() => setIsSaving(false), 800);
                    } else { throw new Error("Kayıt reddedildi."); }
                } catch (error) {
                    if (!isAutoSave) showToast("Kayıt Hatası! İnternet bağlantınızı veya ayarlarınızı kontrol edin.", "error");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = {
                    username: formConfig.username.trim(),
                    repo: formConfig.repo.trim(),
                    token: formConfig.token.trim()
                };
                localStorage.setItem('gh_config_v3', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword("");
                setPortfolio([]);
                clearVaultSession();
                setAppState('enter_password');
                window.location.reload();
            };

            const fetchLiveRates = async () => {
                try {
                    setIsLoadingRates(true);
                    let updateMessage = "Piyasa başarıyla güncellendi.";
                    let isError = false;

                    // 1. Döviz ve Altın Çekimi (Orjinal)
                    try {
                        const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                        const data = await response.json();
                        const usdTry = data.usd.try;
                        let gramTry = rates.GRAM, ataTry = rates.ATA;

                        if (data.usd.xau) {
                            const xauUsd = 1 / data.usd.xau;
                            const spotGramGoldUsd = xauUsd / 31.1034768;
                            const spotGramGoldTry = spotGramGoldUsd * usdTry;
                            const physicalPremium = 1.045;
                            gramTry = spotGramGoldTry * physicalPremium;
                            ataTry = gramTry * 6.88;
                        }
                        setRates(prev => ({
                            ...prev,
                            USD: parseFloat(usdTry.toFixed(2)), EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                            GRAM: parseFloat(gramTry.toFixed(2)), ATA: parseFloat(ataTry.toFixed(2))
                        }));
                    } catch (currencyErr) {
                        console.error("Döviz fiyat çekme hatası", currencyErr);
                        updateMessage = "Döviz fiyatları alınamadı. Sadece hisseler deneniyor.";
                        isError = true;
                    }

                    // 2. Hisse Senetleri Çekimi
                    const stockTickers = new Set();
                    portfolio.forEach(p => p.assets.forEach(a => {
                        if (a.subItems && a.subItems.length > 0) {
                            a.subItems.forEach(s => { 
                                if (s.type === 'STOCK' && s.name) stockTickers.add(s.name.trim().split(' ')[0].toUpperCase()); 
                            });
                        } else {
                            if (a.type === 'STOCK' && a.name) stockTickers.add(a.name.trim().split(' ')[0].toUpperCase());
                        }
                    }));

                    const priceMap = {};
                    let stockUpdated = false;

                    if (stockTickers.size > 0) {
                        await Promise.allSettled(Array.from(stockTickers).map(async (ticker) => {
                            try {
                                const symbol = ticker.includes('.') ? ticker : `${ticker}.IS`;
                                const url = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}`;
                                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                                
                                const res = await fetch(proxyUrl);
                                if (!res.ok) throw new Error("Yahoo/Proxy erişimi başarısız");
                                const json = await res.json();
                                
                                const price = json.chart?.result?.[0]?.meta?.regularMarketPrice;
                                if (price) {
                                    priceMap[ticker] = price;
                                    stockUpdated = true;
                                }
                            } catch (e) {
                                console.warn(`${ticker} hisse fiyatı alınamadı.`, e);
                            }
                        }));

                        if (stockUpdated) {
                            setPortfolio(prev => prev.map(p => ({
                                ...p,
                                assets: p.assets.map(a => {
                                    if (a.subItems && a.subItems.length > 0) {
                                        return {
                                            ...a,
                                            subItems: a.subItems.map(s => {
                                                if (s.type === 'STOCK' && s.name) {
                                                    const t = s.name.trim().split(' ')[0].toUpperCase();
                                                    if (priceMap[t]) return { ...s, currentPrice: priceMap[t] };
                                                }
                                                return s;
                                            })
                                        };
                                    } else {
                                        if (a.type === 'STOCK' && a.name) {
                                            const t = a.name.trim().split(' ')[0].toUpperCase();
                                            if (priceMap[t]) return { ...a, currentPrice: priceMap[t] };
                                        }
                                        return a;
                                    }
                                })
                            })));
                            updateMessage = isError ? "Döviz alınamadı ama hisseler güncellendi." : "Tüm piyasa fiyatları güncellendi.";
                            isError = false; // Stock worked, so overall it's somewhat a success
                        } else {
                            updateMessage = isError ? "Bağlantı sorunu! Fiyatlar yenilenemedi." : "Döviz güncellendi ama hisselere ulaşılamadı.";
                            if(!isError) isError = true; // Downgrade to warning
                        }
                    }

                    showToast(updateMessage, isError ? "error" : "success");

                } catch (err) { 
                    console.error("Fiyat çekme hatası", err); 
                    showToast("Piyasa güncellenirken kritik hata oluştu.", "error");
                } finally { 
                    setIsLoadingRates(false); 
                }
            };

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };

            const safeParseNum = (val) => {
                if (val === "" || val === null || val === undefined) return 0;
                // Virgülleri noktaya çevir ki ondalık değerler doğru hesaplansın
                const num = typeof val === 'string' ? parseFloat(val.replace(',', '.')) : parseFloat(val);
                return isNaN(num) ? 0 : num;
            };

            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => {
                        const rate = sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0) : (rates[sub.type] || 1);
                        return total + (safeParseNum(sub.amount) * rate);
                    }, 0);
                }
                const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                return safeParseNum(asset.amount) * rate;
            };

            const calculatePnL = (amount, rate, costPrice, type, currentPrice) => {
                const cost = safeParseNum(costPrice);
                const qty = safeParseNum(amount);
                
                // Hisse senediyse o anki güncel fiyatı kullan, yoksa döviz kurunu kullan
                const activeRate = type === 'STOCK' ? (safeParseNum(currentPrice) || cost) : rate;

                // Maliyet veya adet 0 ise hesaplama yapma
                if (cost <= 0 || qty <= 0) return null;
                
                const currentTotal = qty * activeRate;
                const costTotal = qty * cost; 
                const profit = currentTotal - costTotal;
                const percentage = costTotal > 0 ? (profit / costTotal) * 100 : 0;
                
                return { profit, percentage, isProfit: profit > 0, isZero: profit === 0 };
            };

            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => total + calculateAssetValue(asset), 0);
            const grandTotal = useMemo(() => portfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [portfolio, rates]);

            const calculateDistribution = () => {
                const totals = { TRY: 0, USD: 0, EUR: 0, GRAM: 0, ATA: 0, STOCK: 0 };
                portfolio.forEach(person => {
                    person.assets.forEach(asset => {
                        if (asset.subItems && asset.subItems.length > 0) {
                            asset.subItems.forEach(sub => {
                                if (sub.type === 'STOCK') {
                                    // Hisse senedinin o anki TL karşılığını totals'a ekle
                                    totals.STOCK = (totals.STOCK || 0) + (safeParseNum(sub.amount) * (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0));
                                } else {
                                    totals[sub.type] = (totals[sub.type] || 0) + safeParseNum(sub.amount);
                                }
                            });
                        } else {
                            if (asset.type === 'STOCK') {
                                totals.STOCK = (totals.STOCK || 0) + (safeParseNum(asset.amount) * (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0));
                            } else {
                                totals[asset.type] = (totals[asset.type] || 0) + safeParseNum(asset.amount);
                            }
                        }
                    });
                });
                
                const tryEquivalent = {
                    TRY: totals.TRY, USD: totals.USD * rates.USD, EUR: totals.EUR * rates.EUR,
                    GRAM: totals.GRAM * rates.GRAM, ATA: totals.ATA * rates.ATA, 
                    STOCK: totals.STOCK // STOCK zaten TL değeri olarak hesaplandı
                };
                
                if (grandTotal === 0) return [];
                
                return Object.keys(tryEquivalent)
                    .filter(key => tryEquivalent[key] > 0)
                    .map(key => ({
                        type: key,
                        label: currencyLabels[key] || key,
                        percentage: ((tryEquivalent[key] / grandTotal) * 100).toFixed(1)
                    }))
                    .sort((a, b) => b.percentage - a.percentage);
            };
            const distribution = calculateDistribution();

            const formatMoney = (value) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value) + " ₺";

            const togglePersonAccordion = (personId) => setExpandedPersons(prev => ({ ...prev, [personId]: !prev[personId] }));
            const toggleAssetAccordion = (assetId) => setExpandedAssets(prev => ({ ...prev, [assetId]: !prev[assetId] }));
            const updatePersonName = (personId, newName) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, person: newName } : p));
            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? updater(asset) : asset) } : person));

            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    let currentAmount = asset.amount;
                    if (subItems.length === 0 && safeParseNum(asset.amount) > 0) {
                        subItems.push({ id: `sub-main-${Date.now()}`, name: 'Ana Bakiye', type: asset.type, amount: asset.amount, costPrice: asset.costPrice || '', currentPrice: asset.currentPrice || '' });
                        currentAmount = "";
                    }
                    subItems.push({ id: `sub-${Date.now() + 1}`, name: '', type: asset.type === 'STOCK' ? 'STOCK' : 'TRY', amount: '', costPrice: '', currentPrice: '' });
                    return { ...asset, amount: currentAmount, subItems };
                });
            };

            const removeSubItem = (personId, assetId, subItemId) => {
                if (window.confirm("Bu alt kalemi silmek istediğinize emin misiniz?")) {
                    updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== subItemId) }));
                }
            };
            const updateSubItem = (personId, assetId, subItemId, field, value) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.map(sub => sub.id === subItemId ? { ...sub, [field]: value } : sub) }));
            const addAsset = (personId) => {
                const newId = `asset-${Date.now()}`;
                setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: [...person.assets, { id: newId, name: '', type: 'TRY', amount: '', costPrice: '', currentPrice: '', subItems: [] }] } : person));
                setExpandedAssets(prev => ({ ...prev, [newId]: true }));
            };
            const removeAsset = (e, personId, assetId) => {
                e.stopPropagation();
                if (window.confirm("Bu varlığı kalıcı olarak silmek istediğinize emin misiniz?")) {
                    setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.filter(a => a.id !== assetId) } : person));
                }
            };

            const removePerson = (e, personId) => {
                e.preventDefault();
                e.stopPropagation(); // Olası tüm sıçramaları kes

                const isConfirmed = window.confirm("Bu kişiyi ve tüm varlıklarını silmek istediğine emin misin?");
                if (isConfirmed) {
                    setPortfolio(prev => prev.filter(p => p.id !== personId));
                    setExpandedPersons(prev => {
                        const newState = { ...prev };
                        delete newState[personId];
                        return newState;
                    });
                }
            };

            const addNewPerson = () => {
                const newId = `person-${Date.now()}`;
                setPortfolio(prev => [...prev, { id: newId, person: '', assets: [] }]);
                setExpandedPersons(prev => ({ ...prev, [newId]: true }));
            };

            if (appState === 'loading_vault') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-4">
                        <i className="fa-solid fa-vault text-primary text-5xl animate-float opacity-80"></i>
                        <p className="text-emerald-300 font-semibold tracking-widest uppercase text-xs animate-pulse opacity-70">Bağlanıyor</p>
                    </div>
                );
            }

            if (appState === 'setup_github' || appState === 'set_password' || appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card p-8 sm:p-10 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up premium-border">
                            {appState === 'setup_github' && (
                                <form onSubmit={saveGithubConfig} className="flex flex-col gap-5">
                                    <div className="text-center mb-4">
                                        <i className="fa-brands fa-github text-5xl text-white mb-4 opacity-90"></i>
                                        <h3 className="text-2xl font-bold text-white tracking-tight">Kasa Erişimi</h3>
                                        <p className="text-xs text-zinc-400 mt-2">Private Repository bilgilerini girin.</p>
                                    </div>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="text" value={formConfig.username} onChange={e => setFormConfig({ ...formConfig, username: e.target.value })} placeholder="GitHub Kullanıcı Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <input required type="text" value={formConfig.repo} onChange={e => setFormConfig({ ...formConfig, repo: e.target.value })} placeholder="Depo Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <input required type="password" value={formConfig.token} onChange={e => setFormConfig({ ...formConfig, token: e.target.value })} placeholder="Erişim Token (PAT)" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <button type="submit" className="mt-2 py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">BAĞLA</button>
                                </form>
                            )}
                            {appState === 'set_password' && (
                                <form onSubmit={setupNewVault} className="flex flex-col gap-6 text-center">
                                    <i className="fa-solid fa-shield-halved text-5xl text-emerald-400 mb-2 opacity-90 animate-pulse"></i>
                                    <div>
                                        <h3 className="text-2xl font-bold text-white mb-2">Şifre Oluştur</h3>
                                        <p className="text-xs text-zinc-400">Verileriniz bu şifreyle saklanacak.</p>
                                    </div>
                                    {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] font-bold focus:border-primary/50" />
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg active:scale-95 transition-all">BAŞLAT</button>
                                </form>
                            )}
                            {appState === 'enter_password' && (
                                <form onSubmit={unlockVault} className="flex flex-col gap-6 text-center">
                                    <i className="fa-solid fa-lock text-5xl text-white opacity-80 mb-2"></i>
                                    <h3 className="text-2xl font-bold text-white">Kasaya Giriş</h3>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="······" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] focus:border-primary/50 font-bold" />
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-white text-black shadow-lg active:scale-95 transition-all">KİLİDİ AÇ</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="mx-auto w-full max-w-[95%] xl:max-w-6xl pt-6 pb-20 relative z-10 animate-fade-in-up">
                    
                    {/* Toast Notification */}
                    <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ease-out flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl premium-border backdrop-blur-xl ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-8 pointer-events-none'} ${toast.type === 'error' ? 'bg-red-500/20 border-red-500/30' : 'bg-emerald-500/20 border-emerald-500/30'}`}>
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${toast.type === 'error' ? 'bg-red-500/30 text-red-200' : 'bg-emerald-500/30 text-emerald-300'}`}>
                            <i className={`fa-solid text-[10px] ${toast.type === 'error' ? 'fa-triangle-exclamation' : 'fa-check'}`}></i>
                        </div>
                        <p className={`font-bold text-xs tracking-wide ${toast.type === 'error' ? 'text-red-100' : 'text-emerald-50'}`}>{toast.message}</p>
                    </div>

                    {/* Header */}
                    <header className="flex justify-between items-center pb-5 mb-8 border-b border-white/5">
                        <button onClick={lockVault} className="w-10 h-10 rounded-full glass-surface flex items-center justify-center text-zinc-400 hover:text-red-400 hover:bg-red-500/10 transition-colors border border-transparent hover:border-red-500/30">
                            <i className="fa-solid fa-lock text-sm"></i>
                        </button>
                        <div className="flex flex-col items-center">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center mb-2 shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                                <i className="fa-solid fa-shield-halved text-black text-lg"></i>
                            </div>
                            <h1 className="text-[10px] font-bold tracking-widest text-zinc-300 uppercase">Portföy Takip</h1>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-3">
                            <span className={`text-[9px] sm:text-[10px] uppercase font-bold tracking-widest transition-opacity duration-300 flex items-center gap-1.5 ${isSaving ? 'opacity-100 text-emerald-400' : 'opacity-0'}`}>
                                <i className="fa-solid fa-cloud-arrow-up animate-bounce"></i> <span className="hidden sm:inline">Eşitleniyor...</span>
                            </span>
                            <button onClick={() => handleSaveToGithub(false)} disabled={isSaving} className={`flex items-center gap-2 font-bold text-[10px] sm:text-xs px-4 py-2.5 rounded-xl transition-all ${isSaving ? 'bg-primary text-black' : 'glass-surface text-primary border border-primary/30 hover:bg-primary/10'}`}>
                                <i className={`fa-solid ${isSaving ? 'fa-check' : 'fa-cloud-arrow-up'} text-sm`}></i>
                                <span className="hidden sm:inline">{isSaving ? 'KAYDEDİLDİ' : 'KAYDET'}</span>
                            </button>
                        </div>
                    </header>

                    {/* Total Balance */}
                    <div className="text-center py-4 mb-8 flex flex-col items-center px-2">
                        <div className="glass-surface px-4 py-2 rounded-full border border-white/10 inline-flex items-center gap-2 mb-3">
                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                            <p className="text-[10px] text-zinc-200 font-semibold tracking-widest uppercase">Toplam Varlık</p>
                        </div>
                        <h2 className="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-white via-zinc-200 to-emerald-800 font-numbers break-words max-w-full">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    {/* Market Rates Grid */}
                    <div className="mb-10 glass-card p-4 sm:p-5 rounded-3xl max-w-2xl mx-auto premium-border">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <p className="text-[10px] font-bold text-zinc-300 uppercase tracking-wider flex items-center gap-1.5">
                                <i className="fa-solid fa-chart-line text-emerald-400"></i> Piyasa
                            </p>
                            <button onClick={fetchLiveRates} disabled={isLoadingRates} className="text-[9px] text-emerald-300 hover:text-emerald-200 uppercase font-bold tracking-wider flex items-center gap-1.5 glass-surface px-2.5 py-1.5 rounded-lg transition-colors hover:bg-white/5">
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin" : ""}`}></i> Yenile
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                            {['TRY', 'USD', 'EUR', 'GRAM', 'ATA'].map(currency => (
                                <div key={currency} className="glass-surface p-3 rounded-xl flex flex-col items-center border border-transparent hover:border-white/10 transition-colors">
                                    <textarea
                                        rows={1}
                                        value={currencyLabels[currency] || currency}
                                        onChange={(e) => setCurrencyLabels(prev => ({ ...prev, [currency]: e.target.value }))}
                                        onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                        className="text-[8px] sm:text-[9px] text-zinc-400 font-bold tracking-widest mb-1 uppercase bg-transparent text-center outline-none hover:text-white transition-colors w-full border-b border-transparent focus:border-white/20 resize-none overflow-hidden"
                                        style={{ minHeight: '16px' }}
                                        title="İsmi Değiştir"
                                    />
                                    <input
                                        type="number"
                                        value={rates[currency]}
                                        disabled={currency === 'TRY'}
                                        onChange={(e) => handleRateChange(currency, e.target.value)}
                                        className={`w-full text-base sm:text-lg font-bold font-numbers outline-none bg-transparent text-center px-0 ${['GRAM', 'ATA'].includes(currency) ? 'text-emerald-400' : 'text-white'} ${currency === 'TRY' ? 'opacity-50' : ''}`}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Asset Distribution Summary */}
                    {distribution.length > 0 && (
                        <div className="mb-10 max-w-3xl mx-auto flex flex-wrap justify-center gap-3 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                            {distribution.map(dist => (
                                <div key={dist.type} className="glass-surface px-4 py-2.5 rounded-2xl flex items-center gap-2.5 border border-transparent hover:border-white/10 transition-colors cursor-default">
                                    <div className={`w-2 h-2 rounded-full ${dist.type === 'TRY' ? 'bg-zinc-400' : dist.type === 'USD' ? 'bg-green-400' : dist.type === 'EUR' ? 'bg-blue-400' : dist.type === 'STOCK' ? 'bg-purple-400' : 'bg-yellow-400'}`}></div>
                                    <span className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">{dist.label}</span>
                                    <span className="text-xs font-black text-white font-numbers">%{dist.percentage}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Portfolios Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 items-start">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = expandedPersons[person.id] !== false;

                            return (
                                <div key={person.id} className={`glass-card rounded-[2rem] transition-all duration-300 premium-border z-10 ${isOpen ? 'shadow-2xl border-white/10' : 'hover:border-white/10 shadow-lg'}`}>

                                    {/* Card Header (Person Name & Total) */}
                                    <div onClick={() => togglePersonAccordion(person.id)} className={`p-5 sm:p-6 flex justify-between items-center cursor-pointer transition-colors ${isOpen ? 'bg-white/5 rounded-t-[2rem]' : 'rounded-[2rem]'}`}>
                                        <div className="flex flex-col flex-1 min-w-0 pr-3">
                                            <textarea
                                                rows={1}
                                                value={person.person}
                                                onChange={(e) => updatePersonName(person.id, e.target.value)}
                                                onClick={(e) => e.stopPropagation()}
                                                onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                                className="bg-transparent text-lg sm:text-xl font-bold text-white uppercase tracking-wide w-full outline-none resize-none overflow-hidden flex-1 pb-0.5"
                                                style={{ minHeight: '28px' }}
                                                placeholder="İSİM GİRİNİZ"
                                            />
                                            <div className="flex items-center gap-1.5 mt-0.5 pl-0.5">
                                                <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                                                <p className="text-[9px] text-zinc-400 font-semibold uppercase tracking-widest">{person.assets.length} Varlık</p>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-2 sm:gap-3 shrink-0">
                                            <span className="text-sm sm:text-base font-bold font-numbers text-white">{formatMoney(personTotal)}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ${isOpen ? 'bg-white text-black rotate-180' : 'glass-surface text-zinc-400'}`}>
                                                <i className="fa-solid fa-chevron-down text-xs"></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Card Content (Assets) */}
                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-white/5">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);
                                                const isAssetOpen = expandedAssets[asset.id];

                                                return (
                                                    <div key={asset.id} className="glass-surface rounded-2xl border border-transparent hover:border-white/10 transition-all flex flex-col">

                                                        {/* Asset Header (Accordion Toggle) */}
                                                        <div onClick={() => toggleAssetAccordion(asset.id)} className="p-4 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded-t-2xl transition-colors group">
                                                            <div className="flex items-center gap-2 flex-1 min-w-0 pr-2">
                                                                <div className={`w-7 h-7 rounded-full bg-black/30 flex items-center justify-center shrink-0 transition-colors ${asset.type === 'STOCK' ? 'group-hover:bg-purple-500/20' : 'group-hover:bg-emerald-500/20'}`}>
                                                                    <i className={`fa-solid ${asset.type === 'STOCK' ? 'fa-chart-line text-purple-400' : 'fa-wallet text-zinc-400 group-hover:text-emerald-400'} text-[10px]`}></i>
                                                                </div>
                                                                <textarea
                                                                    rows={1}
                                                                    value={asset.name}
                                                                    onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: e.target.value.toUpperCase() }))}
                                                                    onClick={(e) => e.stopPropagation()}
                                                                    onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                                                    title={asset.name}
                                                                    className="flex-1 min-w-0 bg-transparent font-bold text-white text-xs sm:text-sm outline-none placeholder:text-zinc-500 resize-none overflow-hidden uppercase"
                                                                    style={{ minHeight: '20px', paddingTop: '2px' }}
                                                                    placeholder={asset.type === 'STOCK' ? "HİSSE KODU (Örn: THYAO)" : "KURUM / VARLIK ADI"}
                                                                />
                                                            </div>
                                                            <div className="flex items-center gap-3 shrink-0">
                                                                <div className="text-right">
                                                                    <span className="text-sm font-bold font-numbers text-emerald-400">{formatMoney(assetValue)}</span>
                                                                    {hasSubItems && !isAssetOpen && <div className="text-[9px] text-zinc-500 font-semibold tracking-widest uppercase mt-0.5">{asset.subItems.length} Kalem</div>}
                                                                </div>
                                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ${isAssetOpen ? 'bg-white/20 text-white rotate-180' : 'text-zinc-500 group-hover:bg-white/10'}`}>
                                                                    <i className="fa-solid fa-chevron-down text-[10px]"></i>
                                                                </div>
                                                                <button onClick={(e) => removeAsset(e, person.id, asset.id)} className="text-zinc-500 hover:text-red-400 opacity-60 hover:opacity-100 p-1.5 rounded-lg z-20 relative ml-1 transition-colors"><i className="fa-solid fa-trash text-[11px]"></i></button>
                                                            </div>
                                                        </div>

                                                        {/* Collapsible Content */}
                                                        <div className={`accordion-content ${isAssetOpen ? 'open' : ''}`}>
                                                            <div className="p-4 pt-1 flex flex-col gap-4 border-t border-white/5">

                                                                <div className="flex flex-col gap-3">
                                                                    {!hasSubItems ? (
                                                                        <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                            <div className="flex bg-black/40 border border-white/10 rounded-xl focus-within:border-emerald-500/50 transition-colors w-full relative">
                                                                                <input
                                                                                    type="number"
                                                                                    value={asset.amount}
                                                                                    onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, amount: e.target.value }))}
                                                                                    className={`min-w-0 bg-transparent text-white font-numbers font-bold text-sm py-2.5 px-3 outline-none ${asset.type === 'STOCK' ? 'flex-[1.5]' : 'flex-[2]'}`}
                                                                                    placeholder={asset.type === 'STOCK' ? 'Adet' : 'Miktar'}
                                                                                />
                                                                                <div className="w-[1px] bg-white/10"></div>
                                                                                <input
                                                                                    type="number"
                                                                                    value={asset.costPrice || ''}
                                                                                    onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, costPrice: e.target.value }))}
                                                                                    className={`min-w-0 bg-transparent text-emerald-100 font-numbers font-bold text-sm py-2.5 px-3 outline-none ${asset.type === 'STOCK' ? 'flex-[1.5]' : 'border-r border-white/10 flex-[2]'}`}
                                                                                    placeholder="Maliyet ₺"
                                                                                    disabled={asset.type === 'TRY'}
                                                                                    title="Birim Maliyet (₺)"
                                                                                />
                                                                                {asset.type === 'STOCK' && (
                                                                                    <React.Fragment>
                                                                                        <div className="w-[1px] bg-white/10"></div>
                                                                                        <input
                                                                                            type="number"
                                                                                            value={asset.currentPrice || ''}
                                                                                            onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, currentPrice: e.target.value }))}
                                                                                            className="flex-[1.5] min-w-0 bg-transparent text-blue-200 font-numbers font-bold text-sm py-2.5 px-3 outline-none border-r border-white/10"
                                                                                            placeholder="Anlık ₺"
                                                                                            title="Anlık Fiyat (₺)"
                                                                                        />
                                                                                    </React.Fragment>
                                                                                )}
                                                                                <CustomSelect
                                                                                    value={asset.type}
                                                                                    options={currencyLabels}
                                                                                    onChange={(newVal) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, type: newVal }))}
                                                                                    className="flex-1 bg-black/30 text-zinc-300"
                                                                                />
                                                                            </div>
                                                                            {asset.costPrice && asset.type !== 'TRY' && (() => {
                                                                                const pnl = calculatePnL(asset.amount, rates[asset.type], asset.costPrice, asset.type, asset.currentPrice);
                                                                                if (!pnl) return null;
                                                                                return (
                                                                                    <div className="flex justify-end pr-1 mt-1">
                                                                                        <span className={`text-[10px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isZero ? 'bg-zinc-500/20 text-zinc-400' : pnl.isProfit ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                            {pnl.isProfit && !pnl.isZero ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                        </span>
                                                                                    </div>
                                                                                );
                                                                            })()}
                                                                        </div>
                                                                    ) : (
                                                                        <div className="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-2 rounded-xl w-fit">
                                                                            <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                                                            <span className="text-[9px] font-bold text-emerald-300 tracking-widest uppercase">Alt Kalemler Aktif</span>
                                                                        </div>
                                                                    )}

                                                                    <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-zinc-300 hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 glass-surface px-4 py-2.5 rounded-xl transition-colors hover:bg-white/5 border border-transparent hover:border-white/10">
                                                                        <i className="fa-solid fa-plus text-[9px]"></i> Kalem Ekle
                                                                    </button>
                                                                </div>

                                                                {hasSubItems && (
                                                                    <div className="flex flex-col gap-2 pl-2 border-l-2 border-white/10 ml-2 mt-1">
                                                                        {asset.subItems.map((sub) => (
                                                                            <div key={sub.id} className="flex flex-col gap-2 bg-black/20 p-2.5 rounded-xl border border-white/5 relative">
                                                                                <div className="flex items-center justify-between gap-2">
                                                                                    <input
                                                                                        type="text"
                                                                                        value={sub.name}
                                                                                        onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'name', e.target.value.toUpperCase())}
                                                                                        className="bg-transparent py-1 px-1 rounded-md text-xs font-semibold text-zinc-200 outline-none flex-1 min-w-0 placeholder:text-zinc-600 focus:bg-white/5 transition-colors uppercase"
                                                                                        placeholder={sub.type === 'STOCK' ? "HİSSE KODU (Örn: EREGL)" : "Kalem Adı"}
                                                                                        title={sub.name}
                                                                                    />
                                                                                    <button onClick={(e) => { e.stopPropagation(); removeSubItem(person.id, asset.id, sub.id); }} className="text-zinc-500 hover:text-red-400 p-1.5 rounded-md transition-colors"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                                                                </div>

                                                                                <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                                    <div className="flex glass-surface border border-white/10 rounded-lg focus-within:border-white/30 transition-colors w-full relative">
                                                                                        <input
                                                                                            type="number"
                                                                                            value={sub.amount}
                                                                                            onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'amount', e.target.value)}
                                                                                            className={`min-w-0 bg-transparent text-white font-numbers font-bold text-xs py-2 px-3 outline-none ${sub.type === 'STOCK' ? 'flex-[1.5]' : 'flex-[2]'}`}
                                                                                            placeholder={sub.type === 'STOCK' ? 'Adet' : 'Miktar'}
                                                                                        />
                                                                                        <div className="w-[1px] bg-white/10"></div>
                                                                                        <input
                                                                                            type="number"
                                                                                            value={sub.costPrice || ''}
                                                                                            onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'costPrice', e.target.value)}
                                                                                            className={`min-w-0 bg-transparent text-emerald-100 font-numbers font-bold text-xs py-2 px-3 outline-none ${sub.type === 'STOCK' ? 'flex-[1.5]' : 'border-r border-white/10 flex-[2]'}`}
                                                                                            placeholder="Maliyet ₺"
                                                                                            disabled={sub.type === 'TRY'}
                                                                                            title="Birim Maliyet (₺)"
                                                                                        />
                                                                                        {sub.type === 'STOCK' && (
                                                                                            <React.Fragment>
                                                                                                <div className="w-[1px] bg-white/10"></div>
                                                                                                <input
                                                                                                    type="number"
                                                                                                    value={sub.currentPrice || ''}
                                                                                                    onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'currentPrice', e.target.value)}
                                                                                                    className="flex-[1.5] min-w-0 bg-transparent text-blue-200 font-numbers font-bold text-xs py-2 px-3 outline-none border-r border-white/10"
                                                                                                    placeholder="Anlık ₺"
                                                                                                    title="Anlık Fiyat (₺)"
                                                                                                />
                                                                                            </React.Fragment>
                                                                                        )}
                                                                                        <CustomSelect
                                                                                            value={sub.type}
                                                                                            options={currencyLabels}
                                                                                            onChange={(newVal) => updateSubItem(person.id, asset.id, sub.id, 'type', newVal)}
                                                                                            className="flex-1 bg-black/30 text-white"
                                                                                        />
                                                                                    </div>
                                                                                    {sub.costPrice && sub.type !== 'TRY' && (() => {
                                                                                        const pnl = calculatePnL(sub.amount, rates[sub.type], sub.costPrice, sub.type, sub.currentPrice);
                                                                                        if (!pnl) return null;
                                                                                        return (
                                                                                            <div className="flex justify-end pr-1 mt-1">
                                                                                                <span className={`text-[9.5px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isZero ? 'bg-zinc-500/20 text-zinc-400' : pnl.isProfit ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                                    {pnl.isProfit && !pnl.isZero ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                                </span>
                                                                                            </div>
                                                                                        );
                                                                                    })()}
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {/* Footer Actions (New Asset & Delete Person) */}
                                            <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-white/5 mt-2 relative z-50">
                                                <button onClick={(e) => removePerson(e, person.id)} className="text-[10px] text-zinc-400 hover:text-red-400 font-bold uppercase tracking-widest px-5 py-3.5 glass-surface rounded-xl transition-all hover:bg-red-500/10 hover:border-red-500/30 shrink-0 z-50 relative cursor-pointer flex items-center justify-center">
                                                    KİŞİYİ SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-500 hover:text-black transition-all shadow-sm">
                                                    + YENİ VARLIK
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Add New Person Button */}
                        <div className="pt-2 pb-10">
                            <button onClick={addNewPerson} className="w-full py-10 border border-dashed border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-white/5 group">
                                <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                    <i className="fa-solid fa-plus text-lg"></i>
                                </div>
                                YENİ PORTFÖY
                            </button>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>

</html>
