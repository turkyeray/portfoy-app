<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portföy Yönetim</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#040608',
                        primary: '#10b981',
                        primary_dark: '#059669',
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 12s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate',
                        'blob-reverse': 'blob 16s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate-reverse',
                        'float': 'float 6s ease-in-out infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)', opacity: 0.4 },
                            '33%': { transform: 'translate(40px, -60px) scale(1.1)', opacity: 0.6 },
                            '66%': { transform: 'translate(-30px, 30px) scale(0.9)', opacity: 0.3 },
                            '100%': { transform: 'translate(0px, 0px) scale(1)', opacity: 0.4 }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-8px)' }
                        },
                        fadeInUp: {
                            '0%': { opacity: 0, transform: 'translateY(20px) scale(0.98)' },
                            '100%': { opacity: 1, transform: 'translateY(0) scale(1)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');

        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #040608; 
            color: #ffffff; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }

        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -10;
            background: linear-gradient(to bottom right, rgba(16, 185, 129, 0.03), transparent 70%);
        }
        
        .blob-1 { position: absolute; top: -10%; left: -5%; width: 55vw; height: 55vw; background: radial-gradient(circle, rgba(16,185,129,0.08) 0%, transparent 60%); border-radius: 50%; filter: blur(90px); }
        .blob-2 { position: absolute; bottom: -15%; right: -5%; width: 65vw; height: 65vw; background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 60%); border-radius: 50%; filter: blur(100px); }

        .glass-card {
            background: rgba(18, 24, 34, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .glass-surface {
            background: rgba(30, 40, 54, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }

        .premium-border {
            position: relative;
            z-index: 1;
        }
        
        .premium-border::before {
            content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(135deg, rgba(16,185,129,0.4), rgba(59,130,246,0.1));
            border-radius: inherit; z-index: -1; opacity: 0; transition: opacity 0.4s ease;
        }
        
        .premium-border:hover::before { opacity: 1; }

        input[type="number"], input[type="text"], input[type="password"], select { font-size: 14px !important; background: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, transform 0.3s ease;
            max-height: 0; opacity: 0; overflow: hidden; transform: translateY(-10px);
            position: relative; z-index: 10;
        }
        .accordion-content.open {
            max-height: 8000px; opacity: 1; transform: translateY(0);
        }

        .stealth-input {
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .stealth-input:focus {
            border-bottom: 2px solid #10b981; outline: none; text-shadow: 0 0 10px rgba(16,185,129,0.3);
        }

        .no-arrow {
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
        }

        .font-numbers { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="antialiased min-h-screen relative">

    <div class="ambient-bg">
        <div class="blob-1 animate-blob"></div>
        <div class="blob-2 animate-blob-reverse"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const PortfolioApp = () => {
            const [appState, setAppState] = useState('loading_vault');

            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });
            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState(""); 
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1 });
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});

            const currencyLabels = { USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata' };
            const [portfolio, setPortfolio] = useState([]);

            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000); 
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            useEffect(() => {
                if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                    setAppState('setup_github');
                    return;
                }

                const initializeApp = async () => {
                    setAppState('loading_vault');
                    try {
                        const cleanUser = githubConfig.username.trim();
                        const cleanRepo = githubConfig.repo.trim();
                        const cleanToken = githubConfig.token.trim();
                        const timestamp = new Date().getTime();

                        const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                            headers: { 
                                'Authorization': `Bearer ${cleanToken}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (response.status === 404) {
                            const repoCheck = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}?t=${timestamp}`, {
                                headers: { 'Authorization': `Bearer ${cleanToken}` }
                            });
                            if (repoCheck.status === 404) throw new Error("Depo bulunamadı! Ayarları kontrol edin.");
                            else if (!repoCheck.ok) throw new Error("GitHub erişim izni vermedi.");
                            setAppState('set_password');
                            return; 
                        } else if (response.status === 401) {
                            throw new Error("Token geçersiz veya süresi dolmuş.");
                        } else if (response.ok) {
                            const data = await response.json();
                            setFileSha(data.sha);

                            const decodedContent = decodeURIComponent(escape(atob(data.content)));
                            if (!decodedContent || decodedContent === "[]") {
                                setAppState('set_password');
                                return;
                            }

                            const vaultData = JSON.parse(decodedContent);

                            if (vaultData.isEncrypted) {
                                const sessionStr = localStorage.getItem('vault_session_v4');
                                if (sessionStr) {
                                    try {
                                        const session = JSON.parse(sessionStr);
                                        if (session.expiry > new Date().getTime()) {
                                            const bytes = CryptoJS.AES.decrypt(vaultData.payload, session.password);
                                            const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                                            if (decryptedString) {
                                                const parsedData = JSON.parse(decryptedString);
                                                setPortfolio(parsedData);
                                                setVaultPassword(session.password);
                                                setVaultSession(session.password); 
                                                setAppState('app');
                                                const expandedInit = {};
                                                parsedData.forEach(p => expandedInit[p.id] = true);
                                                setExpandedPersons(expandedInit);
                                                return; 
                                            }
                                        } else { clearVaultSession(); }
                                    } catch(e) { clearVaultSession(); }
                                }
                                setAppState('enter_password');
                                sessionStorage.setItem('locked_vault', vaultData.payload);
                            } else {
                                setPortfolio(vaultData);
                                setAppState('app');
                                const expandedInit = {};
                                vaultData.forEach(p => expandedInit[p.id] = true);
                                setExpandedPersons(expandedInit);
                            }
                        }
                    } catch (error) {
                        setAuthError(error.message);
                        setAppState('setup_github');
                    }
                };
                initializeApp();
            }, [githubConfig]);

            const unlockVault = (e) => {
                e.preventDefault();
                setAuthError("");
                const encryptedPayload = sessionStorage.getItem('locked_vault');
                if (!encryptedPayload) { setAuthError("Kriptolu veri bulunamadı."); return; }
                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedPayload, passwordInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decryptedString) throw new Error("Yanlış şifre"); 
                    const parsedData = JSON.parse(decryptedString);
                    setPortfolio(parsedData);
                    setVaultPassword(passwordInput); 
                    setVaultSession(passwordInput); 
                    sessionStorage.removeItem('locked_vault');
                    setAppState('app');
                    
                    const expandedInit = {};
                    parsedData.forEach(p => expandedInit[p.id] = true);
                    setExpandedPersons(expandedInit);
                } catch (error) {
                    setAuthError("Hatalı Şifre!");
                    setPasswordInput("");
                }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput); 
                setPortfolio([]); 
                setAppState('app'); 
            };

            const handleSaveToGithub = async () => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify(portfolio);
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));

                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${githubConfig.token.trim()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword); 
                        setTimeout(() => setIsSaving(false), 800); 
                    } else { throw new Error("Kayıt reddedildi."); }
                } catch (error) {
                    alert("Kayıt Hatası! İnternet bağlantınızı kontrol edin.");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = {
                    username: githubConfig.username.trim(),
                    repo: githubConfig.repo.trim(),
                    token: githubConfig.token.trim()
                };
                localStorage.setItem('gh_config_v3', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword("");
                setPortfolio([]);
                clearVaultSession(); 
                setAppState('enter_password');
                window.location.reload();
            };

            const fetchLiveRates = async () => {
                try {
                    setIsLoadingRates(true);
                    const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const data = await response.json();
                    const usdTry = data.usd.try;
                    let gramTry = rates.GRAM, ataTry = rates.ATA;

                    if (data.usd.xau) {
                        const xauUsd = 1 / data.usd.xau;
                        const spotGramGoldUsd = xauUsd / 31.1034768;
                        const spotGramGoldTry = spotGramGoldUsd * usdTry;
                        const physicalPremium = 1.045; 
                        gramTry = spotGramGoldTry * physicalPremium;
                        ataTry = gramTry * 6.88; 
                    }
                    setRates(prev => ({
                        ...prev, 
                        USD: parseFloat(usdTry.toFixed(2)), EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                        GRAM: parseFloat(gramTry.toFixed(2)), ATA: parseFloat(ataTry.toFixed(2))
                    }));
                } catch (err) { console.error("Fiyat çekme hatası", err); } finally { setIsLoadingRates(false); }
            };

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };

            const safeParseNum = (val) => { 
                if (val === "" || val === null || val === undefined) return 0;
                const num = parseFloat(val); 
                return isNaN(num) ? 0 : num; 
            };

            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => total + (safeParseNum(sub.amount) * (rates[sub.type] || 1)), 0);
                }
                return safeParseNum(asset.amount) * (rates[asset.type] || 1);
            };

            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => total + calculateAssetValue(asset), 0);
            const grandTotal = useMemo(() => portfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [portfolio, rates]);
            const formatMoney = (value) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value) + " ₺";

            const togglePersonAccordion = (personId) => setExpandedPersons(prev => ({ ...prev, [personId]: !prev[personId] }));
            const updatePersonName = (personId, newName) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, person: newName } : p));
            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? updater(asset) : asset) } : person));

            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    let currentAmount = asset.amount;
                    if (subItems.length === 0 && safeParseNum(asset.amount) > 0) {
                        subItems.push({ id: `sub-main-${Date.now()}`, name: 'Ana Bakiye', type: asset.type, amount: asset.amount });
                        currentAmount = ""; 
                    }
                    subItems.push({ id: `sub-${Date.now() + 1}`, name: '', type: 'TRY', amount: '' });
                    return { ...asset, amount: currentAmount, subItems };
                });
            };

            const removeSubItem = (personId, assetId, subItemId) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== subItemId) }));
            const updateSubItem = (personId, assetId, subItemId, field, value) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.map(sub => sub.id === subItemId ? { ...sub, [field]: value } : sub) }));
            const addAsset = (personId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: [...person.assets, { id: `asset-${Date.now()}`, name: '', type: 'TRY', amount: '', subItems: [] }] } : person));
            const removeAsset = (personId, assetId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.filter(a => a.id !== assetId) } : person));

            const removePerson = (e, personId) => { 
                e.stopPropagation();
                setTimeout(() => {
                    if(window.confirm("Bu kişiyi ve tüm varlıklarını silmek istediğine emin misin?")) {
                        setPortfolio(prev => prev.filter(p => p.id !== personId)); 
                        setExpandedPersons(prev => { const newState = {...prev}; delete newState[personId]; return newState; });
                    }
                }, 10);
            };

            const addNewPerson = () => {
                const newId = `person-${Date.now()}`;
                setPortfolio(prev => [...prev, { id: newId, person: '', assets: [] }]);
                setExpandedPersons(prev => ({...prev, [newId]: true}));
            };

            if (appState === 'loading_vault') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-4">
                        <i className="fa-solid fa-vault text-primary text-5xl animate-float opacity-80"></i>
                        <p className="text-emerald-300 font-semibold tracking-widest uppercase text-xs animate-pulse opacity-70">Bağlanıyor</p>
                    </div>
                );
            }

            if (appState === 'setup_github' || appState === 'set_password' || appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card p-8 sm:p-10 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up premium-border">
                            {appState === 'setup_github' && (
                                <form onSubmit={saveGithubConfig} className="flex flex-col gap-5">
                                    <div className="text-center mb-4">
                                        <i className="fa-brands fa-github text-5xl text-white mb-4 opacity-90"></i>
                                        <h3 className="text-2xl font-bold text-white tracking-tight">Kasa Erişimi</h3>
                                        <p className="text-xs text-zinc-400 mt-2">Private Repository bilgilerini girin.</p>
                                    </div>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="text" value={githubConfig.username} onChange={e => setGithubConfig({...githubConfig, username: e.target.value})} placeholder="GitHub Kullanıcı Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50"/>
                                    <input required type="text" value={githubConfig.repo} onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})} placeholder="Depo Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50"/>
                                    <input required type="password" value={githubConfig.token} onChange={e => setGithubConfig({...githubConfig, token: e.target.value})} placeholder="Erişim Token (PAT)" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50"/>
                                    <button type="submit" className="mt-2 py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">BAĞLA</button>
                                </form>
                            )}
                            {appState === 'set_password' && (
                                <form onSubmit={setupNewVault} className="flex flex-col gap-6 text-center">
                                    <i className="fa-solid fa-shield-halved text-5xl text-emerald-400 mb-2 opacity-90 animate-pulse"></i>
                                    <div>
                                        <h3 className="text-2xl font-bold text-white mb-2">Şifre Oluştur</h3>
                                        <p className="text-xs text-zinc-400">Verileriniz bu şifreyle saklanacak.</p>
                                    </div>
                                    {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] font-bold focus:border-primary/50"/>
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg active:scale-95 transition-all">BAŞLAT</button>
                                </form>
                            )}
                            {appState === 'enter_password' && (
                                <form onSubmit={unlockVault} className="flex flex-col gap-6 text-center">
                                    <i className="fa-solid fa-lock text-5xl text-white opacity-80 mb-2"></i>
                                    <h3 className="text-2xl font-bold text-white">Kasaya Giriş</h3>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="······" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] focus:border-primary/50 font-bold"/>
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-white text-black shadow-lg active:scale-95 transition-all">KİLİDİ AÇ</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="mx-auto w-full max-w-[95%] xl:max-w-6xl pt-6 pb-20 relative z-10 animate-fade-in-up">
                    {/* Header */}
                    <header className="flex justify-between items-center pb-5 mb-8 border-b border-white/5">
                        <button onClick={lockVault} className="w-10 h-10 rounded-full glass-surface flex items-center justify-center text-zinc-400 hover:text-red-400 hover:bg-red-500/10 transition-colors border border-transparent hover:border-red-500/30">
                            <i className="fa-solid fa-lock text-sm"></i>
                        </button>
                        <div className="flex flex-col items-center">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center mb-2 shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                                <i className="fa-solid fa-shield-halved text-black text-lg"></i>
                            </div>
                            <h1 className="text-[10px] font-bold tracking-widest text-zinc-300 uppercase">Portföy Takip</h1>
                        </div>
                        <button onClick={handleSaveToGithub} disabled={isSaving} className={`flex items-center gap-2 font-bold text-[10px] sm:text-xs px-4 py-2.5 rounded-xl transition-all ${isSaving ? 'bg-primary text-black' : 'glass-surface text-primary border border-primary/30 hover:bg-primary/10'}`}>
                            <i className={`fa-solid ${isSaving ? 'fa-check' : 'fa-cloud-arrow-up'} text-sm`}></i>
                            <span className="hidden sm:inline">{isSaving ? 'KAYDEDİLDİ' : 'KAYDET'}</span>
                        </button>
                    </header>

                    {/* Total Balance */}
                    <div className="text-center py-4 mb-10 flex flex-col items-center px-2">
                        <div className="glass-surface px-4 py-2 rounded-full border border-white/10 inline-flex items-center gap-2 mb-4">
                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                            <p className="text-[10px] text-zinc-200 font-semibold tracking-widest uppercase">Toplam Varlık</p>
                        </div>
                        <h2 className="text-5xl sm:text-6xl md:text-7xl lg:text-8xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-white via-zinc-200 to-emerald-800 font-numbers break-words max-w-full">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    {/* Market Rates Grid */}
                    <div className="mb-12 glass-card p-5 sm:p-6 rounded-[2rem] max-w-3xl mx-auto premium-border">
                        <div className="flex justify-between items-center mb-5 px-1">
                            <p className="text-[11px] font-bold text-zinc-300 uppercase tracking-wider flex items-center gap-2">
                                <i className="fa-solid fa-chart-line text-emerald-400"></i> Piyasa
                            </p>
                            <button onClick={fetchLiveRates} disabled={isLoadingRates} className="text-[10px] text-emerald-300 hover:text-emerald-200 uppercase font-bold tracking-wider flex items-center gap-2 glass-surface px-3 py-2 rounded-lg transition-colors hover:bg-white/5">
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin" : ""}`}></i> Yenile
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {['USD', 'EUR', 'GRAM', 'ATA'].map(currency => (
                                <div key={currency} className="glass-surface p-4 rounded-xl flex flex-col items-center border border-transparent hover:border-white/10 transition-colors">
                                    <p className="text-[10px] text-zinc-400 font-bold tracking-widest mb-2 uppercase">{currencyLabels[currency]}</p>
                                    <input 
                                        type="number" 
                                        value={rates[currency]} 
                                        onChange={(e) => handleRateChange(currency, e.target.value)} 
                                        className={`w-full text-lg sm:text-xl font-bold font-numbers outline-none bg-transparent text-center px-0 ${['GRAM', 'ATA'].includes(currency) ? 'text-emerald-400' : 'text-white'}`}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Portfolios Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 items-start">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = expandedPersons[person.id] !== false; 

                            return (
                                <div key={person.id} className={`glass-card rounded-[2rem] transition-all duration-300 premium-border z-10 ${isOpen ? 'shadow-2xl border-white/10' : 'hover:border-white/10 shadow-lg'}`}>
                                    
                                    {/* Card Header (Person Name & Total) */}
                                    <div onClick={() => togglePersonAccordion(person.id)} className={`p-5 sm:p-6 flex justify-between items-center cursor-pointer transition-colors ${isOpen ? 'bg-white/5 rounded-t-[2rem]' : 'rounded-[2rem]'}`}>
                                        <div className="flex flex-col flex-1 min-w-0 pr-3">
                                            <input 
                                                type="text" 
                                                value={person.person} 
                                                onChange={(e) => updatePersonName(person.id, e.target.value)} 
                                                onClick={(e) => e.stopPropagation()} 
                                                className="bg-transparent text-lg sm:text-xl font-bold text-white uppercase tracking-wide w-full outline-none stealth-input truncate pb-0.5"
                                                placeholder="İSİM GİRİNİZ"
                                            />
                                            <div className="flex items-center gap-1.5 mt-1.5 pl-0.5">
                                                <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                                                <p className="text-[9px] text-zinc-400 font-semibold uppercase tracking-widest">{person.assets.length} Varlık</p>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-2 sm:gap-3 shrink-0">
                                            <span className="text-sm sm:text-base font-bold font-numbers text-white">{formatMoney(personTotal)}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ${isOpen ? 'bg-white text-black rotate-180' : 'glass-surface text-zinc-400'}`}>
                                                <i className="fa-solid fa-chevron-down text-xs"></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Card Content (Assets) */}
                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-white/5">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);

                                                return (
                                                    <div key={asset.id} className="glass-surface rounded-2xl p-4 border border-transparent hover:border-white/10 transition-colors flex flex-col gap-4">
                                                        
                                                        {/* Asset Title & Trash */}
                                                        <div className="flex justify-between items-center">
                                                            <div className="flex items-center gap-2 flex-1 min-w-0">
                                                                <div className="w-7 h-7 rounded-full bg-black/20 flex items-center justify-center shrink-0">
                                                                    <i className="fa-solid fa-wallet text-zinc-400 text-[10px]"></i>
                                                                </div>
                                                                <input 
                                                                    type="text" 
                                                                    value={asset.name} 
                                                                    onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: e.target.value }))} 
                                                                    className="flex-1 min-w-0 bg-transparent font-bold text-white text-xs sm:text-sm outline-none stealth-input placeholder:text-zinc-600 truncate"
                                                                    placeholder="KURUM / VARLIK ADI"
                                                                />
                                                            </div>
                                                            <div className="flex items-center gap-2 shrink-0 pl-2">
                                                                <button onClick={() => removeAsset(person.id, asset.id)} className="text-zinc-500 hover:text-red-400 opacity-60 hover:opacity-100 p-1.5 rounded-lg"><i className="fa-solid fa-trash text-[11px]"></i></button>
                                                            </div>
                                                        </div>

                                                        {/* Asset Amount Value Display */}
                                                        {hasSubItems && (
                                                            <div className="flex items-center gap-2 px-1">
                                                                <span className="text-xs font-bold font-numbers text-white bg-black/30 px-2 py-1 rounded-md">{formatMoney(assetValue)} Toplam</span>
                                                            </div>
                                                        )}

                                                        {/* Single Amount Input OR Sub-items Active Badge */}
                                                        <div className="flex flex-col gap-3">
                                                            {!hasSubItems ? (
                                                                <div className="flex bg-black/40 border border-white/10 rounded-xl overflow-hidden focus-within:border-emerald-500/50 transition-colors w-full">
                                                                    <input 
                                                                        type="number" 
                                                                        value={asset.amount} 
                                                                        onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, amount: e.target.value}))} 
                                                                        className="flex-1 min-w-0 bg-transparent text-white font-numbers font-bold text-sm py-2.5 px-3 outline-none"
                                                                        placeholder="0.00"
                                                                    />
                                                                    <div className="w-[1px] bg-white/10"></div>
                                                                    <select 
                                                                        value={asset.type} 
                                                                        onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, type: e.target.value}))} 
                                                                        className="bg-black/30 text-[10px] font-bold text-zinc-300 outline-none px-3 py-2 uppercase cursor-pointer no-arrow text-center"
                                                                    >
                                                                        <option value="TRY">TL</option>
                                                                        <option value="USD">USD</option>
                                                                        <option value="EUR">EUR</option>
                                                                        <option value="GRAM">GRAM</option>
                                                                        <option value="ATA">ATA</option>
                                                                    </select>
                                                                </div>
                                                            ) : (
                                                                <div className="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-2 rounded-xl w-fit">
                                                                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                                                                    <span className="text-[9px] font-bold text-emerald-300 tracking-widest uppercase">Alt Kalemler Aktif</span>
                                                                </div>
                                                            )}

                                                            {/* Add Sub Item Button */}
                                                            <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-zinc-300 hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 glass-surface px-4 py-2.5 rounded-xl transition-colors hover:bg-white/5 border border-transparent hover:border-white/10">
                                                                <i className="fa-solid fa-plus text-[9px]"></i> Kalem Ekle
                                                            </button>
                                                        </div>

                                                        {/* Sub Items List */}
                                                        {hasSubItems && (
                                                            <div className="flex flex-col gap-2 mt-1 pl-2 border-l-2 border-white/10 ml-2">
                                                                {asset.subItems.map((sub) => (
                                                                    <div key={sub.id} className="flex flex-col gap-2 bg-black/20 p-2.5 rounded-xl border border-white/5 position-relative">
                                                                        <div className="flex items-center justify-between gap-2">
                                                                             <input 
                                                                                type="text" 
                                                                                value={sub.name} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'name', e.target.value)} 
                                                                                className="bg-transparent py-1 px-1 rounded-md text-xs font-semibold text-zinc-200 outline-none flex-1 min-w-0 placeholder:text-zinc-600 focus:bg-white/5 transition-colors"
                                                                                placeholder="Kalem Adı"
                                                                            />
                                                                            <button onClick={() => removeSubItem(person.id, asset.id, sub.id)} className="text-zinc-500 hover:text-red-400 p-1.5 rounded-md"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                                                        </div>
                                                                        
                                                                        <div className="flex glass-surface border border-white/10 rounded-lg overflow-hidden focus-within:border-white/30 transition-colors w-full">
                                                                            <input 
                                                                                type="number" 
                                                                                value={sub.amount} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'amount', e.target.value)} 
                                                                                className="flex-1 min-w-0 bg-transparent text-white font-numbers font-bold text-xs py-2 px-3 outline-none"
                                                                                placeholder="0.0"
                                                                            />
                                                                            <div className="w-[1px] bg-white/10"></div>
                                                                            <select 
                                                                                value={sub.type} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'type', e.target.value)} 
                                                                                className="bg-black/30 text-white text-[10px] font-bold outline-none px-2 py-1 cursor-pointer no-arrow text-center"
                                                                            >
                                                                                <option value="TRY">TL</option>
                                                                                <option value="USD">USD</option>
                                                                                <option value="EUR">EUR</option>
                                                                                <option value="GRAM">GR</option>
                                                                                <option value="ATA">ATA</option>
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}

                                            {/* Footer Actions (New Asset & Delete Person) */}
                                            <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-white/5 mt-2">
                                                <button onClick={(e) => removePerson(e, person.id)} className="text-[9px] text-zinc-500 hover:text-red-400 font-bold uppercase tracking-widest px-4 py-3 glass-surface rounded-xl transition-colors hover:bg-red-500/10 shrink-0">
                                                    KİŞİYİ SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-500 hover:text-black transition-all shadow-sm">
                                                    + YENİ VARLIK
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Add New Person Button */}
                        <div className="pt-2 pb-10">
                            <button onClick={addNewPerson} className="w-full py-10 border border-dashed border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-white/5 group">
                                <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                    <i className="fa-solid fa-plus text-lg"></i>
                                </div>
                                YENİ PORTFÖY
                            </button>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>
</html>
