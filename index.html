<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Varlık Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- CryptoJS (Şifreleme Motoru - Askeri Düzey Güvenlik) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#030303',
                        card: '#0a0a0a',
                        surface: '#121212',
                        primary: '#10b981',
                        primary_dark: '#059669',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #ffffff; -webkit-font-smoothing: antialiased; }
        
        /* Input & Scrollbar resets */
        input[type="number"], input[type="text"], input[type="password"], select { font-size: 16px !important; background: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Smooth Accordion */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 6000px;
            opacity: 1;
        }

        /* Clean Inputs */
        .stealth-input {
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .stealth-input:focus {
            border-bottom: 1px solid #10b981;
            outline: none;
        }

        /* Custom Select Arrow Hiding */
        .no-arrow {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const PortfolioApp = () => {
            // ==========================================
            // STATE YÖNETİMİ
            // ==========================================
            const [appState, setAppState] = useState('loading_vault');
            
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });
            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState(""); 
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1 });
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            // Çoklu akordeon kontrolü (Her kart bağımsız açılıp kapanabilir)
            const [expandedPersons, setExpandedPersons] = useState({});

            const currencyLabels = { USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata' };
            const [portfolio, setPortfolio] = useState([]);

            // ==========================================
            // OTURUM (SESSION) YÖNETİMİ
            // ==========================================
            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000); 
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            // ==========================================
            // GITHUB BAĞLANTISI VE KASA OKUMA
            // ==========================================
            useEffect(() => {
                if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                    setAppState('setup_github');
                    return;
                }

                const initializeApp = async () => {
                    setAppState('loading_vault');
                    try {
                        const cleanUser = githubConfig.username.trim();
                        const cleanRepo = githubConfig.repo.trim();
                        const cleanToken = githubConfig.token.trim();
                        const timestamp = new Date().getTime();

                        const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                            headers: { 
                                'Authorization': `Bearer ${cleanToken}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (response.status === 404) {
                            const repoCheck = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}?t=${timestamp}`, {
                                headers: { 'Authorization': `Bearer ${cleanToken}` }
                            });
                            if (repoCheck.status === 404) throw new Error("Depo bulunamadı! Ayarları kontrol edin.");
                            else if (!repoCheck.ok) throw new Error("GitHub erişim izni vermedi.");
                            setAppState('set_password');
                            return; 
                        } else if (response.status === 401) {
                            throw new Error("Token geçersiz veya süresi dolmuş.");
                        } else if (response.ok) {
                            const data = await response.json();
                            setFileSha(data.sha);
                            
                            const decodedContent = decodeURIComponent(escape(atob(data.content)));
                            if (!decodedContent || decodedContent === "[]") {
                                setAppState('set_password');
                                return;
                            }

                            const vaultData = JSON.parse(decodedContent);

                            if (vaultData.isEncrypted) {
                                const sessionStr = localStorage.getItem('vault_session_v4');
                                if (sessionStr) {
                                    try {
                                        const session = JSON.parse(sessionStr);
                                        if (session.expiry > new Date().getTime()) {
                                            const bytes = CryptoJS.AES.decrypt(vaultData.payload, session.password);
                                            const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                                            if (decryptedString) {
                                                const parsedData = JSON.parse(decryptedString);
                                                setPortfolio(parsedData);
                                                setVaultPassword(session.password);
                                                setVaultSession(session.password); 
                                                setAppState('app');
                                                return; 
                                            }
                                        } else { clearVaultSession(); }
                                    } catch(e) { clearVaultSession(); }
                                }
                                setAppState('enter_password');
                                sessionStorage.setItem('locked_vault', vaultData.payload);
                            } else {
                                setPortfolio(vaultData);
                                setAppState('app');
                            }
                        }
                    } catch (error) {
                        setAuthError(error.message);
                        setAppState('setup_github');
                    }
                };
                initializeApp();
            }, [githubConfig]);

            // ==========================================
            // KASA KİLİT İŞLEMLERİ
            // ==========================================
            const unlockVault = (e) => {
                e.preventDefault();
                setAuthError("");
                const encryptedPayload = sessionStorage.getItem('locked_vault');
                if (!encryptedPayload) { setAuthError("Kriptolu veri bulunamadı."); return; }
                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedPayload, passwordInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decryptedString) throw new Error("Yanlış şifre"); 
                    setPortfolio(JSON.parse(decryptedString));
                    setVaultPassword(passwordInput); 
                    setVaultSession(passwordInput); 
                    sessionStorage.removeItem('locked_vault');
                    setAppState('app');
                } catch (error) {
                    setAuthError("Hatalı Şifre!");
                    setPasswordInput("");
                }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput); 
                setPortfolio([]); 
                setAppState('app'); 
            };

            const handleSaveToGithub = async () => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify(portfolio);
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));
                    
                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${githubConfig.token.trim()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword); 
                        setTimeout(() => setIsSaving(false), 800); 
                    } else { throw new Error("Kayıt reddedildi."); }
                } catch (error) {
                    alert("Kayıt Hatası! İnternet bağlantınızı kontrol edin.");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = {
                    username: githubConfig.username.trim(),
                    repo: githubConfig.repo.trim(),
                    token: githubConfig.token.trim()
                };
                localStorage.setItem('gh_config_v3', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword("");
                setPortfolio([]);
                clearVaultSession(); 
                setAppState('enter_password');
                window.location.reload();
            };

            // ==========================================
            // PİYASA VE FİNANSAL HESAPLAMALAR
            // ==========================================
            const fetchLiveRates = async () => {
                try {
                    setIsLoadingRates(true);
                    const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const data = await response.json();
                    const usdTry = data.usd.try;
                    let gramTry = rates.GRAM, ataTry = rates.ATA;

                    if (data.usd.xau) {
                        const xauUsd = 1 / data.usd.xau;
                        const spotGramGoldUsd = xauUsd / 31.1034768;
                        const spotGramGoldTry = spotGramGoldUsd * usdTry;
                        const physicalPremium = 1.045; 
                        gramTry = spotGramGoldTry * physicalPremium;
                        ataTry = gramTry * 6.88; 
                    }
                    setRates(prev => ({
                        ...prev, 
                        USD: parseFloat(usdTry.toFixed(2)), EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                        GRAM: parseFloat(gramTry.toFixed(2)), ATA: parseFloat(ataTry.toFixed(2))
                    }));
                } catch (err) { console.error("Fiyat çekme hatası", err); } finally { setIsLoadingRates(false); }
            };

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };
            
            // Boşlukları ve NaN değerlerini güvenli sıfıra çevirir
            const safeParseNum = (val) => { 
                if (val === "" || val === null || val === undefined) return 0;
                const num = parseFloat(val); 
                return isNaN(num) ? 0 : num; 
            };
            
            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => total + (safeParseNum(sub.amount) * (rates[sub.type] || 1)), 0);
                }
                return safeParseNum(asset.amount) * (rates[asset.type] || 1);
            };
            
            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => total + calculateAssetValue(asset), 0);
            const grandTotal = useMemo(() => portfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [portfolio, rates]);
            
            const formatMoney = (value) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value) + " ₺";

            // ==========================================
            // KİŞİ VE VARLIK YÖNETİMİ
            // ==========================================
            const togglePersonAccordion = (personId) => {
                setExpandedPersons(prev => ({ ...prev, [personId]: !prev[personId] }));
            };

            const updatePersonName = (personId, newName) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, person: newName } : p));
            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? updater(asset) : asset) } : person));
            
            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    let currentAmount = asset.amount;
                    if (subItems.length === 0 && safeParseNum(asset.amount) > 0) {
                        subItems.push({ id: `sub-main-${Date.now()}`, name: 'Ana Bakiye', type: asset.type, amount: asset.amount });
                        currentAmount = ""; 
                    }
                    subItems.push({ id: `sub-${Date.now() + 1}`, name: '', type: 'TRY', amount: '' });
                    return { ...asset, amount: currentAmount, subItems };
                });
            };

            const removeSubItem = (personId, assetId, subItemId) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== subItemId) }));
            const updateSubItem = (personId, assetId, subItemId, field, value) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.map(sub => sub.id === subItemId ? { ...sub, [field]: value } : sub) }));
            const addAsset = (personId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: [...person.assets, { id: `asset-${Date.now()}`, name: '', type: 'TRY', amount: '', subItems: [] }] } : person));
            const removeAsset = (personId, assetId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.filter(a => a.id !== assetId) } : person));
            
            const removePerson = (personId) => { 
                if(window.confirm("Bu kişiyi ve tüm varlıklarını silmek istediğine emin misin?")) {
                    setPortfolio(prev => prev.filter(p => p.id !== personId)); 
                    setExpandedPersons(prev => { const newState = {...prev}; delete newState[personId]; return newState; });
                }
            };
            
            const addNewPerson = () => {
                const newId = `person-${Date.now()}`;
                setPortfolio(prev => [...prev, { id: newId, person: 'YENİ KİŞİ', assets: [] }]);
                setExpandedPersons(prev => ({...prev, [newId]: true}));
            };

            // ==========================================
            // GÜVENLİK EKRANLARI (UI)
            // ==========================================

            if (appState === 'loading_vault') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-4 bg-background">
                        <i className="fa-solid fa-vault text-primary text-6xl fa-bounce drop-shadow-[0_0_15px_rgba(16,185,129,0.5)]"></i>
                        <p className="text-zinc-500 font-black tracking-[0.3em] uppercase text-xs animate-pulse text-center mt-4">Kasa Bağlanıyor...</p>
                    </div>
                );
            }

            if (appState === 'setup_github') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={saveGithubConfig} className="bg-card border border-zinc-800/50 p-8 md:p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
                            <div className="text-center mb-10 mt-2">
                                <i className="fa-brands fa-github text-5xl text-white mb-4"></i>
                                <h3 className="text-2xl font-black text-white tracking-tight">GitHub Kasası</h3>
                                <p className="text-xs text-zinc-500 mt-2 font-medium">Verilerini şifreleyerek kaydedeceğimiz Private Repository bilgilerini gir.</p>
                            </div>
                            {authError && <div className="bg-red-500/10 text-red-400 text-xs font-semibold p-4 rounded-xl mb-6 text-center border border-red-500/20">{authError}</div>}
                            <div className="space-y-4">
                                <input required type="text" value={githubConfig.username} onChange={e => setGithubConfig({...githubConfig, username: e.target.value})} placeholder="GitHub Kullanıcı Adı" className="w-full bg-surface border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-all text-sm font-semibold"/>
                                <input required type="text" value={githubConfig.repo} onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})} placeholder="Depo Adı" className="w-full bg-surface border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-all text-sm font-semibold"/>
                                <input required type="password" value={githubConfig.token} onChange={e => setGithubConfig({...githubConfig, token: e.target.value})} placeholder="Erişim Token (PAT)" className="w-full bg-surface border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-all text-sm font-semibold"/>
                            </div>
                            <button type="submit" className="w-full mt-8 py-3.5 rounded-xl font-black text-sm bg-primary text-black hover:bg-emerald-400 transition-all shadow-[0_0_20px_rgba(16,185,129,0.2)]">KASAYI BAĞLA</button>
                        </form>
                    </div>
                );
            }

            if (appState === 'set_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={setupNewVault} className="bg-card border border-primary/20 p-8 md:p-10 rounded-[2.5rem] w-full max-w-sm shadow-[0_0_50px_rgba(16,185,129,0.1)] text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-primary"></div>
                            <i className="fa-solid fa-shield-check text-6xl text-primary mb-6 drop-shadow-[0_0_15px_rgba(16,185,129,0.4)]"></i>
                            <h3 className="text-2xl font-black text-white tracking-tight mb-2">Kasa Şifresi Oluştur</h3>
                            <p className="text-xs text-zinc-400 mb-8 font-medium leading-relaxed">Kasanız hazır. Verileriniz bu şifre ile kriptolanacaktır.</p>
                            {authError && <p className="text-red-400 text-xs font-bold mb-4">{authError}</p>}
                            <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre Belirle" className="w-full bg-surface border border-zinc-800 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary mb-6 text-xl tracking-[0.5em] font-black transition-all"/>
                            <button type="submit" className="w-full py-3.5 rounded-xl font-black text-sm bg-primary text-black hover:bg-emerald-400 transition-all shadow-lg shadow-primary/20">BAŞLAT</button>
                        </form>
                    </div>
                );
            }

            if (appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={unlockVault} className="bg-card border border-zinc-800/50 p-8 md:p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl text-center">
                            <i className="fa-solid fa-lock text-6xl text-zinc-600 mb-6 drop-shadow-md"></i>
                            <h3 className="text-2xl font-black text-white mb-8 tracking-tight">Kasaya Giriş</h3>
                            {authError && <div className="bg-red-500/10 text-red-400 text-xs font-semibold p-4 rounded-xl mb-6 border border-red-500/20">{authError}</div>}
                            <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifrenizi Girin" className="w-full bg-surface border border-zinc-800 rounded-xl px-4 py-4 text-center text-white outline-none focus:border-primary focus:shadow-[0_0_15px_rgba(16,185,129,0.1)] transition-all mb-6 text-xl tracking-[0.5em] font-black"/>
                            <button type="submit" className="w-full py-3.5 rounded-xl font-black text-sm bg-zinc-100 text-black hover:bg-white transition-all">KİLİDİ AÇ</button>
                        </form>
                    </div>
                );
            }

            // ==========================================
            // ANA UYGULAMA EKRANI (KASA AÇIK)
            // ==========================================
            return (
                // Geniş ekranlarda (PC) ferah durması için max-w-7xl
                <div className="mx-auto w-full max-w-[95%] lg:max-w-7xl pt-6 pb-24 relative transition-all duration-300">
                    
                    {/* Header */}
                    <header className="flex justify-between items-center pb-6 border-b border-zinc-800/80 mb-8">
                        <div className="w-1/3 flex justify-start">
                             <button onClick={lockVault} className="w-10 h-10 rounded-full bg-card flex items-center justify-center text-zinc-500 hover:text-red-400 hover:bg-red-500/10 transition-all border border-zinc-800 shadow-sm" title="Kasayı Kilitle">
                                <i className="fa-solid fa-lock text-sm"></i>
                            </button>
                        </div>
                        <div className="w-1/3 flex flex-col items-center justify-center">
                            <i className="fa-solid fa-building-columns text-primary text-3xl mb-1.5 drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]"></i>
                            <h1 className="text-[9px] font-black tracking-[0.4em] text-zinc-500 uppercase text-center">Aile Portföyü</h1>
                        </div>
                        <div className="w-1/3 flex justify-end">
                            <button onClick={handleSaveToGithub} disabled={isSaving} className={`flex items-center gap-2 font-black text-[10px] sm:text-xs px-4 py-3 rounded-xl transition-all border ${isSaving ? 'bg-primary text-black border-primary shadow-[0_0_20px_rgba(16,185,129,0.4)]' : 'bg-primary/10 text-primary border-primary/30 hover:bg-primary hover:text-black shadow-sm'}`}>
                                <i className={`fa-solid ${isSaving ? 'fa-check' : 'fa-cloud-arrow-up'} text-sm`}></i>
                                <span className="hidden sm:inline">{isSaving ? 'KAYDEDİLDİ' : 'KAYDET'}</span>
                            </button>
                        </div>
                    </header>

                    {/* Toplam Bakiye */}
                    <div className="text-center py-6 mb-10 flex flex-col items-center">
                        <p className="text-[10px] text-zinc-500 font-bold tracking-[0.3em] uppercase mb-3 bg-card px-4 py-1.5 inline-block rounded-full border border-zinc-800">Toplam Net Varlık</p>
                        <h2 className="text-5xl md:text-7xl font-black tracking-tighter text-white drop-shadow-2xl">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    {/* Piyasa Kurları Grid (4'lü Düzen) */}
                    <div className="mb-12 bg-card p-5 rounded-[2.5rem] border border-zinc-800/60 max-w-4xl mx-auto shadow-xl">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest ml-1 text-center">Piyasa Fiyatları</p>
                            <button onClick={fetchLiveRates} disabled={isLoadingRates} className="text-[9px] text-zinc-400 hover:text-white uppercase font-bold tracking-widest flex items-center gap-2 bg-surface px-3 py-2 rounded-xl border border-zinc-700 transition-all hover:bg-zinc-800">
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin text-primary" : ""}`}></i> Güncelle
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 px-2 pb-2">
                            {['USD', 'EUR', 'GRAM', 'ATA'].map(currency => (
                                <div key={currency} className="bg-surface p-4 rounded-2xl border border-zinc-800 hover:border-zinc-600 transition-all flex flex-col items-center shadow-inner">
                                    <p className="text-[9px] sm:text-[10px] text-zinc-500 font-bold tracking-widest mb-2 uppercase text-center">{currencyLabels[currency]}</p>
                                    <input 
                                        type="number" 
                                        value={rates[currency]} 
                                        onChange={(e) => handleRateChange(currency, e.target.value)} 
                                        className={`w-full text-sm sm:text-lg font-black outline-none bg-transparent text-center px-0 ${['GRAM', 'ATA'].includes(currency) ? 'text-emerald-400' : 'text-white'}`}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Portföyler (Duyarlı Grid - PC'de 3 kolon, Tablette 2) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 items-start">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = expandedPersons[person.id] !== false; 

                            return (
                                <div key={person.id} className={`bg-card rounded-[2.5rem] overflow-hidden transition-all ${isOpen ? 'border border-zinc-700 shadow-2xl' : 'border border-zinc-800 hover:border-zinc-700 shadow-md'}`}>
                                    
                                    {/* Kişi Başlığı */}
                                    <div onClick={() => togglePersonAccordion(person.id)} className={`p-6 sm:p-8 flex justify-between items-center cursor-pointer group ${isOpen ? 'bg-surface/50' : ''}`}>
                                        <div className="flex flex-col flex-1 min-w-0 pr-4">
                                            <input 
                                                type="text" 
                                                value={person.person} 
                                                onChange={(e) => updatePersonName(person.id, e.target.value)} 
                                                onClick={(e) => e.stopPropagation()} 
                                                className="bg-transparent text-xl sm:text-2xl font-black text-white uppercase tracking-wide w-full outline-none stealth-input text-left"
                                                placeholder="Kişi Adı"
                                            />
                                            <p className="text-[9px] sm:text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1 text-left">
                                                {person.assets.length} Varlık Kalemi
                                            </p>
                                        </div>
                                        <div className="text-right flex items-center gap-3 sm:gap-4 shrink-0">
                                            <span className="text-lg sm:text-xl font-black text-primary drop-shadow-[0_0_10px_rgba(16,185,129,0.2)]">{formatMoney(personTotal)}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-all ${isOpen ? 'bg-primary text-black' : 'bg-surface text-zinc-500 group-hover:bg-zinc-800 border border-zinc-800'}`}>
                                                <i className={`fa-solid fa-chevron-${isOpen ? 'up' : 'down'} text-[10px]`}></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Kart İçeriği (Varlıklar) */}
                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-5 sm:px-8 pb-8 pt-2 space-y-5 border-t border-zinc-800/50">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);
                                                
                                                return (
                                                    <div key={asset.id} className="bg-surface rounded-[2rem] p-5 border border-zinc-800 hover:border-zinc-700 transition-colors shadow-sm">
                                                        
                                                        {/* Ana Varlık Başlığı */}
                                                        <div className="flex justify-between items-center mb-5 gap-3">
                                                            <input 
                                                                type="text" 
                                                                value={asset.name} 
                                                                onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: e.target.value }))} 
                                                                className="flex-1 min-w-0 bg-transparent font-black text-zinc-100 text-sm outline-none stealth-input text-left uppercase tracking-wider"
                                                                placeholder="Kurum / Varlık Adı"
                                                            />
                                                            <div className="flex items-center gap-3 shrink-0">
                                                                <span className="text-sm font-black text-white">{formatMoney(assetValue)}</span>
                                                                <button onClick={() => removeAsset(person.id, asset.id)} className="text-zinc-500 hover:text-red-500 bg-background w-8 h-8 rounded-full flex items-center justify-center transition-all border border-zinc-800"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                            </div>
                                                        </div>

                                                        {/* KAPSÜL TASARIMI: Miktar ve Döviz Cinsi Yan Yana Asla Bozulmaz */}
                                                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                                            
                                                            <div className="flex-1 min-w-0">
                                                                {!hasSubItems ? (
                                                                    <div className="flex w-full sm:max-w-[200px] bg-background border border-zinc-700 rounded-xl overflow-hidden focus-within:border-primary transition-colors shadow-inner">
                                                                        <input 
                                                                            type="number" 
                                                                            value={asset.amount} 
                                                                            onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, amount: e.target.value}))} 
                                                                            placeholder="0.00" 
                                                                            className="flex-1 min-w-0 bg-transparent text-white font-black text-sm py-2 px-3 outline-none text-left"
                                                                        />
                                                                        <div className="w-[1px] bg-zinc-800"></div>
                                                                        <select 
                                                                            value={asset.type} 
                                                                            onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, type: e.target.value}))} 
                                                                            className="bg-zinc-900 text-[10px] font-black text-zinc-400 outline-none px-3 py-2 uppercase cursor-pointer hover:bg-zinc-800 no-arrow text-center"
                                                                        >
                                                                            <option value="TRY">TL</option>
                                                                            <option value="USD">DOLAR</option>
                                                                            <option value="EUR">EURO</option>
                                                                            <option value="GRAM">GRAM</option>
                                                                            <option value="ATA">ATA</option>
                                                                        </select>
                                                                    </div>
                                                                ) : (
                                                                    <div className="inline-flex items-center gap-2 bg-primary/10 border border-primary/20 px-3 py-2 rounded-xl h-full shadow-sm">
                                                                        <div className="w-1.5 h-1.5 rounded-full bg-primary animate-pulse shrink-0"></div>
                                                                        <span className="text-[9px] text-primary font-black uppercase tracking-[0.2em] whitespace-nowrap">Alt Kalemler Aktif</span>
                                                                    </div>
                                                                )}
                                                            </div>

                                                            {/* Alt Kalem Ekleme Butonu - İzole Edildi */}
                                                            <button onClick={() => addSubItem(person.id, asset.id)} className="shrink-0 text-[10px] text-zinc-400 hover:text-white font-bold uppercase tracking-widest flex items-center justify-center gap-1.5 bg-background px-4 py-2.5 rounded-xl transition-all border border-zinc-800 hover:border-zinc-600">
                                                                <i className="fa-solid fa-plus text-[10px]"></i> Kalem
                                                            </button>
                                                        </div>

                                                        {/* Alt Kalemler (Ağaç Hiyerarşisi: L İkonu İle) */}
                                                        {hasSubItems && (
                                                            <div className="mt-4 space-y-2 pl-2">
                                                                {asset.subItems.map((sub) => (
                                                                    <div key={sub.id} className="flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-3 bg-background p-2.5 sm:p-3 rounded-2xl border border-zinc-800/80 hover:border-zinc-700 transition-all shadow-sm">
                                                                        
                                                                        {/* Ağaç Dirsek İkonu ve İsim */}
                                                                        <div className="flex items-center gap-2 w-full sm:flex-1 min-w-0">
                                                                            <div className="w-3 h-5 border-l-2 border-b-2 border-zinc-700 rounded-bl-md mr-1 shrink-0 mt-[-8px]"></div>
                                                                            <input 
                                                                                type="text" 
                                                                                value={sub.name} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'name', e.target.value)} 
                                                                                className="bg-transparent text-xs font-semibold text-zinc-300 outline-none stealth-input flex-1 min-w-0 text-left uppercase"
                                                                                placeholder="Kalem Adı"
                                                                            />
                                                                            <button onClick={() => removeSubItem(person.id, asset.id, sub.id)} className="sm:hidden text-zinc-600 hover:text-red-500 px-2 py-1 bg-surface rounded-lg"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                                                        </div>
                                                                        
                                                                        {/* Alt Kalem Kapsülü */}
                                                                        <div className="flex items-center justify-between sm:justify-end gap-2 w-full sm:w-auto shrink-0 pl-6 sm:pl-0">
                                                                            <div className="flex bg-surface border border-zinc-800 rounded-lg overflow-hidden focus-within:border-primary/50 transition-colors flex-1 sm:flex-none">
                                                                                <input 
                                                                                    type="number" 
                                                                                    value={sub.amount} 
                                                                                    onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'amount', e.target.value)} 
                                                                                    placeholder="0" 
                                                                                    className="w-full sm:w-24 bg-transparent text-zinc-100 text-xs font-bold py-1.5 px-2 outline-none text-left"
                                                                                />
                                                                                <div className="w-[1px] bg-zinc-800"></div>
                                                                                <select 
                                                                                    value={sub.type} 
                                                                                    onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'type', e.target.value)} 
                                                                                    className="bg-zinc-900 text-zinc-400 text-[9px] font-black outline-none px-2 py-1.5 cursor-pointer hover:bg-zinc-800 no-arrow text-center"
                                                                                >
                                                                                    <option value="TRY">TL</option>
                                                                                    <option value="USD">USD</option>
                                                                                    <option value="EUR">EUR</option>
                                                                                    <option value="GRAM">GR</option>
                                                                                    <option value="ATA">ATA</option>
                                                                                </select>
                                                                            </div>
                                                                            <button onClick={() => removeSubItem(person.id, asset.id, sub.id)} className="hidden sm:flex text-zinc-600 hover:text-red-500 w-8 h-8 items-center justify-center rounded-lg bg-surface hover:bg-red-500/10 transition-colors shrink-0"><i className="fa-solid fa-trash text-[10px]"></i></button>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}

                                            <div className="pt-4 flex justify-between items-center gap-3">
                                                <button onClick={() => removePerson(person.id)} className="text-[10px] text-zinc-500 hover:text-red-500 font-black uppercase tracking-widest px-4 py-3 bg-surface rounded-2xl transition-all border border-zinc-800 hover:border-red-500/30 hover:bg-red-500/10 shrink-0">
                                                    KİŞİYİ SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-primary bg-primary/10 border border-primary/20 font-black uppercase tracking-[0.2em] py-3 rounded-2xl hover:bg-primary hover:text-black transition-all shadow-lg shadow-primary/5">
                                                    + YENİ VARLIK
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Yeni Portföy Ekleme Butonu */}
                        <div className="lg:col-span-3 pt-4">
                            <button onClick={addNewPerson} className="w-full py-10 border-2 border-dashed border-zinc-800 hover:border-primary/50 bg-card rounded-[2.5rem] text-xs font-black uppercase tracking-[0.3em] text-zinc-600 hover:text-primary transition-all flex flex-col items-center gap-4 group">
                                <div className="w-14 h-14 rounded-full bg-surface flex items-center justify-center group-hover:bg-primary group-hover:text-black transition-all shadow-xl">
                                    <i className="fa-solid fa-plus text-2xl"></i>
                                </div>
                                YENİ PORTFÖY EKLE
                            </button>
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>
</html>
