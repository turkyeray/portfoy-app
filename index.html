    <script>
        tailwind.config = {

    </script>

    <style>

<body class="antialiased min-h-screen relative">

    <div class="ambient-bg"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const formatTitleCase = (str) => {
            if (!str) return 'TL';
            return String(str).split(/[\s_-]+/).map(word => {
                if (!word) return '';
                return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
            }).join(' ');
        };

        const CustomSelect = ({ value, options, onChange, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [dropDirection, setDropDirection] = useState('down');
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false);
                };
                if (isOpen) {
                    if (dropdownRef.current) {
                        const rect = dropdownRef.current.getBoundingClientRect();
                        const spaceBelow = window.innerHeight - rect.bottom;
                        const estimatedHeight = Object.keys(options).length * 40;
                        setDropDirection((spaceBelow < estimatedHeight + 20 && rect.top > estimatedHeight + 20) ? 'up' : 'down');
                    }
                    document.addEventListener("mousedown", handleClickOutside);
                    
                    if (dropdownRef.current) {
                        let el = dropdownRef.current;
                        while(el && el !== document.body) {
                            if (el.classList && (el.classList.contains('relative') || el.classList.contains('glass-card') || el.classList.contains('glass-surface'))) {
                                el.dataset.oldZ = el.style.zIndex || '';
                                el.style.zIndex = '99999';
                            }
                            el = el.parentElement;
                        }
                    }
                } else {
                    if (dropdownRef.current) {
                        let el = dropdownRef.current;
                        while(el && el !== document.body) {
                            if (el.dataset && el.dataset.oldZ !== undefined) {
                                el.style.zIndex = el.dataset.oldZ;
                                delete el.dataset.oldZ;
                            }
                            el = el.parentElement;
                        }
                    }
                }
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [isOpen]);

            return (
                <div ref={dropdownRef} className={`relative flex ${className}`} onClick={(e) => e.stopPropagation()}>
                    <div onClick={() => setIsOpen(!isOpen)} className="w-full h-full flex items-center justify-center cursor-pointer px-1 sm:px-2 text-[10px] sm:text-[11px] font-bold outline-none no-arrow hover:bg-white/5 transition-colors whitespace-nowrap">
                        {formatTitleCase(options[value] || value)}
                    </div>
                    {isOpen && (
                        <div className={`absolute right-0 min-w-[120px] w-max bg-zinc-900 border border-white/20 rounded-xl shadow-2xl z-[999999] overflow-hidden py-1.5 animate-fade-in-up ${dropDirection === 'up' ? 'bottom-[110%] mb-1' : 'top-[110%] mt-1'}`}>
                            {Object.entries(options).map(([key, label]) => (
                                <div key={key} onClick={(e) => { e.stopPropagation(); onChange(key); setIsOpen(false); }} className={`px-4 py-2.5 text-[11px] font-bold text-center cursor-pointer transition-colors ${value === key ? 'bg-emerald-500/20 text-emerald-400' : 'text-zinc-300 hover:bg-white/10 hover:text-white'}`}>
                                    {formatTitleCase(label)}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const PortfolioApp = () => {
            const [appState, setAppState] = useState('loading_vault');
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });

            const [formConfig, setFormConfig] = useState(githubConfig);
            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1, STOCK: 1 });

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };
            
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});
            const [expandedAssets, setExpandedAssets] = useState({});

            const [currencyLabels, setCurrencyLabels] = useState({ USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata', STOCK: 'Hisse' });
            const [portfolio, setPortfolio] = useState([]);

            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000);
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            const isInitialMount = useRef(true);
            const saveTimeoutRef = useRef(null);

            useEffect(() => {
                if (isInitialMount.current) { isInitialMount.current = false; return; }
                if (appState === 'app' && vaultPassword && !isSaving) {
                    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = setTimeout(() => handleSaveToGithub(true), 4000);
                }
                return () => { if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current); };
            }, [portfolio, currencyLabels]);

            useEffect(() => {
                if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                    setAppState('setup_github');
                    return;
                }
                const initializeApp = async () => {
                    setAppState('loading_vault');
                    setAuthError(""); 
                    try {
                        const cleanUser = githubConfig.username.trim();
                        const cleanRepo = githubConfig.repo.trim();
                        const cleanToken = githubConfig.token.trim();
                        const timestamp = new Date().getTime();

                        const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                            headers: { 'Authorization': `Bearer ${cleanToken}`, 'Accept': 'application/vnd.github.v3+json' }
                        });

                        if (response.status === 404) {
                            setAppState('set_password'); return;
                        } else if (response.status === 401) {
                            throw new Error("Erişim reddedildi: Token geçersiz.");
                        } else if (response.ok) {
                            const data = await response.json();
                            setFileSha(data.sha);
                            const decodedContent = decodeURIComponent(escape(atob(data.content)));
                            if (!decodedContent || decodedContent === "[]") { setAppState('set_password'); return; }
                            const vaultData = JSON.parse(decodedContent);

                            if (vaultData.isEncrypted) {
                                const sessionStr = localStorage.getItem('vault_session_v4');
                                if (sessionStr) {
                                    try {
                                        const session = JSON.parse(sessionStr);
                                        if (session.expiry > new Date().getTime()) {
                                            const bytes = CryptoJS.AES.decrypt(vaultData.payload, session.password);
                                            const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                                            if (decryptedString) {
                                                const parsedData = JSON.parse(decryptedString);
                                                setPortfolio(Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || []));
                                                if (!Array.isArray(parsedData) && parsedData.labels) setCurrencyLabels(parsedData.labels);
                                                setVaultPassword(session.password);
                                                setVaultSession(session.password);
                                                setAppState('app');
                                                const expandedInit = {};
                                                (Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || [])).forEach(p => expandedInit[p.id] = true);
                                                setExpandedPersons(expandedInit);
                                                return;
                                            }
                                        } else clearVaultSession();
                                    } catch (e) { clearVaultSession(); }
                                }
                                setAppState('enter_password');
                                sessionStorage.setItem('locked_vault', vaultData.payload);
                            }
                        }
                    } catch (error) { setAuthError(error.message); setAppState('setup_github'); }
                };
                initializeApp();
            }, [githubConfig]);

            const unlockVault = (e) => {
                e.preventDefault();
                setAuthError("");
                const encryptedPayload = sessionStorage.getItem('locked_vault');
                if (!encryptedPayload) { setAuthError("Veri bulunamadı."); return; }
                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedPayload, passwordInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decryptedString) throw new Error("Yanlış şifre");
                    const parsedData = JSON.parse(decryptedString);
                    setPortfolio(Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || []));
                    if (!Array.isArray(parsedData) && parsedData.labels) setCurrencyLabels(parsedData.labels);
                    setVaultPassword(passwordInput);
                    setVaultSession(passwordInput);
                    sessionStorage.removeItem('locked_vault');
                    setAppState('app');
                    const expandedInit = {};
                    (Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || [])).forEach(p => expandedInit[p.id] = true);
                    setExpandedPersons(expandedInit);
                } catch (error) { setAuthError("Hatalı Şifre!"); setPasswordInput(""); }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput);
                setPortfolio([]);
                setAppState('app');
            };

            const handleSaveToGithub = async (isAutoSave = false) => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify({ portfolio, labels: currencyLabels });
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));

                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${githubConfig.token.trim()}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: isAutoSave ? "🤖 Oto-Kayıt" : "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword);
                        if (!isAutoSave) showToast("Kasa başarıyla senkronize edildi", "success");
                    } else throw new Error("Kayıt reddedildi.");
                } catch (error) {
                    if (!isAutoSave) showToast("Kayıt Hatası! İnterneti kontrol edin.", "error");
                } finally {
                    setTimeout(() => setIsSaving(false), 800);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                localStorage.setItem('gh_config_v3', JSON.stringify({ username: formConfig.username.trim(), repo: formConfig.repo.trim(), token: formConfig.token.trim() }));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword(""); setPortfolio([]); clearVaultSession();
                setAppState('enter_password'); window.location.reload();
            };

            const fetchLiveRates = async () => {
                setIsLoadingRates(true);
                let updateMessage = "Piyasa güncellendi";
                let isError = false;

                // 1. Döviz ve Altın Çekimi
                try {
                    const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const data = await response.json();
                    const usdTry = data.usd.try;
                    let gramTry = rates.GRAM, ataTry = rates.ATA;

                    if (data.usd.xau) {
                        const xauUsd = 1 / data.usd.xau;
                        gramTry = (xauUsd / 31.1034768) * usdTry * 1.045; // Fiziksel prim
                        ataTry = gramTry * 6.88;
                    }
                    
                    setRates(prev => ({
                        ...prev, USD: parseFloat(usdTry.toFixed(2)), EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                        GRAM: parseFloat(gramTry.toFixed(2)), ATA: parseFloat(ataTry.toFixed(2))
                    }));
                } catch (err) {
                    console.error("Döviz hatası", err);
                    updateMessage = "Döviz güncellenemedi. Sadece hisseler kontrol ediliyor.";
                    isError = true;
                }

                // 2. Hisse Çekimi (Geliştirilmiş Midas Vari Algoritma)
                const stockTickers = new Set();
                portfolio.forEach(p => p.assets.forEach(a => {
                    if (a.subItems?.length > 0) {
                        a.subItems.forEach(s => { if (s.type === 'STOCK' && s.name) stockTickers.add(s.name.trim().split(' ')[0].toUpperCase()); });
                    } else if (a.type === 'STOCK' && a.name) stockTickers.add(a.name.trim().split(' ')[0].toUpperCase());
                }));

                if (stockTickers.size > 0) {
                    const priceMap = {};
                    let stocksFound = 0;

                    await Promise.allSettled(Array.from(stockTickers).map(async (ticker) => {
                        try {
                            const symbol = ticker.includes('.') ? ticker : `${ticker}.IS`;
                            // Daha stabil raw proxy kullanımı (Yahoo query2)
                            const url = `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}`;
                            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                            
                            const res = await fetch(proxyUrl);
                            if(!res.ok) throw new Error("Proxy veya Yahoo reddetti");
                            const json = await res.json();
                            const price = json.chart?.result?.[0]?.meta?.regularMarketPrice;
                            
                            if (price) {
                                priceMap[ticker] = price;
                                stocksFound++;
                            }
                        } catch (e) { console.warn(`${ticker} alınamadı:`, e); }
                    }));

                    if (stocksFound > 0) {
                        setPortfolio(prev => prev.map(p => ({
                            ...p,
                            assets: p.assets.map(a => {
                                if (a.subItems?.length > 0) {
                                    return { ...a, subItems: a.subItems.map(s => {
                                        if (s.type === 'STOCK' && s.name) {
                                            const t = s.name.trim().split(' ')[0].toUpperCase();
                                            if (priceMap[t]) return { ...s, currentPrice: priceMap[t] };
                                        }
                                        return s;
                                    })};
                                } else if (a.type === 'STOCK' && a.name) {
                                    const t = a.name.trim().split(' ')[0].toUpperCase();
                                    if (priceMap[t]) return { ...a, currentPrice: priceMap[t] };
                                }
                                return a;
                            })
                        })));
                        updateMessage = isError ? "Döviz çekilemedi ama hisseler güncellendi." : "Tüm piyasa güncellendi!";
                        isError = false;
                    } else {
                        updateMessage = isError ? "Hem döviz hem hisse API'leri şu an yanıt vermiyor." : "Döviz güncellendi ancak hisse fiyatları çekilemedi (Manuel giriş yapınız).";
                        if(!isError) isError = true; // Warning level
                    }
                }

                showToast(updateMessage, isError ? 'error' : 'success');
                setIsLoadingRates(false);
            };

            const safeParseNum = (val) => {
                if (!val) return 0;
                const num = typeof val === 'string' ? parseFloat(val.replace(',', '.')) : val;
                return isNaN(num) ? 0 : num;
            };

            const calculateAssetValue = (item) => {
                const getRate = (i) => i.type === 'STOCK' ? (safeParseNum(i.currentPrice) || safeParseNum(i.costPrice) || 0) : (rates[i.type] || 1);
                return safeParseNum(item.amount) * getRate(item);
            };

            const calculatePnL = (amount, rate, costPrice, type, currentPrice) => {
                const cost = safeParseNum(costPrice);
                const qty = safeParseNum(amount);
                const actualRate = type === 'STOCK' ? (safeParseNum(currentPrice) || cost) : rate;

                if (cost <= 0 || qty <= 0) return null;
                const profit = (qty * actualRate) - (qty * cost);
                const percentage = (qty * cost) > 0 ? (profit / (qty * cost)) * 100 : 0;
                
                return { profit, percentage, isProfit: profit > 0, isZero: profit === 0 };
            };

            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => {
                if (asset.subItems?.length > 0) return total + asset.subItems.reduce((t, sub) => t + calculateAssetValue(sub), 0);
                return total + calculateAssetValue(asset);
            }, 0);

            const grandTotal = useMemo(() => portfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [portfolio, rates]);

            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, assets: p.assets.map(a => a.id === assetId ? updater(a) : a) } : p));
            const updateSubItem = (personId, assetId, subId, field, value) => updatePortfolioAsset(personId, assetId, a => ({ ...a, subItems: a.subItems.map(s => s.id === subId ? { ...s, [field]: value } : s) }));

            const addAsset = (personId) => {
                const newId = `asset-${Date.now()}`;
                setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, assets: [...p.assets, { id: newId, name: '', type: 'TRY', amount: '', costPrice: '', currentPrice: '', subItems: [] }] } : p));
                setExpandedAssets(prev => ({ ...prev, [newId]: true }));
            };

            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    subItems.push({ id: `sub-${Date.now()}`, name: '', type: asset.type === 'STOCK' ? 'STOCK' : 'TRY', amount: '', costPrice: '', currentPrice: '' });
                    // Ana bakiyeyi silmeme mantığı düzeltildi. Artık girdiği miktar kaybolmuyor, sadece yeni boş bir kalem açılıyor.
                    return { ...asset, subItems };
                });
            };

            // UI Rendering Helpers
            const renderInputGroup = (item, onChangeAmount, onChangeCost, onChangeCurrent, onChangeType) => (
                <div className="flex flex-col gap-1 w-full relative z-[10]">
                    <div className="midas-input-group w-full relative">
                        <input type="number" value={item.amount} onChange={e => onChangeAmount(e.target.value)} className={`midas-input font-numbers text-sm ${item.type === 'STOCK' ? 'flex-[1]' : 'flex-[2]'}`} placeholder={item.type === 'STOCK' ? 'Adet' : 'Miktar'} />
                        <div className="midas-divider"></div>
                        <input type="number" value={item.costPrice || ''} onChange={e => onChangeCost(e.target.value)} disabled={item.type === 'TRY'} className={`midas-input font-numbers text-sm text-zinc-300 ${item.type === 'STOCK' ? 'flex-[1]' : 'flex-[2]'} ${item.type === 'TRY' ? 'opacity-30' : ''}`} placeholder="Maliyet ₺" />
                        
                        {item.type === 'STOCK' && (
                            <>
                                <div className="midas-divider"></div>
                                <input type="number" value={item.currentPrice || ''} onChange={e => onChangeCurrent(e.target.value)} className="midas-input font-numbers text-sm text-emerald-300 flex-[1.2]" placeholder="Anlık ₺" />
                            </>
                        )}
                        <div className="midas-divider"></div>
                        <CustomSelect value={item.type} options={currencyLabels} onChange={onChangeType} className={`text-white ${item.type === 'STOCK' ? 'flex-[0.8] min-w-[55px]' : 'flex-1 min-w-[70px]'}`} />
                    </div>

                    {item.costPrice && item.type !== 'TRY' && (() => {
                        const pnl = calculatePnL(item.amount, rates[item.type], item.costPrice, item.type, item.currentPrice);
                        if (!pnl) return null;
                        return (
                            <div className="flex justify-end pr-1 mt-1">
                                <span className={`text-[10px] font-bold tracking-widest px-2 py-1 rounded-md shadow-sm border ${pnl.isZero ? 'bg-zinc-800 border-zinc-700 text-zinc-400' : pnl.isProfit ? 'bg-emerald-900/40 border-emerald-800/50 text-emerald-400' : 'bg-red-900/40 border-red-800/50 text-red-400'}`}>
                                    {pnl.isProfit && !pnl.isZero ? '+' : ''}{pnl.percentage.toFixed(2)}% ({formatMoney(pnl.profit)})
                                </span>
                            </div>
                        );
                    })()}
                </div>
            );


            if (appState === 'loading_vault' || appState === 'setup_github' || appState === 'set_password' || appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        {appState === 'loading_vault' ? (
                            <div className="flex flex-col items-center gap-4">
                                <i className="fa-solid fa-vault text-primary text-5xl animate-float opacity-80"></i>
                                <p className="text-emerald-300 font-semibold tracking-widest uppercase text-xs animate-pulse opacity-70">Bağlanıyor</p>
                            </div>
                        ) : (
                            <div className="glass-card p-8 sm:p-10 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up premium-border">
                                {appState === 'setup_github' && (
                                    <form onSubmit={saveGithubConfig} className="flex flex-col gap-5 text-center">
                                        <i className="fa-brands fa-github text-5xl text-white mb-2 opacity-90"></i>
                                        <h3 className="text-2xl font-bold text-white tracking-tight">Kasa Erişimi</h3>
                                        {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                        <input required type="text" value={formConfig.username} onChange={e => setFormConfig({ ...formConfig, username: e.target.value })} placeholder="GitHub Kullanıcı Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none" />
                                        <input required type="text" value={formConfig.repo} onChange={e => setFormConfig({ ...formConfig, repo: e.target.value })} placeholder="Depo Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none" />
                                        <input required type="password" value={formConfig.token} onChange={e => setFormConfig({ ...formConfig, token: e.target.value })} placeholder="Erişim Token (PAT)" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none" />
                                        <button type="submit" className="mt-2 py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg shadow-emerald-500/20">BAĞLA</button>
                                    </form>
                                )}
                                {appState === 'set_password' && (
                                    <form onSubmit={setupNewVault} className="flex flex-col gap-6 text-center">
                                        <i className="fa-solid fa-shield-halved text-5xl text-emerald-400 mb-2 opacity-90"></i>
                                        <h3 className="text-2xl font-bold text-white mb-2">Şifre Oluştur</h3>
                                        {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                        <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] font-bold" />
                                        <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white">BAŞLAT</button>
                                    </form>
                                )}
                                {appState === 'enter_password' && (
                                    <form onSubmit={unlockVault} className="flex flex-col gap-6 text-center">
                                        <i className="fa-solid fa-lock text-5xl text-white opacity-80 mb-2"></i>
                                        <h3 className="text-2xl font-bold text-white">Kasaya Giriş</h3>
                                        {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                        <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="······" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] font-bold" />
                                        <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-white text-black">KİLİDİ AÇ</button>
                                    </form>
                                )}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="mx-auto w-full max-w-[95%] xl:max-w-6xl pt-6 pb-20 relative z-10 animate-fade-in-up">
                    <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl premium-border backdrop-blur-xl ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-8 pointer-events-none'} ${toast.type === 'error' ? 'bg-red-500/20 border-red-500/30' : 'bg-emerald-500/20 border-emerald-500/30'}`}>
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${toast.type === 'error' ? 'bg-red-500/30 text-red-200' : 'bg-emerald-500/30 text-emerald-300'}`}>
                            <i className={`fa-solid text-[10px] ${toast.type === 'error' ? 'fa-triangle-exclamation' : 'fa-check'}`}></i>
                        </div>
                        <p className={`font-bold text-xs tracking-wide ${toast.type === 'error' ? 'text-red-100' : 'text-emerald-50'}`}>{toast.message}</p>
                    </div>

                    <header className="flex justify-between items-center pb-5 mb-8 border-b border-white/10">
                        <button onClick={lockVault} className="w-10 h-10 rounded-full glass-surface flex items-center justify-center text-zinc-400 hover:text-red-400 hover:bg-red-500/10 transition-colors">
                            <i className="fa-solid fa-lock text-sm"></i>
                        </button>
                        <div className="flex flex-col items-center">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center mb-2 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                                <i className="fa-solid fa-chart-pie text-white text-lg"></i>
                            </div>
                            <h1 className="text-[10px] font-bold tracking-widest text-zinc-300 uppercase">Midas Vari Kasa</h1>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className={`text-[9px] uppercase font-bold tracking-widest transition-opacity duration-300 flex items-center gap-1.5 ${isSaving ? 'opacity-100 text-emerald-400' : 'opacity-0'}`}>
                                <i className="fa-solid fa-cloud-arrow-up animate-bounce"></i> <span className="hidden sm:inline">Eşitleniyor</span>
                            </span>
                        </div>
                    </header>

                    <div className="text-center py-4 mb-8 flex flex-col items-center px-2">
                        <h2 className="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight text-white font-numbers drop-shadow-lg">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    <div className="mb-10 glass-card p-4 sm:p-5 rounded-3xl max-w-2xl mx-auto border-t border-white/10">
                        <div className="flex justify-between items-center mb-4 px-2">
                            <p className="text-[10px] font-bold text-zinc-300 uppercase tracking-wider flex items-center gap-1.5">
                                <i className="fa-solid fa-bolt text-yellow-400"></i> Canlı Piyasa
                            </p>
                            <button onClick={fetchLiveRates} disabled={isLoadingRates} className="text-[10px] text-zinc-900 bg-emerald-400 hover:bg-emerald-300 uppercase font-bold tracking-wider flex items-center gap-2 px-4 py-2 rounded-xl transition-colors shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin" : ""}`}></i> VERİLERİ ÇEK
                            </button>
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3">
                            {['TRY', 'USD', 'EUR', 'GRAM', 'ATA'].map(currency => (
                                <div key={currency} className="glass-surface p-3 rounded-xl flex flex-col items-center border border-transparent hover:border-emerald-500/30 transition-colors">
                                    <textarea rows={1} value={currencyLabels[currency] || currency} onChange={(e) => setCurrencyLabels(prev => ({ ...prev, [currency]: e.target.value }))} className="text-[9px] text-zinc-400 font-bold tracking-widest mb-1 uppercase bg-transparent text-center outline-none hover:text-white w-full border-b border-transparent resize-none overflow-hidden" style={{ minHeight: '16px' }} />
                                    <input type="number" value={rates[currency]} disabled={currency === 'TRY'} onChange={(e) => setRates(prev => ({ ...prev, [currency]: parseFloat(e.target.value) || 0 }))} className={`w-full text-base sm:text-lg font-bold font-numbers outline-none bg-transparent text-center px-0 ${['GRAM', 'ATA'].includes(currency) ? 'text-yellow-400' : 'text-white'} ${currency === 'TRY' ? 'opacity-50' : ''}`} />
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 items-start">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = expandedPersons[person.id] !== false;

                            return (
                                <div key={person.id} className={`glass-card rounded-[2rem] transition-all duration-300 ${isOpen ? 'shadow-2xl border-white/10' : 'hover:border-white/10 shadow-lg'}`}>
                                    <div onClick={() => setExpandedPersons(prev => ({ ...prev, [person.id]: !prev[person.id] }))} className={`p-5 sm:p-6 flex justify-between items-center cursor-pointer transition-colors ${isOpen ? 'bg-white/5 rounded-t-[2rem]' : 'rounded-[2rem]'}`}>
                                        <div className="flex flex-col flex-1 min-w-0 pr-3">
                                            <input type="text" value={person.person} onChange={(e) => setPortfolio(prev => prev.map(p => p.id === person.id ? { ...p, person: e.target.value } : p))} onClick={e => e.stopPropagation()} className="bg-transparent text-xl font-bold text-white uppercase tracking-wide w-full outline-none placeholder:text-zinc-600" placeholder="PORTFÖY ADI" />
                                            <div className="flex items-center gap-1.5 mt-1 pl-0.5">
                                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-400"></div>
                                                <p className="text-[9px] text-zinc-400 font-semibold uppercase tracking-widest">{person.assets.length} Varlık</p>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-3 shrink-0">
                                            <span className="text-base font-bold font-numbers text-white">{formatMoney(personTotal)}</span>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-transform duration-300 ${isOpen ? 'bg-white text-black rotate-180' : 'glass-surface text-zinc-400'}`}><i className="fa-solid fa-chevron-down text-xs"></i></div>
                                        </div>
                                    </div>

                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-white/5">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems?.length > 0;
                                                const isAssetOpen = expandedAssets[asset.id];
                                                const assetValue = hasSubItems ? asset.subItems.reduce((t, sub) => t + calculateAssetValue(sub), 0) : calculateAssetValue(asset);

                                                return (
                                                    <div key={asset.id} className="glass-surface rounded-2xl flex flex-col">
                                                        <div onClick={() => setExpandedAssets(prev => ({ ...prev, [asset.id]: !prev[asset.id] }))} className="p-4 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded-t-2xl transition-colors group">
                                                            <div className="flex items-center gap-3 flex-1 min-w-0 pr-2">
                                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-colors ${asset.type === 'STOCK' ? 'bg-purple-500/20 text-purple-400' : 'bg-black/40 text-emerald-400'}`}>
                                                                    <i className={`fa-solid ${asset.type === 'STOCK' ? 'fa-chart-line' : 'fa-wallet'} text-xs`}></i>
                                                                </div>
                                                                <input type="text" value={asset.name} onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: e.target.value.toUpperCase() }))} onClick={e => e.stopPropagation()} className="flex-1 min-w-0 bg-transparent font-bold text-white text-sm outline-none placeholder:text-zinc-600 uppercase" placeholder={asset.type === 'STOCK' ? "HİSSE KODU (Örn: THYAO)" : "VARLIK / KURUM ADI"} />
                                                            </div>
                                                            <div className="flex items-center gap-3 shrink-0">
                                                                <div className="text-right">
                                                                    <span className="text-sm font-bold font-numbers text-white">{formatMoney(assetValue)}</span>
                                                                    {hasSubItems && !isAssetOpen && <div className="text-[9px] text-zinc-500 font-semibold tracking-widest uppercase mt-0.5">{asset.subItems.length} Kalem</div>}
                                                                </div>
                                                                <button onClick={(e) => { e.stopPropagation(); if (window.confirm("Bu varlığı silmek istediğinize emin misiniz?")) setPortfolio(prev => prev.map(p => p.id === person.id ? { ...p, assets: p.assets.filter(a => a.id !== asset.id) } : p)); }} className="text-zinc-500 hover:text-red-400 p-1.5"><i className="fa-solid fa-trash text-[11px]"></i></button>
                                                            </div>
                                                        </div>

                                                        <div className={`accordion-content ${isAssetOpen ? 'open' : ''}`}>
                                                            <div className="p-4 pt-1 flex flex-col gap-4 border-t border-white/5">
                                                                <div className="flex flex-col gap-3">
                                                                    {!hasSubItems ? (
                                                                        renderInputGroup(
                                                                            asset, 
                                                                            (v) => updatePortfolioAsset(person.id, asset.id, a => ({...a, amount: v})),
                                                                            (v) => updatePortfolioAsset(person.id, asset.id, a => ({...a, costPrice: v})),
                                                                            (v) => updatePortfolioAsset(person.id, asset.id, a => ({...a, currentPrice: v})),
                                                                            (v) => updatePortfolioAsset(person.id, asset.id, a => ({...a, type: v}))
                                                                        )
                                                                    ) : (
                                                                        <div className="inline-flex items-center gap-2 bg-emerald-500/10 border border-emerald-500/20 px-3 py-2 rounded-xl w-fit">
                                                                            <span className="text-[9px] font-bold text-emerald-300 tracking-widest uppercase">Parçalı Varlık Aktif</span>
                                                                        </div>
                                                                    )}

                                                                    <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-zinc-400 hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 bg-black/20 px-4 py-2.5 rounded-xl transition-colors hover:bg-black/40 border border-white/5">
                                                                        <i className="fa-solid fa-layer-group text-[9px]"></i> Parçalı Alım Ekle
                                                                    </button>
                                                                </div>

                                                                {hasSubItems && (
                                                                    <div className="flex flex-col gap-3 pl-2 border-l-2 border-white/10 ml-2 mt-2">
                                                                        {asset.subItems.map((sub) => (
                                                                            <div key={sub.id} className="flex flex-col gap-2 p-3 rounded-xl bg-black/30 border border-white/5">
                                                                                <div className="flex items-center justify-between gap-2">
                                                                                    <input type="text" value={sub.name} onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'name', e.target.value.toUpperCase())} className="bg-transparent text-xs font-bold text-zinc-200 outline-none flex-1 placeholder:text-zinc-600 uppercase" placeholder={sub.type === 'STOCK' ? "HİSSE KODU (Örn: EREGL)" : "Açıklama (Örn: Ziraat)"} />
                                                                                    <button onClick={() => { if (window.confirm("Bu alt kalemi silmek istediğinize emin misiniz?")) updatePortfolioAsset(person.id, asset.id, a => ({ ...a, subItems: a.subItems.filter(s => s.id !== sub.id) })); }} className="text-zinc-500 hover:text-red-400"><i className="fa-solid fa-times text-[12px]"></i></button>
                                                                                </div>
                                                                                {renderInputGroup(
                                                                                    sub,
                                                                                    (v) => updateSubItem(person.id, asset.id, sub.id, 'amount', v),
                                                                                    (v) => updateSubItem(person.id, asset.id, sub.id, 'costPrice', v),
                                                                                    (v) => updateSubItem(person.id, asset.id, sub.id, 'currentPrice', v),
                                                                                    (v) => updateSubItem(person.id, asset.id, sub.id, 'type', v)
                                                                                )}
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-white/5 mt-2">
                                                <button onClick={() => { if (window.confirm("Bu portföyü silmek istediğine emin misin?")) { setPortfolio(prev => prev.filter(p => p.id !== person.id)); setExpandedPersons(prev => { const n = {...prev}; delete n[person.id]; return n; }); } }} className="text-[10px] text-zinc-500 hover:text-red-400 font-bold uppercase tracking-widest px-4 py-3 bg-black/20 rounded-xl transition-all hover:bg-red-900/20">
                                                    SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-black bg-emerald-500 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-400 transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)]">
                                                    + YENİ VARLIK EKLE
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        <div className="pt-2 pb-10">
                            <button onClick={() => { const newId = `person-${Date.now()}`; setPortfolio(prev => [...prev, { id: newId, person: '', assets: [] }]); setExpandedPersons(prev => ({ ...prev, [newId]: true })); }} className="w-full py-10 border border-dashed border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-white/5 group">
                                <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                    <i className="fa-solid fa-plus text-lg"></i>
                                </div>
                                YENİ PORTFÖY OLUŞTUR
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>

</html>
