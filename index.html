<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Varlık Yönetimi</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- CryptoJS (Şifreleme Motoru - Güvenlik İçin) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#09090b',
                        card: '#18181b',
                        primary: '#10b981',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: '-apple-system', 'Inter', sans-serif; background-color: #000000; color: #ffffff; -webkit-font-smoothing: antialiased; }
        
        input[type="number"], input[type="text"], input[type="password"], select { font-size: 16px !important; background: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 2000px;
            opacity: 1;
        }

        .stealth-input {
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .stealth-input:focus {
            border-bottom: 1px solid #10b981;
            outline: none;
        }
    </style>
</head>
<body class="antialiased min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const PortfolioApp = () => {
            // Uygulama Durumları
            const [appState, setAppState] = useState('loading_vault');
            
            // Güvenlik & GitHub Konfigürasyonu
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: 'hp_2IKC1s9CUaieaeBhsOEiG3r4LCUC4L2y14nq', username: 'turkyeray', repo: 'portfoy-kasa' };
            });
            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState(""); 
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");

            // Finansal ve Kur Bilgileri
            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1 });
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [lastUpdated, setLastUpdated] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [openPersonId, setOpenPersonId] = useState(null); 

            // Temiz Başlangıç Verisi (Eski rakamlar kaldırıldı)
            const defaultData = [];

            const [portfolio, setPortfolio] = useState([]);

            // ==========================================
            // OTURUM (SESSION) YÖNETİMİ (30 DAKİKA)
            // ==========================================
            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000); 
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');

            // ==========================================
            // KASA BAŞLATMA VE GITHUB OKUMA
            // ==========================================
            useEffect(() => {
                if (!githubConfig.token || !githubConfig.username || !githubConfig.repo) {
                    setAppState('setup_github');
                    return;
                }

                const initializeApp = async () => {
                    setAppState('loading_vault');

                    try {
                        const cleanUser = githubConfig.username.trim();
                        const cleanRepo = githubConfig.repo.trim();
                        const cleanToken = githubConfig.token.trim();
                        const timestamp = new Date().getTime();

                        const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                            headers: { 
                                'Authorization': `Bearer ${cleanToken}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        });

                        if (response.status === 404) {
                            const repoCheck = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}?t=${timestamp}`, {
                                headers: { 'Authorization': `Bearer ${cleanToken}` }
                            });
                            
                            if (repoCheck.status === 404) throw new Error("Depo bulunamadı! Ayarlarınızı kontrol edin.");
                            else if (!repoCheck.ok) throw new Error("GitHub erişim izni vermedi. Token hatalı olabilir.");
                            
                            setAppState('set_password');
                            return; 
                            
                        } else if (response.status === 401) {
                            throw new Error("Token geçersiz veya yetkisiz! Lütfen yeni bir token alın.");
                        } else if (response.ok) {
                            const data = await response.json();
                            setFileSha(data.sha);
                            
                            const decodedContent = decodeURIComponent(escape(atob(data.content)));
                            
                            if (!decodedContent || decodedContent === "[]") {
                                setAppState('set_password');
                                return;
                            }

                            const vaultData = JSON.parse(decodedContent);

                            if (vaultData.isEncrypted) {
                                // 30 Dakikalık Oturum Kontrolü
                                const sessionStr = localStorage.getItem('vault_session_v4');
                                if (sessionStr) {
                                    try {
                                        const session = JSON.parse(sessionStr);
                                        if (session.expiry > new Date().getTime()) {
                                            const bytes = CryptoJS.AES.decrypt(vaultData.payload, session.password);
                                            const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                                            
                                            if (decryptedString) {
                                                const parsedData = JSON.parse(decryptedString);
                                                setPortfolio(parsedData);
                                                setVaultPassword(session.password);
                                                setVaultSession(session.password); 
                                                setAppState('app');
                                                return; 
                                            }
                                        } else {
                                            clearVaultSession(); 
                                        }
                                    } catch(e) {
                                        clearVaultSession(); 
                                    }
                                }

                                setAppState('enter_password');
                                sessionStorage.setItem('locked_vault', vaultData.payload);
                            } else {
                                setPortfolio(vaultData);
                                setAppState('app');
                            }
                        }
                    } catch (error) {
                        console.error("Kasa okuma hatası:", error);
                        setAuthError(error.message);
                        setAppState('setup_github');
                    }
                };
                
                initializeApp();
            }, [githubConfig]);

            // ==========================================
            // KASA KİLİDİ AÇMA (DECRYPT)
            // ==========================================
            const unlockVault = (e) => {
                e.preventDefault();
                setAuthError("");
                const encryptedPayload = sessionStorage.getItem('locked_vault');
                
                if (!encryptedPayload) {
                    setAuthError("Kriptolu veri bulunamadı, baştan başlatın.");
                    return;
                }

                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedPayload, passwordInput);
                    const decryptedString = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (!decryptedString) throw new Error("Yanlış şifre"); 

                    const parsedData = JSON.parse(decryptedString);
                    setPortfolio(parsedData);
                    setVaultPassword(passwordInput); 
                    setVaultSession(passwordInput); 
                    sessionStorage.removeItem('locked_vault');
                    setAppState('app');
                } catch (error) {
                    setAuthError("Hatalı Şifre! Kasa açılamadı.");
                    setPasswordInput("");
                }
            };

            // ==========================================
            // YENİ KASA ŞİFRESİ BELİRLEME
            // ==========================================
            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) {
                    setAuthError("Şifre en az 4 haneli olmalıdır.");
                    return;
                }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput); 
                setPortfolio(defaultData); 
                setAppState('app'); 
            };

            // ==========================================
            // GITHUB'A ŞİFRELİ KAYDETME (ENCRYPT)
            // ==========================================
            const handleSaveToGithub = async () => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify(portfolio);
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    
                    const vaultPackage = {
                        isEncrypted: true,
                        lastUpdate: new Date().toISOString(),
                        payload: encryptedPayload
                    };

                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));
                    
                    const body = {
                        message: "🔒 Kasa güncellendi",
                        content: contentBase64,
                        ...(fileSha ? { sha: fileSha } : {}) 
                    };

                    const cleanUser = githubConfig.username.trim();
                    const cleanRepo = githubConfig.repo.trim();
                    const cleanToken = githubConfig.token.trim();

                    const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${cleanToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword); 
                        setTimeout(() => setIsSaving(false), 800); 
                    } else {
                        throw new Error("Kayıt işlemi GitHub tarafından reddedildi.");
                    }
                } catch (error) {
                    console.error("Kayıt hatası:", error);
                    alert("Kayıt Başarısız: İnternet bağlantınızı kontrol edin.");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = {
                    username: githubConfig.username.trim(),
                    repo: githubConfig.repo.trim(),
                    token: githubConfig.token.trim()
                };
                localStorage.setItem('gh_config_v3', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword("");
                setPortfolio([]);
                clearVaultSession(); 
                setAppState('enter_password');
                window.location.reload();
            };

            // ==========================================
            // PİYASA VE FİNANSAL HESAPLAMALAR
            // ==========================================
            const fetchLiveRates = async () => {
                try {
                    setIsLoadingRates(true);
                    const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    const data = await response.json();
                    const usdTry = data.usd.try;

                    let grandBazaarGramTry = rates.GRAM;
                    let grandBazaarAtaTry = rates.ATA;

                    if (data.usd.xau) {
                        const xauUsd = 1 / data.usd.xau;
                        const spotGramGoldUsd = xauUsd / 31.1034768;
                        const spotGramGoldTry = spotGramGoldUsd * usdTry;
                        const physicalPremium = 1.045; 
                        grandBazaarGramTry = spotGramGoldTry * physicalPremium;
                        grandBazaarAtaTry = grandBazaarGramTry * 6.88; 
                    }

                    setRates(prev => ({
                        ...prev, 
                        USD: parseFloat(usdTry.toFixed(2)),
                        EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                        GRAM: parseFloat(grandBazaarGramTry.toFixed(2)),
                        ATA: parseFloat(grandBazaarAtaTry.toFixed(2))
                    }));
                    setLastUpdated(new Date());
                } catch (err) { console.error("Fiyat çekme hatası", err); } finally { setIsLoadingRates(false); }
            };

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };
            const safeParseNum = (val) => { const num = parseFloat(val); return isNaN(num) ? 0 : num; };
            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => total + (safeParseNum(sub.amount) * (rates[sub.type] || 1)), 0);
                }
                return safeParseNum(asset.amount) * (rates[asset.type] || 1);
            };
            const calculatePersonTotal = (assets) => assets.reduce((total, asset) => total + calculateAssetValue(asset), 0);
            const grandTotal = useMemo(() => portfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [portfolio, rates]);
            const formatMoney = (value) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value) + " ₺";

            const updatePersonName = (personId, newName) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, person: newName } : p));
            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? updater(asset) : asset) } : person));
            
            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    let currentAmount = asset.amount;
                    if (subItems.length === 0 && safeParseNum(asset.amount) > 0) {
                        subItems.push({ id: `sub-main-${Date.now()}`, name: 'Nakit / Bakiye', type: asset.type, amount: asset.amount });
                        currentAmount = ""; 
                    }
                    subItems.push({ id: `sub-${Date.now() + 1}`, name: 'Yeni Kalem', type: 'TRY', amount: '' });
                    return { ...asset, amount: currentAmount, subItems };
                });
            };

            const removeSubItem = (personId, assetId, subItemId) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== subItemId) }));
            const updateSubItem = (personId, assetId, subItemId, field, value) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.map(sub => sub.id === subItemId ? { ...sub, [field]: value } : sub) }));
            const addAsset = (personId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: [...person.assets, { id: `asset-${Date.now()}`, name: 'Yeni Varlık', type: 'TRY', amount: '', icon: 'Landmark', subItems: [] }] } : person));
            const removeAsset = (personId, assetId) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.filter(a => a.id !== assetId) } : person));
            const removePerson = (personId) => { if(confirm("Tüm portföy silinecek. Emin misin?")) setPortfolio(prev => prev.filter(p => p.id !== personId)); };
            const addNewPerson = () => setPortfolio(prev => [...prev, { id: `person-${Date.now()}`, person: 'YENİ KİŞİ', assets: [] }]);


            // ==========================================
            // GÜVENLİK EKRANLARI
            // ==========================================

            if (appState === 'loading_vault') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-4 bg-background">
                        <i className="fa-solid fa-vault text-primary text-5xl fa-bounce"></i>
                        <p className="text-zinc-500 font-bold tracking-widest uppercase text-sm animate-pulse text-center">Kasa Bağlantısı Kuruluyor...</p>
                    </div>
                );
            }

            if (appState === 'setup_github') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={saveGithubConfig} className="bg-card border border-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent"></div>
                            <div className="text-center mb-8">
                                <i className="fa-brands fa-github text-4xl text-white mb-3"></i>
                                <h3 className="text-xl font-bold text-white">GitHub Kasası</h3>
                                <p className="text-xs text-zinc-500 mt-2">Private Repository bilgilerinizi giriniz. Bu bilgiler cihazınızda güvenle tutulur.</p>
                            </div>
                            
                            {authError && <div className="bg-red-900/30 text-red-400 text-[11px] p-3 rounded-xl mb-6 text-center border border-red-900/50">{authError}</div>}

                            <div className="space-y-5">
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5 text-center">GitHub Kullanıcı Adı</label>
                                    <input required type="text" value={githubConfig.username} onChange={e => setGithubConfig({...githubConfig, username: e.target.value})} placeholder="Örn: turkyeray" className="w-full bg-background border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-colors text-sm"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5 text-center">Depo Adı</label>
                                    <input required type="text" value={githubConfig.repo} onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})} placeholder="Örn: portfoy-kasa" className="w-full bg-background border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-colors text-sm"/>
                                </div>
                                <div>
                                    <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5 text-center">Token (PAT)</label>
                                    <input required type="password" value={githubConfig.token} onChange={e => setGithubConfig({...githubConfig, token: e.target.value})} placeholder="ghp_..." className="w-full bg-background border border-zinc-800 rounded-xl px-4 py-3 text-center text-white outline-none focus:border-primary transition-colors text-sm"/>
                                </div>
                            </div>
                            <button type="submit" className="w-full mt-8 py-3.5 rounded-xl font-bold text-sm bg-primary text-background hover:bg-primary/90 transition-colors shadow-[0_0_20px_rgba(16,185,129,0.3)]">Kasayı Bağla</button>
                        </form>
                    </div>
                );
            }

            if (appState === 'set_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={setupNewVault} className="bg-card border border-primary/30 p-8 rounded-3xl w-full max-w-sm shadow-[0_0_50px_rgba(16,185,129,0.1)] text-center">
                            <i className="fa-solid fa-shield-check text-5xl text-primary mb-4"></i>
                            <h3 className="text-xl font-bold text-white">Kasa Şifresi Oluştur</h3>
                            <p className="text-xs text-zinc-400 mt-2 mb-6">Kasanız hazır. Verileriniz şifrelenerek saklanacaktır. Lütfen güçlü bir şifre belirleyin.</p>
                            
                            {authError && <p className="text-red-400 text-xs mb-4">{authError}</p>}

                            <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre Belirle" className="w-full bg-background border border-zinc-700 rounded-xl px-4 py-3.5 text-center text-white outline-none focus:border-primary mb-4 text-lg tracking-widest"/>
                            <button type="submit" className="w-full py-3.5 rounded-xl font-bold text-sm bg-primary text-background hover:bg-primary/90 transition-colors">Başlat</button>
                        </form>
                    </div>
                );
            }

            if (appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-background">
                        <form onSubmit={unlockVault} className="bg-card border border-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
                            <i className="fa-solid fa-lock text-5xl text-zinc-600 mb-4 drop-shadow-md"></i>
                            <h3 className="text-xl font-bold text-white mb-6">Kasaya Giriş</h3>
                            
                            {authError && <div className="bg-red-900/30 text-red-400 text-xs p-3 rounded-xl mb-4 border border-red-900/50">{authError}</div>}

                            <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifrenizi Girin" className="w-full bg-background border border-zinc-800 rounded-xl px-4 py-3.5 text-center text-white outline-none focus:border-primary focus:shadow-[0_0_15px_rgba(16,185,129,0.2)] transition-all mb-4 text-lg tracking-widest"/>
                            <button type="submit" className="w-full py-3.5 rounded-xl font-bold text-sm bg-zinc-800 text-white hover:bg-zinc-700 border border-zinc-700 transition-colors">Kilidi Aç</button>
                            <p className="text-[10px] text-zinc-500 mt-4">* Oturum 30 dakika boyunca aktif kalacaktır.</p>
                        </form>
                    </div>
                );
            }

            // ==========================================
            // ANA UYGULAMA EKRANI (KASA AÇIK)
            // ==========================================
            return (
                <div className="max-w-md mx-auto md:max-w-4xl pt-6 pb-12 relative">
                    
                    {/* Header Bölümü */}
                    <header className="flex justify-between items-center px-6 pb-6 border-b border-zinc-900/50 mb-6">
                        <div className="w-1/3 flex justify-start gap-3">
                             <button onClick={lockVault} className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500 hover:text-red-400 hover:bg-red-500/10 transition-colors" title="Kasayı Kilitle">
                                <i className="fa-solid fa-lock text-sm sm:text-base"></i>
                            </button>
                        </div>
                        
                        <div className="w-1/3 flex flex-col items-center justify-center">
                            <i className="fa-solid fa-building-columns text-primary text-2xl sm:text-3xl mb-1 drop-shadow-[0_0_15px_rgba(16,185,129,0.4)]"></i>
                            <h1 className="text-[9px] sm:text-[10px] font-black tracking-[0.3em] text-zinc-500 uppercase text-center">Aile Portföyü</h1>
                        </div>

                        <div className="w-1/3 flex justify-end">
                            <button 
                                onClick={handleSaveToGithub} 
                                disabled={isSaving}
                                className={`flex items-center gap-2 font-bold text-xs px-3 py-2 sm:text-sm sm:px-5 sm:py-2.5 rounded-xl transition-all border ${isSaving ? 'bg-primary text-background border-primary shadow-[0_0_15px_rgba(16,185,129,0.5)]' : 'bg-primary/10 text-primary border-primary/20 hover:bg-primary hover:text-background'}`}
                            >
                                <i className={`fa-solid ${isSaving ? 'fa-check' : 'fa-cloud-arrow-up'} text-sm sm:text-lg`}></i>
                                <span className="hidden sm:inline">{isSaving ? 'Kaydedildi' : 'Kaydet'}</span>
                            </button>
                        </div>
                    </header>

                    {/* Toplam Bakiye Göstergesi */}
                    <div className="text-center px-4 py-4 mb-4 flex flex-col items-center">
                        <p className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase mb-2 bg-zinc-900 px-3 py-1 rounded-full border border-zinc-800 text-center">Toplam Net Varlık</p>
                        <h2 className="text-4xl sm:text-5xl md:text-6xl font-black tracking-tighter text-white drop-shadow-md text-center">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    {/* Piyasa Kurları Grid Sistemi */}
                    <div className="mb-10">
                        <div className="flex justify-between items-center px-4 mb-3">
                            <p className="text-[10px] sm:text-xs font-bold text-zinc-500 uppercase tracking-widest ml-1 text-center">Piyasa Fiyatları</p>
                            <button onClick={fetchLiveRates} className="text-[9px] sm:text-[10px] text-zinc-400 hover:text-white uppercase font-bold tracking-widest flex items-center gap-1.5 bg-zinc-900 px-3 py-1.5 rounded-lg border border-zinc-800 transition-colors">
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin text-primary" : ""}`}></i> Güncelle
                            </button>
                        </div>
                        <div className="grid grid-cols-5 gap-1.5 sm:gap-3 px-4 pb-4">
                            {Object.keys(rates).filter(k => k !== 'TRY').map(currency => (
                                <div key={currency} className="bg-card p-2 sm:p-3 rounded-xl border border-zinc-800/80 hover:border-zinc-700 transition-colors flex flex-col items-center">
                                    <p className="text-[9px] sm:text-[10px] text-zinc-500 font-bold tracking-wider mb-1 sm:mb-1.5 text-center">{currency}</p>
                                    <input 
                                        type="number" 
                                        value={rates[currency]} 
                                        onChange={(e) => handleRateChange(currency, e.target.value)} 
                                        className={`w-full text-xs sm:text-base font-bold outline-none bg-transparent text-center px-0 ${['GRAM', 'ATA'].includes(currency) ? 'text-amber-400' : 'text-zinc-200'}`}
                                    />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Portföyler (Akordeon Yapısı) */}
                    <div className="px-4 space-y-4">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = openPersonId === person.id;

                            return (
                                <div key={person.id} className={`bg-card rounded-3xl overflow-hidden transition-all border ${isOpen ? 'border-zinc-700 shadow-xl' : 'border-zinc-800/50 hover:border-zinc-700/80'}`}>
                                    
                                    <div onClick={() => setOpenPersonId(isOpen ? null : person.id)} className="p-4 sm:p-5 flex justify-between items-center cursor-pointer transition-colors">
                                        <div className="flex flex-col w-1/2">
                                            <input 
                                                type="text" 
                                                value={person.person} 
                                                onChange={(e) => updatePersonName(person.id, e.target.value)} 
                                                onClick={(e) => e.stopPropagation()} 
                                                className="bg-transparent text-base sm:text-lg font-bold text-white uppercase tracking-wider w-full outline-none stealth-input text-left"
                                            />
                                            <p className="text-[9px] sm:text-[10px] text-zinc-500 font-semibold uppercase tracking-wider mt-1 text-left">
                                                {person.assets.length} Varlık Kalemi
                                            </p>
                                        </div>
                                        <div className="text-right flex items-center gap-3 sm:gap-4 shrink-0">
                                            <span className="text-base sm:text-lg font-black text-primary text-right">{formatMoney(personTotal)}</span>
                                            <div className="w-6 h-6 sm:w-8 sm:h-8 rounded-full bg-zinc-800/50 flex items-center justify-center shrink-0">
                                                <i className={`fa-solid fa-chevron-${isOpen ? 'up text-white' : 'down text-zinc-500'} text-[10px] transition-all`}></i>
                                            </div>
                                        </div>
                                    </div>

                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-5 pb-5 pt-1 space-y-3 bg-zinc-950/30">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);
                                                
                                                return (
                                                    <div key={asset.id} className="bg-zinc-900/80 rounded-2xl p-3 sm:p-4 border border-zinc-800/80 hover:border-zinc-700 transition-colors">
                                                        <div className="flex justify-between items-center mb-3">
                                                            <input 
                                                                type="text" 
                                                                value={asset.name} 
                                                                onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: e.target.value }))} 
                                                                className="bg-transparent font-semibold text-zinc-100 text-xs sm:text-sm outline-none stealth-input w-full text-left"
                                                            />
                                                            <div className="flex items-center gap-2 sm:gap-3 shrink-0 ml-2">
                                                                <span className="text-xs sm:text-sm font-bold text-white text-right">{formatMoney(assetValue)}</span>
                                                                <button onClick={() => removeAsset(person.id, asset.id)} className="text-zinc-600 hover:text-red-400 bg-zinc-950 w-6 h-6 rounded-md flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                            </div>
                                                        </div>

                                                        <div className="flex justify-between items-center">
                                                            {!hasSubItems ? (
                                                                <div className="flex items-center gap-2">
                                                                    <input 
                                                                        type="number" 
                                                                        value={asset.amount} 
                                                                        onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, amount: e.target.value}))} 
                                                                        placeholder="0" 
                                                                        className="bg-transparent text-primary font-bold text-sm w-20 sm:w-24 outline-none stealth-input text-left"
                                                                    />
                                                                    <select 
                                                                        value={asset.type} 
                                                                        onChange={(e) => updatePortfolioAsset(person.id, asset.id, a => ({...a, type: e.target.value}))} 
                                                                        className="bg-zinc-800 text-[10px] sm:text-xs font-bold text-zinc-400 outline-none px-2 py-1 rounded"
                                                                    >
                                                                        <option value="TRY">TL</option>
                                                                        <option value="USD">DOLAR</option>
                                                                        <option value="EUR">EURO</option>
                                                                        <option value="GRAM">GRAM</option>
                                                                        <option value="ATA">ATA</option>
                                                                    </select>
                                                                </div>
                                                            ) : (
                                                                <span className="text-[9px] sm:text-[10px] text-primary font-bold uppercase tracking-wider bg-primary/10 px-2 py-1 rounded border border-primary/20 text-center">Alt Kalemler Kullanımda</span>
                                                            )}

                                                            <button onClick={() => addSubItem(person.id, asset.id)} className="text-[9px] sm:text-[10px] text-zinc-400 hover:text-primary font-bold uppercase tracking-wider flex items-center gap-1 bg-zinc-800 px-2 py-1 rounded transition-colors">
                                                                <i className="fa-solid fa-plus"></i> Alt Kalem
                                                            </button>
                                                        </div>

                                                        {hasSubItems && (
                                                            <div className="mt-4 space-y-2 border-l-2 border-zinc-800 pl-2 sm:pl-3 ml-1">
                                                                {asset.subItems.map((sub) => (
                                                                    <div key={sub.id} className="flex flex-col gap-1.5 bg-black/20 p-2 rounded-xl">
                                                                        <div className="flex justify-between items-center">
                                                                            <input 
                                                                                type="text" 
                                                                                value={sub.name} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'name', e.target.value)} 
                                                                                className="bg-transparent text-xs font-medium text-zinc-300 outline-none stealth-input w-full text-left"
                                                                            />
                                                                            <button onClick={() => removeSubItem(person.id, asset.id, sub.id)} className="text-zinc-600 hover:text-red-400 text-[10px] ml-2 px-2 py-1"><i className="fa-solid fa-trash"></i></button>
                                                                        </div>
                                                                        <div className="flex items-center gap-1 sm:gap-2">
                                                                            <input 
                                                                                type="number" 
                                                                                value={sub.amount} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'amount', e.target.value)} 
                                                                                placeholder="0" 
                                                                                className="bg-transparent text-zinc-200 text-xs font-semibold w-16 sm:w-20 outline-none stealth-input text-left"
                                                                            />
                                                                            <select 
                                                                                value={sub.type} 
                                                                                onChange={(e) => updateSubItem(person.id, asset.id, sub.id, 'type', e.target.value)} 
                                                                                className="bg-zinc-800 text-[9px] sm:text-[10px] font-bold text-zinc-400 outline-none px-1.5 sm:px-2 py-0.5 rounded"
                                                                            >
                                                                                <option value="TRY">TL</option>
                                                                                <option value="USD">DOLAR</option>
                                                                                <option value="EUR">EURO</option>
                                                                                <option value="GRAM">GRAM</option>
                                                                                <option value="ATA">ATA</option>
                                                                            </select>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}

                                            <div className="pt-3 flex justify-between items-center">
                                                <button onClick={() => removePerson(person.id)} className="text-[9px] sm:text-[10px] text-zinc-600 hover:text-red-400 font-bold uppercase tracking-wider px-2 py-2 transition-colors text-center">
                                                    Kişiyi Sil
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="text-[9px] sm:text-[10px] text-primary bg-primary/10 hover:bg-primary/20 border border-primary/20 font-bold uppercase tracking-wider px-3 sm:px-4 py-2 rounded-xl transition-colors">
                                                    <i className="fa-solid fa-plus mr-1"></i> Varlık Ekle
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Yeni Portföy Girişi */}
                        <button onClick={addNewPerson} className="w-full py-5 border border-dashed border-zinc-800 hover:border-zinc-600 text-zinc-500 hover:text-zinc-300 bg-card rounded-3xl transition-colors text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 shadow-sm text-center">
                            <i className="fa-solid fa-plus text-lg"></i> Yeni Portföy Ekle
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>
</html>
