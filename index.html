<body class="antialiased min-h-screen relative">

    <div class="ambient-bg">
        <div class="blob-1 animate-blob"></div>
        <div class="blob-2 animate-blob-reverse"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const formatTitleCase = (str) => {
            if (!str) return 'TL';
            return String(str).split(/[\s_-]+/).map(word => {
                if (!word) return '';
                return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
            }).join(' ');
        };

        const CustomSelect = ({ value, options, onChange, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [coords, setCoords] = useState(null);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        if (!event.target.closest('.custom-select-portal')) {
                            setIsOpen(false);
                        }
                    }
                };

                const handleScroll = (e) => {
                    // Sadece seçici açıksa ve scroll olan yer portalın kendisi değilse kapat
                    if (isOpen && !e.target.closest('.custom-select-portal')) {
                        setIsOpen(false);
                    }
                };

                if (isOpen) {
                    if (dropdownRef.current) {
                        const rect = dropdownRef.current.getBoundingClientRect();
                        const estimatedHeight = Object.keys(options).length * 36;
                        const spaceBelow = window.innerHeight - rect.bottom;
                        const spaceAbove = rect.top;
                        const direction = (spaceBelow < estimatedHeight + 20 && spaceAbove > spaceBelow) ? 'up' : 'down';

                        setCoords({
                            right: window.innerWidth - rect.right,
                            top: rect.bottom + 5,
                            bottom: window.innerHeight - rect.top + 5,
                            width: rect.width,
                            direction
                        });
                    }
                    document.addEventListener("mousedown", handleClickOutside);
                    window.addEventListener("scroll", handleScroll, true);
                }
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                    window.removeEventListener("scroll", handleScroll, true);
                };
            }, [isOpen, options]);

            const portalContent = isOpen && coords ? ReactDOM.createPortal(
                <div
                    className="custom-select-portal fixed bg-zinc-900 border border-white/20 rounded-xl shadow-[0_40px_100px_rgba(0,0,0,1)] z-[999999] overflow-hidden py-1.5 animate-fade-in-up"
                    style={{
                        right: coords.right + 'px',
                        top: coords.direction === 'up' ? 'auto' : coords.top + 'px',
                        bottom: coords.direction === 'up' ? coords.bottom + 'px' : 'auto',
                        minWidth: Math.max(120, coords.width) + 'px'
                    }}
                >
                    {Object.entries(options).map(([key, label]) => (
                        <div
                            key={key}
                            onClick={(e) => { e.stopPropagation(); onChange(key); setIsOpen(false); }}
                            className={`px-4 py-2.5 text-[11px] font-bold text-center cursor-pointer transition-colors ${value === key ? 'bg-emerald-500/20 text-emerald-400' : 'text-zinc-300 hover:bg-white/10 hover:text-white'}`}
                        >
                            {formatTitleCase(label)}
                        </div>
                    ))}
                </div>,
                document.body
            ) : null;

            return (
                <div ref={dropdownRef} className={`relative flex ${className}`} onClick={(e) => e.stopPropagation()}>
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full h-full flex items-center justify-center cursor-pointer px-1 sm:px-2 text-[9px] sm:text-[10px] font-bold outline-none no-arrow hover:bg-white/5 transition-colors whitespace-nowrap"
                    >
                        {formatTitleCase(options[value] || value)}
                    </div>
                    {portalContent}
                </div>
            );
        };

        const useDebounce = (callback, delay) => {
            const timeoutRef = useRef(null);
            return (...args) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                timeoutRef.current = setTimeout(() => {
                    callback(...args);
                }, delay);
            };
        };

        const DebouncedInput = ({ value, onChange, delay = 500, as = "input", ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            useEffect(() => { setLocalValue(value); }, [value]);

            useEffect(() => {
                const handler = setTimeout(() => {
                    if (localValue !== value) onChange(localValue);
                }, delay);
                return () => clearTimeout(handler);
            }, [localValue]);

            const Component = as;
            return (
                <Component
                    {...props}
                    value={localValue}
                    onChange={(e) => setLocalValue(e.target.value)}
                    onBlur={() => { if (localValue !== value) onChange(localValue); }}
                />
            );
        };

        const fetchTurkishStockPrice = async (ticker) => {
            if (!ticker) return null;
            let symbol = ticker.split(' ')[0].toUpperCase().trim();
            symbol = symbol.replace(/[^A-Z0-9]/g, '');

            try {
                // TradingView (Content-Type: text/plain kullanarak OPTIONS preflight CORS hatasını atlatır)
                const res = await fetch('https://scanner.tradingview.com/turkey/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ symbols: { tickers: [`BIST:${symbol}`] }, query: { types: [] }, columns: ["close"] })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data.length > 0 && data.data[0].d && data.data[0].d.length > 0) {
                        return data.data[0].d[0];
                    }
                }
            } catch (e) {
                console.warn("TradingView fetch failed: ", e);
            }

            return null;
        };

        const PortfolioApp = () => {
            const [appState, setAppState] = useState('loading_vault');

            // Cihaza kayıtlı konfigürasyon (Sadece açılışta veya Bağla dendiğinde okunur/yazılır)
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });

            // Form için geçici konfigürasyon (Her tuşa basıldığında API isteği atılmasını engeller!)
            const [formConfig, setFormConfig] = useState(githubConfig);

            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1, STOCK: 1 });

            // deleteTarget: { type: 'person' | 'asset' | 'subItem', personId, assetId, subItemId }
            const [deleteTarget, setDeleteTarget] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});
            const [expandedAssets, setExpandedAssets] = useState({});

            const [currencyLabels, setCurrencyLabels] = useState({ USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata', STOCK: 'Hisse' });
            const [portfolio, setPortfolio] = useState([]);

            const [availableVaults, setAvailableVaults] = useState([]);
            const [currentVaultFile, setCurrentVaultFile] = useState("");
            const [newVaultName, setNewVaultName] = useState("");

            const [adminVaults, setAdminVaults] = useState([]);
            const [adminActionTarget, setAdminActionTarget] = useState(null);
            const [adminInputVal, setAdminInputVal] = useState("");

            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [settingsTab, setSettingsTab] = useState('password');
            const [settingsOldPass, setSettingsOldPass] = useState("");
            const [settingsNewPass, setSettingsNewPass] = useState("");
            const [settingsNewPassConfirm, setSettingsNewPassConfirm] = useState("");
            const [settingsError, setSettingsError] = useState("");

            const setVaultSession = (filename, pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000);
                localStorage.setItem('vault_session_v5', JSON.stringify({ filename, password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v5');
            const [showDisconnectModal, setShowDisconnectModal] = useState(false);

            const isInitialMount = React.useRef(true);
            const skipNextSave = React.useRef(true);

            const debouncedSave = useDebounce((isAuto) => {
                handleSaveToGithub(isAuto);
            }, 2000);

            useEffect(() => {
                if (isInitialMount.current) {
                    isInitialMount.current = false;
                    return;
                }
                if (appState === 'app' && vaultPassword && !isSaving) {
                    if (skipNextSave.current) {
                        skipNextSave.current = false;
                        return;
                    }
                    const handler = setTimeout(() => {
                        debouncedSave(true);
                    }, 10);
                    return () => clearTimeout(handler);
                }
            }, [portfolio, currencyLabels, rates]);

            // Otomatik piyasa kurları güncellemesi
            useEffect(() => {
                let mounted = true;
                if (appState === 'app') {
                    // Kasadan kurların yüklenmesine ve UI'ın oturmasına izin vermek için ufak bir gecikme
                    setTimeout(() => {
                        if (mounted) fetchLiveRates();
                    }, 500);
                }
                return () => { mounted = false; };
            }, [appState]);

            // OTOMATİK HİSSE FİYATI GÜNCELLEMESİ (Sadece isim değiştiğinde tetiklenir)
            useEffect(() => {
                if (appState !== 'app' || !portfolio.length) return;

                let updated = false;
                // Deep copy kullanarak referansı kırıp değişikliği hazırlıyoruz
                const newPortfolio = JSON.parse(JSON.stringify(portfolio));

                const processItems = async () => {
                    for (const person of newPortfolio) {
                        for (const asset of person.assets) {
                            if (asset.type === 'STOCK' && asset.name) {
                                const ticker = asset.name.split(' ')[0];
                                if (safeParseNum(asset.currentPrice) <= 0 || asset._lastFetchedTicker !== ticker) {
                                    const price = await fetchTurkishStockPrice(ticker);
                                    if (price) {
                                        asset.currentPrice = price;
                                        asset._lastFetchedTicker = ticker;
                                        updated = true;
                                    }
                                }
                            }
                            if (asset.subItems) {
                                for (const sub of asset.subItems) {
                                    if (sub.type === 'STOCK' && sub.name) {
                                        const ticker = sub.name.split(' ')[0];
                                        if (safeParseNum(sub.currentPrice) <= 0 || sub._lastFetchedTicker !== ticker) {
                                            const price = await fetchTurkishStockPrice(ticker);
                                            if (price) {
                                                sub.currentPrice = price;
                                                sub._lastFetchedTicker = ticker;
                                                updated = true;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    if (updated) {
                        // Portföyü yeni fiyatlarla güncelleyip kayda geçiriyoruz
                        setPortfolio(newPortfolio);
                    }
                };
                processItems();
            }, [portfolio, appState]);

            const fetchAvailableVaults = async (configOverride = null) => {
                const config = configOverride || githubConfig;
                setAppState('loading_vaults');
                setAuthError("");
                try {
                    const cleanUser = config.username.trim();
                    const cleanRepo = config.repo.trim();
                    const cleanToken = config.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const timestamp = new Date().getTime();

                    const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/?t=${timestamp}`, {
                        headers: { 'Authorization': `Bearer ${cleanToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (response.status === 404) {
                        setAvailableVaults([]);
                        setAppState('select_vault');
                        return;
                    }
                    if (!response.ok) throw new Error("GitHub erişim reddedildi.");

                    const files = await response.json();

                    const vaults = files.filter(f => f.name.startsWith('vault_') && !f.name.startsWith('vault_locked_') && f.name.endsWith('.json')).map(f => {
                        return {
                            name: decodeURIComponent(f.name.replace('vault_', '').replace('.json', '')),
                            filename: f.name
                        };
                    });

                    if (files.some(f => f.name === 'data.json')) {
                        vaults.unshift({ name: 'Ana Kasa (Legacy)', filename: 'data.json' });
                    }

                    setAvailableVaults(vaults);
                    setAppState('select_vault');
                } catch (err) {
                    setAuthError(err.message || "Erişim Reddedildi.");
                    setAppState('setup_github');
                }
            };

            const fetchAdminVaults = async () => {
                setAppState('admin_loading');
                try {
                    const cleanUser = githubConfig.username.trim();
                    const cleanRepo = githubConfig.repo.trim();
                    const cleanToken = githubConfig.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const timestamp = new Date().getTime();

                    const baseHeaders = { 'Authorization': `Bearer ${cleanToken}`, 'Accept': 'application/vnd.github.v3+json' };

                    const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/?t=${timestamp}`, { headers: baseHeaders });
                    if (!response.ok) throw new Error();

                    const files = await response.json();
                    const targetFiles = files.filter(f => (f.name.startsWith('vault_') || f.name === 'data.json') && f.name.endsWith('.json'));

                    const detailedVaults = await Promise.all(targetFiles.map(async (f) => {
                        let detail = { name: '', filename: f.name, isLocked: f.name.startsWith('vault_locked_'), lastUpdate: 'Bilinmiyor', sha: f.sha };

                        if (f.name === 'data.json') detail.name = 'Ana Kasa (Legacy)';
                        else if (detail.isLocked) detail.name = decodeURIComponent(f.name.replace('vault_locked_', '').replace('.json', ''));
                        else detail.name = decodeURIComponent(f.name.replace('vault_', '').replace('.json', ''));

                        try {
                            const fRes = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/${f.name}?t=${timestamp}`, { headers: baseHeaders });
                            const fData = await fRes.json();
                            detail.sha = fData.sha;
                            const decoded = JSON.parse(decodeURIComponent(escape(atob(fData.content))));
                            if (decoded.lastUpdate) {
                                const d = new Date(decoded.lastUpdate);
                                detail.lastUpdate = d.toLocaleString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                            }
                        } catch (e) { }

                        return detail;
                    }));

                    setAdminVaults(detailedVaults);
                    setAppState('admin_panel');
                } catch {
                    showToast('Yönetim paneline ulaşılamadı', 'error');
                    setAppState('app');
                }
            };

                    if (data.usd.xau) {

                        const physicalPremium = 1.045;
                        gramTry = spotGramGoldTry * physicalPremium;
                        ataTry = gramTry * 6.88;
                    }
                    setRates(prev => ({

                if (val === "" || val === null || val === undefined) return 0;
                const num = parseFloat(val);
                return isNaN(num) ? 0 : num;
            };

            const calculateAssetValue = (asset) => {

                        return total + (safeParseNum(sub.amount) * rate);
                    }, 0);
                }
                const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                return safeParseNum(asset.amount) * rate;
            };

                const cost = safeParseNum(costPrice);
                const qty = safeParseNum(amount);
                if (cost <= 0 || qty <= 0) return null;

                let currentTotal;
                if (type === 'STOCK') {
                    const price = safeParseNum(currentPrice);
                    if (price <= 0) return null;
                    currentTotal = qty * price;
                } else {
                    currentTotal = qty * rate;
                }

                const costTotal = qty * cost; // Tutar hesaplaması birim maliyet * adettir!

                const profit = currentTotal - costTotal;
                const percentage = (profit / costTotal) * 100;
                return { profit, percentage, isProfit: profit >= 0, isNeutral: Math.abs(profit) < 0.01 };
            };

                                                                                                    className="p-1 rounded-md text-emerald-400/80 hover:bg-emerald-500/20 hover:text-emerald-300 transition-colors shrink-0"
                                                                                                    title="Canlı Fiyatı Çek"
                                                                                                >
                                                                                                    <i className="fa-solid fa-rotate-right text-[12px] shadow-sm"></i>
                                                                                                </button>
                                                                                            )}
                                                                                        </div>
                                                                                        <button
                                                                                            onClick={(e) => removeSubItem(e, person.id, asset.id, sub.id)}
                                                                                            className="p-1.5 rounded-md transition-colors flex items-center justify-center text-zinc-500 hover:text-red-400"
                                                                                        >
                                                                                            <i className="fa-solid fa-trash text-[10px]"></i>
                                                                                        </button>
                                                                                    </div>

                                                                                    <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                                        <div className="flex glass-surface border border-white/10 rounded-lg focus-within:border-white/30 transition-colors w-full relative">
                                                                                            <DebouncedInput
                                                                                                type="number"
                                                                                                value={sub.amount}
                                                                                                onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'amount', val)}
                                                                                                className="flex-[2.5] min-w-0 bg-transparent text-white font-numbers font-bold text-xs py-2 px-1 text-center outline-none"
                                                                                                placeholder={sub.type === 'STOCK' ? 'Adet' : 'Miktar'}
                                                                                                title={sub.type === 'STOCK' ? 'Adet' : 'Miktar (Tutar)'}
                                                                                            />
                                                                                            <div className="w-[1px] bg-white/10"></div>

                                                                                            {sub.type === 'STOCK' && (
                                                                                                <>
                                                                                                    <DebouncedInput
                                                                                                        type="number"
                                                                                                        value={sub.currentPrice || ''}
                                                                                                        onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'currentPrice', val)}
                                                                                                        className="flex-[2.5] min-w-0 bg-transparent text-blue-200 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-white/10 placeholder:text-blue-500/50"
                                                                                                        placeholder="Güncel"
                                                                                                        title="Güncel Fiyat (₺)"
                                                                                                    />
                                                                                                </>
                                                                                            )}

                                                                                            <DebouncedInput
                                                                                                type="number"
                                                                                                value={sub.costPrice || ''}
                                                                                                onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'costPrice', val)}
                                                                                                className="flex-[2.5] min-w-0 bg-transparent text-emerald-100 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-white/10"
                                                                                                placeholder="Maliyet"
                                                                                                title="Birim Maliyet (₺)"
                                                                                            />
                                                                                            <CustomSelect
                                                                                                value={sub.type}
                                                                                                options={currencyLabels}
                                                                                                onChange={(newVal) => updateSubItem(person.id, asset.id, sub.id, 'type', newVal)}
                                                                                                className="flex-[1.5] bg-black/30 text-white min-w-[55px]"
                                                                                            />
                                                                                        </div>

                                                                                        <div className="flex justify-between items-center pr-1 mt-0.5">
                                                                                            {/* Proportion Badge */}
                                                                                            {assetValue > 0 ? (
                                                                                                <span className="text-[9.5px] font-semibold text-zinc-400 tracking-wide px-1">
                                                                                                    %{(((sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || rates.STOCK || 1) : (rates[sub.type] || 1)) * safeParseNum(sub.amount) / assetValue) * 100).toFixed(1)} pay
                                                                                                </span>
                                                                                            ) : <span />}

                                                                                            {sub.costPrice && sub.type !== 'TRY' && (() => {
                                                                                                const pnl = calculatePnL(sub.amount, rates[sub.type], sub.costPrice, sub.type, sub.currentPrice);
                                                                                                if (!pnl) return null;
                                                                                                return (
                                                                                                    <span className={`text-[9.5px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isNeutral ? 'bg-zinc-500/20 text-zinc-400' : pnl.isProfit ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                                        {pnl.isNeutral ? '' : pnl.isProfit ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                                    </span>
                                                                                                );
                                                                                            })()}
                                                                                        </div>
                                                                                    </div>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}

                                                                    <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-zinc-300 hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 glass-surface px-4 py-2.5 rounded-xl transition-colors hover:bg-white/5 border border-transparent hover:border-white/10 mt-1">
                                                                        <i className="fa-solid fa-plus text-[9px]"></i> Kalem Ekle
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })}

                                                {/* Footer Actions (New Asset & Delete Person) */}
                                                <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-white/5 mt-2 relative z-50">
                                                    <button
                                                        onClick={(e) => removePerson(e, person.id)}
                                                        className="text-[10px] font-bold uppercase tracking-widest px-5 py-3.5 rounded-xl transition-all shrink-0 z-50 relative cursor-pointer flex items-center justify-center text-zinc-400 hover:text-red-400 glass-surface hover:bg-red-500/10 hover:border-red-500/30"
                                                    >
                                                        KİŞİYİ SİL
                                                    </button>
                                                    <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-500 hover:text-black transition-all shadow-sm">
                                                        + YENİ VARLIK
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}

                            {/* Add New Person Button */}
                            <div className="pt-2 pb-10">
                                <button onClick={addNewPerson} className="w-full py-10 border border-dashed border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-white/5 group">
                                    <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                        <i className="fa-solid fa-plus text-lg"></i>
                                    </div>
                                    YENİ PORTFÖY
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Delete Target Modal */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[99999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card p-6 sm:p-8 rounded-[2rem] max-w-sm w-full border border-white/10 shadow-2xl animate-fade-in-up">
                                <div className="flex flex-col items-center text-center gap-5">
                                    <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-2 premium-border">
                                        <i className="fa-solid fa-triangle-exclamation text-3xl text-red-500 animate-pulse"></i>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-white tracking-tight">Emin misiniz?</h3>
                                    <p className="text-sm text-zinc-400 -mt-2 leading-relaxed">
                                        {deleteTarget.type === 'person' && "Bu kişiyi ve ona bağlı tüm varlıkları silmek istediğinize emin misiniz? Bu işlem geri alınamaz."}
                                        {deleteTarget.type === 'asset' && "Bu varlığı (ve varsa alt kalemlerini) kalıcı olarak silmek istediğinize emin misiniz?"}
                                        {deleteTarget.type === 'subItem' && "Bu alt kalemi silmek istediğinize emin misiniz?"}
                                    </p>
                                    <div className="flex w-full gap-3 mt-4">
                                        <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10 tracking-widest">İPTAL</button>
                                        <button
                                            onClick={() => {
                                                if (deleteTarget.type === 'person') {
                                                    setPortfolio(prev => prev.filter(p => p.id !== deleteTarget.personId));
                                                    setExpandedPersons(prev => { const newState = { ...prev }; delete newState[deleteTarget.personId]; return newState; });
                                                } else if (deleteTarget.type === 'asset') {
                                                    setPortfolio(prev => prev.map(p => p.id === deleteTarget.personId ? { ...p, assets: p.assets.filter(a => a.id !== deleteTarget.assetId) } : p));
                                                } else if (deleteTarget.type === 'subItem') {
                                                    updatePortfolioAsset(deleteTarget.personId, deleteTarget.assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== deleteTarget.subItemId) }));
                                                }
                                                setDeleteTarget(null);
                                            }}
                                            className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-red-500/20 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/30 transition-colors tracking-widest"
                                        >
                                            SİL GİTSİN
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Disconnect Modal */}
                    {showDisconnectModal && (
                        <div className="fixed inset-0 z-[99999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card p-6 sm:p-8 rounded-[2rem] max-w-sm w-full border border-white/10 shadow-2xl animate-fade-in-up">
                                <div className="flex flex-col items-center text-center gap-5">
                                    <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-2 premium-border">
                                        <i className="fa-solid fa-power-off text-3xl text-red-500 animate-pulse"></i>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-white tracking-tight">Bağlantıyı Kes</h3>
                                    <p className="text-sm text-zinc-400 -mt-2 leading-relaxed">
                                        Cihaz kayıtlı GitHub erişimini unutacak. Kasaya tekrar erişmek için bilgilerinizi yeniden girmelisiniz. Emin misiniz?
                                    </p>
                                    <div className="flex w-full gap-3 mt-4">
                                        <button onClick={() => setShowDisconnectModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10 tracking-widest">İPTAL</button>
                                        <button
                                            onClick={() => {
                                                localStorage.removeItem('gh_config_v5');
                                                window.location.reload();
                                            }}
                                            className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-red-500/20 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/30 transition-colors tracking-widest"
                                        >
                                            ÇIKIŞ YAP
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettingsModal && (
                        <div className="fixed inset-0 z-[99999] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card p-6 sm:p-8 rounded-[2rem] max-w-sm w-full border border-white/10 shadow-2xl animate-fade-in-up relative">
                                <button onClick={() => setShowSettingsModal(false)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-zinc-400 hover:text-white hover:bg-white/10 transition-colors">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>

                                <div className="flex flex-col items-center mb-6">
                                    <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500/20 to-purple-500/20 border border-indigo-500/30 flex items-center justify-center mb-3">
                                        <i className="fa-solid fa-gear text-3xl text-indigo-400"></i>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-white tracking-tight">Hesap Ayarları</h3>
                                    <p className="text-[10px] uppercase tracking-widest text-zinc-500 mt-1 font-bold">{currentVaultFile}</p>
                                </div>

                                <div className="flex gap-2 mb-6">
                                    <button onClick={() => { setSettingsTab('password'); setSettingsError(''); }} className={`flex-1 py-2.5 rounded-xl font-bold text-xs tracking-widest transition-all border ${settingsTab === 'password' ? 'bg-indigo-500/20 text-indigo-400 border-indigo-500/30' : 'bg-white/5 text-zinc-400 border-transparent hover:bg-white/10'}`}>ŞİFRE</button>
                                    <button onClick={() => { setSettingsTab('export'); setSettingsError(''); }} className={`flex-1 py-2.5 rounded-xl font-bold text-xs tracking-widest transition-all border ${settingsTab === 'export' ? 'bg-indigo-500/20 text-indigo-400 border-indigo-500/30' : 'bg-white/5 text-zinc-400 border-transparent hover:bg-white/10'}`}>YEDEKLE</button>
                                </div>

                                {settingsTab === 'password' && (
                                    <form onSubmit={handleChangePassword} className="flex flex-col gap-3">
                                        {settingsError && <div className="p-3 mb-2 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center font-semibold">{settingsError}</div>}

                                        <div className="relative">
                                            <i className="fa-solid fa-unlock-keyhole absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xs"></i>
                                            <input required type="password" value={settingsOldPass} onChange={e => setSettingsOldPass(e.target.value)} placeholder="Mevcut Şifre" className="w-full glass-surface py-3 pl-10 pr-4 rounded-xl text-white outline-none focus:border-indigo-500/50 text-sm tracking-widest font-bold" />
                                        </div>

                                        <div className="h-px w-full bg-white/5 my-1"></div>

                                        <div className="relative">
                                            <i className="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 text-xs"></i>
                                            <input required type="password" value={settingsNewPass} onChange={e => setSettingsNewPass(e.target.value)} placeholder="Yeni Şifre" className="w-full glass-surface py-3 pl-10 pr-4 rounded-xl text-white outline-none focus:border-indigo-500/50 text-sm tracking-widest font-bold" />
                                        </div>
                                        <div className="relative mb-2">
                                            <i className="fa-solid fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-indigo-400 text-xs"></i>
                                            <input required type="password" value={settingsNewPassConfirm} onChange={e => setSettingsNewPassConfirm(e.target.value)} placeholder="Yeni Şifre (Tekrar)" className="w-full glass-surface py-3 pl-10 pr-4 rounded-xl text-white outline-none focus:border-indigo-500/50 text-sm tracking-widest font-bold" />
                                        </div>

                                        <button type="submit" disabled={isSaving} className={`w-full py-3.5 rounded-xl font-bold text-xs tracking-widest transition-all ${isSaving ? 'bg-indigo-500/50 text-white/50 cursor-not-allowed' : 'bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500 hover:text-white border border-indigo-500/30'}`}>
                                            {isSaving ? 'KAYDEDİLİYOR...' : 'ŞİFREYİ DEĞİŞTİR'}
                                        </button>
                                        <p className="text-[9px] text-center text-zinc-500 mt-2 font-semibold">Portföy bilgileriniz korunarak şifrelenir.</p>
                                    </form>
                                )}

                                {settingsTab === 'export' && (
                                    <div className="flex flex-col text-center gap-4 py-2">
                                        <i className="fa-solid fa-file-export text-4xl text-emerald-400 opacity-80 mb-2"></i>
                                        <h4 className="text-white font-bold text-sm mb-1">Verilerinizi İndirin</h4>
                                        <p className="text-xs text-zinc-400 leading-relaxed bg-black/20 p-3 rounded-xl border border-white/5">Portföy listeniz, kur değerleriniz ve aktif verileriniz JSON formatında cihazınıza indirilecek.</p>

                                        <button onClick={handleExportData} className="w-full mt-2 py-3.5 rounded-xl font-bold text-xs bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500 hover:text-white transition-all border border-emerald-500/30 tracking-widest flex justify-center items-center gap-2">
                                            <i className="fa-solid fa-download"></i> DIŞA AKTAR
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>

</html>
