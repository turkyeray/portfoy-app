<body class="antialiased min-h-screen relative">

    <div class="ambient-bg">
        <div class="blob-1 animate-blob"></div>
        <div class="blob-2 animate-blob-reverse"></div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const formatTitleCase = (str) => {
            if (!str) return 'TL';
            return String(str).split(/[\s_-]+/).map(word => {
                if (!word) return '';
                return word.charAt(0).toLocaleUpperCase('tr-TR') + word.slice(1).toLocaleLowerCase('tr-TR');
            }).join(' ');
        };

        const CustomSelect = ({ value, options, onChange, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [coords, setCoords] = useState(null);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        if (!event.target.closest('.custom-select-portal')) {
                            setIsOpen(false);
                        }
                    }
                };

                const handleScroll = (e) => {
                    // Sadece seçici açıksa ve scroll olan yer portalın kendisi değilse kapat
                    if (isOpen && !e.target.closest('.custom-select-portal')) {
                        setIsOpen(false);
                    }
                };

                if (isOpen) {
                    if (dropdownRef.current) {
                        const rect = dropdownRef.current.getBoundingClientRect();
                        const estimatedHeight = Object.keys(options).length * 36;
                        const spaceBelow = window.innerHeight - rect.bottom;
                        const spaceAbove = rect.top;
                        const direction = (spaceBelow < estimatedHeight + 20 && spaceAbove > spaceBelow) ? 'up' : 'down';

                        setCoords({
                            right: window.innerWidth - rect.right,
                            top: rect.bottom + 5,
                            bottom: window.innerHeight - rect.top + 5,
                            width: rect.width,
                            direction
                        });
                    }
                    document.addEventListener("mousedown", handleClickOutside);
                    window.addEventListener("scroll", handleScroll, true);
                }
                return () => {
                    document.removeEventListener("mousedown", handleClickOutside);
                    window.removeEventListener("scroll", handleScroll, true);
                };
            }, [isOpen, options]);

            const portalContent = isOpen && coords ? ReactDOM.createPortal(
                <div
                    className="custom-select-portal fixed bg-zinc-900 border border-white/20 rounded-xl shadow-[0_40px_100px_rgba(0,0,0,1)] z-[999999] overflow-hidden py-1.5 animate-fade-in-up"
                    style={{
                        right: coords.right + 'px',
                        top: coords.direction === 'up' ? 'auto' : coords.top + 'px',
                        bottom: coords.direction === 'up' ? coords.bottom + 'px' : 'auto',
                        minWidth: Math.max(120, coords.width) + 'px'
                    }}
                >
                    {Object.entries(options).map(([key, label]) => (
                        <div
                            key={key}
                            onClick={(e) => { e.stopPropagation(); onChange(key); setIsOpen(false); }}
                            className={`px-4 py-2.5 text-[11px] font-bold text-center cursor-pointer transition-colors ${value === key ? 'bg-emerald-500/20 text-emerald-400' : 'text-zinc-300 hover:bg-white/10 hover:text-white'}`}
                        >
                            {formatTitleCase(label)}
                        </div>
                    ))}
                </div>,
                document.body
            ) : null;

            return (
                <div ref={dropdownRef} className={`relative flex ${className}`} onClick={(e) => e.stopPropagation()}>
                    <div
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full h-full flex items-center justify-center cursor-pointer px-1 sm:px-2 text-[9px] sm:text-[10px] font-bold outline-none no-arrow hover:bg-white/5 transition-colors whitespace-nowrap"
                    >
                        {formatTitleCase(options[value] || value)}
                    </div>
                    {portalContent}
                </div>
            );
        };

        const useDebounce = (callback, delay) => {
            const timeoutRef = useRef(null);
            return (...args) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                timeoutRef.current = setTimeout(() => {
                    callback(...args);
                }, delay);
            };
        };

        const DebouncedInput = ({ value, onChange, delay = 500, as = "input", ...props }) => {
            const [localValue, setLocalValue] = useState(value);
            useEffect(() => { setLocalValue(value); }, [value]);

            useEffect(() => {
                const handler = setTimeout(() => {
                    if (localValue !== value) onChange(localValue);
                }, delay);
                return () => clearTimeout(handler);
            }, [localValue]);

            const Component = as;
            return (
                <Component
                    {...props}
                    value={localValue}
                    onChange={(e) => setLocalValue(e.target.value)}
                    onBlur={() => { if (localValue !== value) onChange(localValue); }}
                />
            );
        };

        const fetchTurkishStockPrice = async (ticker) => {
            if (!ticker) return null;
            let symbol = ticker.split(' ')[0].toUpperCase().trim();
            symbol = symbol.replace(/[^A-Z0-9]/g, '');

            try {
                // TradingView (Content-Type: text/plain kullanarak OPTIONS preflight CORS hatasını atlatır)
                const res = await fetch('https://scanner.tradingview.com/turkey/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ symbols: { tickers: [`BIST:${symbol}`] }, query: { types: [] }, columns: ["close"] })
                });
                if (res.ok) {
                    const data = await res.json();
                    if (data.data && data.data.length > 0 && data.data[0].d && data.data[0].d.length > 0) {
                        return data.data[0].d[0];
                    }
                }
            } catch (e) {
                console.warn("TradingView fetch failed: ", e);
            }

            return null;
        };

        const PortfolioApp = () => {
            const [appState, setAppState] = useState('loading_vault');

            // Cihaza kayıtlı konfigürasyon (Sadece açılışta veya Bağla dendiğinde okunur/yazılır)
            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('gh_config_v3');
                return saved ? JSON.parse(saved) : { token: '', username: 'turkyeray', repo: 'portfoy-kasa' };
            });

            // Form için geçici konfigürasyon (Her tuşa basıldığında API isteği atılmasını engeller!)
            const [formConfig, setFormConfig] = useState(githubConfig);

            const [fileSha, setFileSha] = useState(null);
            const [vaultPassword, setVaultPassword] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [authError, setAuthError] = useState("");
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            const [rates, setRates] = useState({ USD: 44.46, EUR: 51.30, GRAM: 6600, ATA: 45400, TRY: 1, STOCK: 1 });

            // deleteTarget: { type: 'person' | 'asset' | 'subItem', personId, assetId, subItemId }
            const [deleteTarget, setDeleteTarget] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };
            const [isLoadingRates, setIsLoadingRates] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const [expandedPersons, setExpandedPersons] = useState({});
            const [expandedAssets, setExpandedAssets] = useState({});

            const [currencyLabels, setCurrencyLabels] = useState({ USD: 'Dolar', EUR: 'Euro', TRY: 'TL', GRAM: 'Gram', ATA: 'Ata', STOCK: 'Hisse' });
            const [portfolio, setPortfolio] = useState([]);

            const setVaultSession = (pass) => {
                const expiry = new Date().getTime() + (30 * 60 * 1000);
                localStorage.setItem('vault_session_v4', JSON.stringify({ password: pass, expiry }));
            };
            const clearVaultSession = () => localStorage.removeItem('vault_session_v4');
            const [showDisconnectModal, setShowDisconnectModal] = useState(false);

            const isInitialMount = React.useRef(true);
            const skipNextSave = React.useRef(true);

            const debouncedSave = useDebounce((isAuto) => {
                handleSaveToGithub(isAuto);
            }, 2000);

            useEffect(() => {
                if (isInitialMount.current) {
                    isInitialMount.current = false;
                    return;
                }
                if (appState === 'app' && vaultPassword && !isSaving) {
                    if (skipNextSave.current) {
                        skipNextSave.current = false;
                        return;
                    }
                    const handler = setTimeout(() => {
                        debouncedSave(true);
                    }, 10);
                    return () => clearTimeout(handler);
                }
            }, [portfolio, currencyLabels, rates]);

            // Otomatik piyasa kurları güncellemesi
            useEffect(() => {
                let mounted = true;
                if (appState === 'app') {
                    // Kasadan kurların yüklenmesine ve UI'ın oturmasına izin vermek için ufak bir gecikme
                    setTimeout(() => {
                        if (mounted) fetchLiveRates();
                    }, 500);
                }
                return () => { mounted = false; };
            }, [appState]);

            // OTOMATİK HİSSE FİYATI GÜNCELLEMESİ (Sadece isim değiştiğinde tetiklenir)
            useEffect(() => {
                if (appState !== 'app' || !portfolio.length) return;
                
                let updated = false;
                // Deep copy kullanarak referansı kırıp değişikliği hazırlıyoruz
                const newPortfolio = JSON.parse(JSON.stringify(portfolio));

                const processItems = async () => {
                    for (const person of newPortfolio) {
                        for (const asset of person.assets) {
                            if (asset.type === 'STOCK' && asset.name) {
                                const ticker = asset.name.split(' ')[0];
                                if (safeParseNum(asset.currentPrice) <= 0 || asset._lastFetchedTicker !== ticker) {
                                    const price = await fetchTurkishStockPrice(ticker);
                                    if (price) {
                                        asset.currentPrice = price;
                                        asset._lastFetchedTicker = ticker;
                                        updated = true;
                                    }
                                }
                            }
                            if (asset.subItems) {
                                for (const sub of asset.subItems) {
                                    if (sub.type === 'STOCK' && sub.name) {
                                        const ticker = sub.name.split(' ')[0];
                                        if (safeParseNum(sub.currentPrice) <= 0 || sub._lastFetchedTicker !== ticker) {
                                            const price = await fetchTurkishStockPrice(ticker);
                                            if (price) {
                                                sub.currentPrice = price;
                                                sub._lastFetchedTicker = ticker;
                                                updated = true;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    if (updated) {
                        // Portföyü yeni fiyatlarla güncelleyip kayda geçiriyoruz
                        setPortfolio(newPortfolio);
                    }
                };
                processItems();
            }, [portfolio, appState]);

            useEffect(() => {
                const init = () => {
                    const savedConfig = localStorage.getItem('gh_config_v5');
                    if (savedConfig) {
                        setGithubConfig(JSON.parse(savedConfig));
                        setAppState('enter_password');
                    } else {
                        localStorage.removeItem('gh_config_v4');
                        setAppState('setup_github');
                    }
                };
                init();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                if (!passwordInput) { setAuthError("Şifre boş olamaz."); return; }
                setAuthError("");
                setIsLoadingRates(true);
                setAppState('loading_vault');
                try {
                    const cleanUser = githubConfig.username.trim();
                    const cleanRepo = githubConfig.repo.trim();
                    const cleanToken = githubConfig.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const timestamp = new Date().getTime();

                    const response = await fetch(`https://api.github.com/repos/${cleanUser}/${cleanRepo}/contents/data.json?t=${timestamp}`, {
                        headers: { 'Authorization': `Bearer ${cleanToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });

                    if (response.status === 404) {
                        setAppState('create_vault');
                        return;
                    }
                    if (!response.ok) throw new Error("GitHub erişim reddedildi.");

                    const data = await response.json();
                    setFileSha(data.sha);
                    const decodedContent = decodeURIComponent(escape(atob(data.content)));
                    const vaultData = JSON.parse(decodedContent);

                    if (vaultData.isEncrypted) {
                        let decryptedString;
                        try {
                            const vBytes = CryptoJS.AES.decrypt(vaultData.payload, passwordInput);
                            decryptedString = vBytes.toString(CryptoJS.enc.Utf8);
                        } catch (e) {
                            throw new Error("Kasa Şifresi Yanlış");
                        }
                        if (!decryptedString) throw new Error("Kasa Şifresi Yanlış");

                        const parsedData = JSON.parse(decryptedString);
                        const finalPortfolio = Array.isArray(parsedData) ? parsedData : (parsedData.portfolio || []);
                        setPortfolio(finalPortfolio);

                        if (parsedData.labels && !Array.isArray(parsedData)) {
                            const lbls = parsedData.labels;
                            if (!lbls.STOCK) lbls.STOCK = 'Hisse';
                            setCurrencyLabels(lbls);
                        }

                        if (parsedData.rates && !Array.isArray(parsedData)) {
                            setRates(prev => ({ ...prev, ...parsedData.rates }));
                        }

                        const expandedInit = {};
                        finalPortfolio.forEach(p => expandedInit[p.id] = true);
                        setExpandedPersons(expandedInit);
                    } else {
                        throw new Error("Eski format kasa desteklenmiyor.");
                    }

                    setVaultPassword(passwordInput);
                    setVaultSession(passwordInput);
                    setAppState('app');
                } catch (err) {
                    const errMsg = err.message || "";
                    if (errMsg.toLowerCase().includes('failed to fetch')) {
                        setAuthError("Ağa bağlanılamadı. İnternet bağlantınızı kontrol edin.");
                    } else {
                        setAuthError(errMsg || "Erişim Reddedildi.");
                    }
                    setAppState('enter_password');
                    setPasswordInput("");
                } finally {
                    setIsLoadingRates(false);
                }
            };

            const setupNewVault = (e) => {
                e.preventDefault();
                if (passwordInput.length < 4) { setAuthError("En az 4 hane olmalıdır."); return; }
                setVaultPassword(passwordInput);
                setVaultSession(passwordInput);
                setPortfolio([]);
                setAppState('app');
            };

            const handleSaveToGithub = async (isAutoSave = false) => {
                setIsSaving(true);
                try {
                    const jsonString = JSON.stringify({ portfolio, labels: currencyLabels, rates });
                    const encryptedPayload = CryptoJS.AES.encrypt(jsonString, vaultPassword).toString();
                    const vaultPackage = { isEncrypted: true, lastUpdate: new Date().toISOString(), payload: encryptedPayload };
                    const contentBase64 = btoa(unescape(encodeURIComponent(JSON.stringify(vaultPackage, null, 2))));

                    const cleanToken = githubConfig.token.replace(/[^\x20-\x7E]/g, '').trim();
                    const response = await fetch(`https://api.github.com/repos/${githubConfig.username.trim()}/${githubConfig.repo.trim()}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${cleanToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: isAutoSave ? "🤖 Oto-Kayıt" : "🔒 Kasa güncellendi", content: contentBase64, ...(fileSha ? { sha: fileSha } : {}) })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        setFileSha(data.content.sha);
                        setVaultSession(vaultPassword);
                        if (!isAutoSave) showToast("Kasa başarıyla senkronize edildi", "success");
                        setTimeout(() => setIsSaving(false), 800);
                    } else { throw new Error("Kayıt reddedildi."); }
                } catch (error) {
                    if (!isAutoSave) showToast("Kayıt Hatası! İnternet bağlantınızı veya ayarlarınızı kontrol edin.", "error");
                    setIsSaving(false);
                }
            };

            const saveGithubConfig = (e) => {
                e.preventDefault();
                const cleanedConfig = {
                    username: formConfig.username.trim(),
                    repo: formConfig.repo.trim(),
                    token: formConfig.token.trim()
                };
                localStorage.setItem('gh_config_v5', JSON.stringify(cleanedConfig));
                window.location.reload();
            };

            const lockVault = () => {
                setVaultPassword("");
                setPortfolio([]);
                clearVaultSession();
                setAppState('enter_password');
                window.location.reload();
            };

            const disconnectGithub = () => {
                setShowDisconnectModal(true);
            };

            const fetchLiveRates = async () => {
                try {
                    setIsLoadingRates(true);
                    const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                    if (!response.ok) throw new Error("API cevap vermedi");
                    const data = await response.json();
                    const usdTry = data.usd.try;
                    let gramTry = rates.GRAM, ataTry = rates.ATA;

                    if (data.usd.xau) {
                        const xauUsd = 1 / data.usd.xau;
                        const spotGramGoldUsd = xauUsd / 31.1034768;
                        const spotGramGoldTry = spotGramGoldUsd * usdTry;
                        const physicalPremium = 1.045;
                        gramTry = spotGramGoldTry * physicalPremium;
                        ataTry = gramTry * 6.88;
                    }
                    setRates(prev => ({
                        ...prev,
                        USD: parseFloat(usdTry.toFixed(2)), EUR: parseFloat((usdTry / data.usd.eur).toFixed(2)),
                        GRAM: parseFloat(gramTry.toFixed(2)), ATA: parseFloat(ataTry.toFixed(2))
                    }));
                } catch (err) {
                    console.error("Fiyat çekme hatası", err);
                    showToast("Kurlar güncellenemedi, eski veriyi görüyorsunuz", "error");
                } finally { setIsLoadingRates(false); }
            };

            const handleRateChange = (currency, value) => { setRates(prev => ({ ...prev, [currency]: parseFloat(value) || 0 })); };

            const safeParseNum = (val) => {
                if (val === "" || val === null || val === undefined) return 0;
                const num = parseFloat(val);
                return isNaN(num) ? 0 : num;
            };

            const calculateAssetValue = (asset) => {
                if (asset.subItems && asset.subItems.length > 0) {
                    return asset.subItems.reduce((total, sub) => {
                        const rate = sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0) : (rates[sub.type] || 1);
                        return total + (safeParseNum(sub.amount) * rate);
                    }, 0);
                }
                const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                return safeParseNum(asset.amount) * rate;
            };

            const calculatePnL = (amount, rate, costPrice, type, currentPrice) => {
                const cost = safeParseNum(costPrice);
                const qty = safeParseNum(amount);
                if (cost <= 0 || qty <= 0) return null;
                
                let currentTotal;
                if (type === 'STOCK') {
                    const price = safeParseNum(currentPrice);
                    if (price <= 0) return null; 
                    currentTotal = qty * price;
                } else {
                    currentTotal = qty * rate;
                }
                
                const costTotal = qty * cost; // Tutar hesaplaması birim maliyet * adettir!
                
                const profit = currentTotal - costTotal;
                const percentage = (profit / costTotal) * 100;
                return { profit, percentage, isProfit: profit >= 0, isNeutral: Math.abs(profit) < 0.01 };
            };

            const calculatePersonTotal = (assets) => assets.filter(a => !a.isHidden).reduce((total, asset) => total + calculateAssetValue(asset), 0);
            
            const visiblePortfolio = useMemo(() => portfolio.filter(p => !p.isHidden), [portfolio]);
            const grandTotal = useMemo(() => visiblePortfolio.reduce((acc, person) => acc + calculatePersonTotal(person.assets), 0), [visiblePortfolio, rates]);

            const calculateDistribution = () => {
                const tryEquivalent = { TRY: 0, USD: 0, EUR: 0, GRAM: 0, ATA: 0, STOCK: 0 };
                visiblePortfolio.forEach(person => {
                    person.assets.filter(a => !a.isHidden).forEach(asset => {
                        if (asset.subItems && asset.subItems.length > 0) {
                            asset.subItems.forEach(sub => {
                                const rate = sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || safeParseNum(sub.costPrice) || 0) : (rates[sub.type] || 1);
                                const value = safeParseNum(sub.amount) * rate;
                                tryEquivalent[sub.type] = (tryEquivalent[sub.type] || 0) + value;
                            });
                        } else {
                            const rate = asset.type === 'STOCK' ? (safeParseNum(asset.currentPrice) || safeParseNum(asset.costPrice) || 0) : (rates[asset.type] || 1);
                            const value = safeParseNum(asset.amount) * rate;
                            tryEquivalent[asset.type] = (tryEquivalent[asset.type] || 0) + value;
                        }
                    });
                });

                if (grandTotal === 0) return [];

                return Object.keys(tryEquivalent)
                    .filter(key => tryEquivalent[key] > 0)
                    .map(key => ({
                        type: key,
                        label: currencyLabels[key] || key,
                        percentage: ((tryEquivalent[key] / grandTotal) * 100).toFixed(1)
                    }))
                    .sort((a, b) => b.percentage - a.percentage);
            };
            const distribution = calculateDistribution();

            const formatMoney = (value) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(value) + " ₺";

            const togglePersonAccordion = (personId) => setExpandedPersons(prev => ({ ...prev, [personId]: !prev[personId] }));
            const toggleAssetAccordion = (assetId) => setExpandedAssets(prev => ({ ...prev, [assetId]: !prev[assetId] }));
            const updatePersonName = (personId, newName) => setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, person: newName } : p));
            const updatePortfolioAsset = (personId, assetId, updater) => setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? updater(asset) : asset) } : person));

            const addSubItem = (personId, assetId) => {
                updatePortfolioAsset(personId, assetId, asset => {
                    const subItems = [...(asset.subItems || [])];
                    subItems.push({ id: `sub-${Date.now() + 1}`, name: '', type: 'TRY', amount: '' });
                    return { ...asset, subItems };
                });
            };

            const removeSubItem = (e, personId, assetId, subItemId) => {
                e.stopPropagation();
                setDeleteTarget({ type: 'subItem', personId, assetId, subItemId });
            };
            const updateSubItem = (personId, assetId, subItemId, field, value) => updatePortfolioAsset(personId, assetId, asset => ({ ...asset, subItems: asset.subItems.map(sub => sub.id === subItemId ? { ...sub, [field]: value } : sub) }));
            const addAsset = (personId) => {
                const newId = `asset-${Date.now()}`;
                setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: [...person.assets, { id: newId, name: '', type: 'TRY', amount: '', subItems: [] }] } : person));
                setExpandedAssets(prev => ({ ...prev, [newId]: true }));
            };
            const removeAsset = (e, personId, assetId) => {
                e.stopPropagation();
                setDeleteTarget({ type: 'asset', personId, assetId });
            };

            const togglePersonVisibility = (personId) => {
                setPortfolio(prev => prev.map(p => p.id === personId ? { ...p, isHidden: !p.isHidden } : p));
            };

            const toggleAssetVisibility = (e, personId, assetId) => {
                e.stopPropagation();
                setPortfolio(prev => prev.map(person => person.id === personId ? { ...person, assets: person.assets.map(asset => asset.id === assetId ? { ...asset, isHidden: !asset.isHidden } : asset) } : person));
            };

            const removePerson = (e, personId) => {
                e.preventDefault();
                e.stopPropagation();
                setDeleteTarget({ type: 'person', personId });
            };

            const forceFetchStockPrice = async (personId, assetId, subId = null) => {
                const newPortfolio = JSON.parse(JSON.stringify(portfolio));
                const person = newPortfolio.find(p => p.id === personId);
                if (!person) return;
                const asset = person.assets.find(a => a.id === assetId);
                if (!asset) return;
                
                let target = subId ? asset.subItems.find(s => s.id === subId) : asset;
                if (!target || target.type !== 'STOCK' || !target.name) return;
                
                const ticker = target.name.split(' ')[0];
                const price = await fetchTurkishStockPrice(ticker);
                
                if (price) {
                    target.currentPrice = price;
                    target._lastFetchedTicker = ticker;
                    setPortfolio(newPortfolio);
                    showToast(`${ticker} fiyatı güncellendi`, 'success');
                } else {
                    showToast(`${ticker} için fiyat çekilemedi. Sembolü kontrol edin.`, 'error');
                }
            };

            const addNewPerson = () => {
                const newId = `person-${Date.now()}`;
                setPortfolio(prev => [...prev, { id: newId, person: '', assets: [] }]);
                setExpandedPersons(prev => ({ ...prev, [newId]: true }));
            };

            if (appState === 'loading_vault') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-4">
                        <i className="fa-solid fa-vault text-primary text-5xl animate-float opacity-80"></i>
                        <p className="text-emerald-300 font-semibold tracking-widest uppercase text-xs animate-pulse opacity-70">Bağlanıyor</p>
                    </div>
                );
            }

            if (appState === 'setup_github' || appState === 'set_password' || appState === 'enter_password') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="glass-card p-8 sm:p-10 rounded-[2rem] w-full max-w-sm relative animate-fade-in-up premium-border">
                            {appState === 'setup_github' && (
                                <form onSubmit={saveGithubConfig} className="flex flex-col gap-5">
                                    <div className="text-center mb-4">
                                        <i className="fa-solid fa-database text-5xl text-emerald-400 mb-4 opacity-90"></i>
                                        <h3 className="text-2xl font-bold text-white tracking-tight">Kasa Erişimi</h3>
                                        <p className="text-xs text-zinc-400 mt-2">Private Repository bilgilerini girin.</p>
                                    </div>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="text" value={formConfig.username} onChange={e => setFormConfig({ ...formConfig, username: e.target.value })} placeholder="GitHub Kullanıcı Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <input required type="text" value={formConfig.repo} onChange={e => setFormConfig({ ...formConfig, repo: e.target.value })} placeholder="Depo Adı" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <input required type="password" value={formConfig.token} onChange={e => setFormConfig({ ...formConfig, token: e.target.value })} placeholder="Erişim Token (PAT)" className="w-full glass-surface rounded-xl px-4 py-3 text-sm text-center text-white outline-none focus:border-primary/50" />
                                    <button type="submit" className="mt-2 py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">BAĞLA</button>
                                </form>
                            )}
                            {appState === 'set_password' && (
                                <form onSubmit={setupNewVault} className="flex flex-col gap-6 text-center relative">
                                    <i className="fa-solid fa-shield-halved text-5xl text-emerald-400 mb-2 opacity-90 animate-pulse"></i>
                                    <div>
                                        <h3 className="text-2xl font-bold text-white mb-2">Şifre Oluştur</h3>
                                        <p className="text-xs text-zinc-400">Verileriniz bu şifreyle saklanacak.</p>
                                    </div>
                                    {authError && <div className="text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="Şifre" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] font-bold focus:border-primary/50" />
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-lg active:scale-95 transition-all">BAŞLAT</button>
                                </form>
                            )}
                            {appState === 'enter_password' && (
                                <form onSubmit={handleAuth} className="flex flex-col gap-6 text-center relative">
                                    <i className="fa-solid fa-lock text-5xl text-white opacity-80 mb-2"></i>
                                    <h3 className="text-2xl font-bold text-white">Kasaya Giriş</h3>
                                    {authError && <div className="p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs text-center">{authError}</div>}
                                    <input required type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="······" className="w-full glass-surface rounded-xl px-4 py-4 text-center text-white outline-none text-xl tracking-[0.3em] focus:border-primary/50 font-bold" />
                                    <button type="submit" className="py-3.5 rounded-xl font-bold text-sm bg-white text-black shadow-lg active:scale-95 transition-all">KİLİDİ AÇ</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="mx-auto w-full max-w-[95%] xl:max-w-6xl pt-6 pb-20 relative z-10 animate-fade-in-up">

                    {/* Toast Notification */}
                    <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ease-out flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl premium-border backdrop-blur-xl ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-8 pointer-events-none'} ${toast.type === 'error' ? 'bg-red-500/20 border-red-500/30' : 'bg-emerald-500/20 border-emerald-500/30'}`}>
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center shrink-0 ${toast.type === 'error' ? 'bg-red-500/30 text-red-200' : 'bg-emerald-500/30 text-emerald-300'}`}>
                            <i className={`fa-solid text-[10px] ${toast.type === 'error' ? 'fa-triangle-exclamation' : 'fa-check'}`}></i>
                        </div>
                        <p className={`font-bold text-xs tracking-wide ${toast.type === 'error' ? 'text-red-100' : 'text-emerald-50'}`}>{toast.message}</p>
                    </div>

                    {/* Header */}
                    <header className="flex justify-between items-center pb-5 mb-8 border-b border-white/5">
                        <div className="flex gap-2">
                            <button onClick={lockVault} title="Kasayı Kilitle" className="w-10 h-10 rounded-full glass-surface flex items-center justify-center text-zinc-400 hover:text-amber-400 hover:bg-amber-500/10 transition-colors border border-transparent hover:border-amber-500/30">
                                <i className="fa-solid fa-lock text-sm"></i>
                            </button>
                            <button onClick={disconnectGithub} title="GitHub Bağlantısını Kes" className="w-10 h-10 rounded-full glass-surface flex items-center justify-center text-zinc-400 hover:text-red-400 hover:bg-red-500/10 transition-colors border border-transparent hover:border-red-500/30">
                                <i className="fa-solid fa-power-off text-sm"></i>
                            </button>
                        </div>
                        <div className="flex flex-col items-center">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center mb-2 shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                                <i className="fa-solid fa-shield-halved text-black text-lg"></i>
                            </div>
                            <h1 className="text-[10px] font-bold tracking-widest text-zinc-300 uppercase">Portföy Takip</h1>
                        </div>
                        <div className="flex items-center gap-2 sm:gap-3">
                            <span className={`text-[9px] sm:text-[10px] uppercase font-bold tracking-widest transition-opacity duration-300 flex items-center gap-1.5 ${isSaving ? 'opacity-100 text-emerald-400' : 'opacity-0'}`}>
                                <i className="fa-solid fa-cloud-arrow-up animate-bounce"></i> <span className="hidden sm:inline">Eşitleniyor...</span>
                            </span>
                            <button onClick={() => handleSaveToGithub(false)} disabled={isSaving} className={`flex items-center gap-2 font-bold text-[10px] sm:text-xs px-4 py-2.5 rounded-xl transition-all ${isSaving ? 'bg-primary text-black' : 'glass-surface text-primary border border-primary/30 hover:bg-primary/10'}`}>
                                <i className={`fa-solid ${isSaving ? 'fa-check' : 'fa-cloud-arrow-up'} text-sm`}></i>
                                <span className="hidden sm:inline">{isSaving ? 'KAYDEDİLDİ' : 'KAYDET'}</span>
                            </button>
                        </div>
                    </header>

                    {/* Total Balance */}
                    <div className="text-center py-4 mb-8 flex flex-col items-center px-2">
                        <div className="glass-surface px-4 py-2 rounded-full border border-white/10 inline-flex items-center gap-2 mb-3">
                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                            <p className="text-[10px] text-zinc-200 font-semibold tracking-widest uppercase">Toplam Varlık</p>
                        </div>
                        <h2 className="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-white via-zinc-200 to-emerald-800 font-numbers break-words max-w-full">
                            {formatMoney(grandTotal)}
                        </h2>
                    </div>

                    {/* Market Rates Grid */}
                    <div className="mb-10 glass-card p-5 sm:p-6 rounded-[2rem] max-w-3xl mx-auto premium-border shadow-2xl relative overflow-hidden group">
                        {/* Decorative glow inside card */}
                        <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3 pointer-events-none transition-opacity duration-700 opacity-50 group-hover:opacity-100"></div>
                        
                        <div className="flex justify-between items-center mb-5 px-2 relative z-10">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center">
                                    <i className="fa-solid fa-chart-line text-emerald-400 text-xs"></i>
                                </div>
                                <p className="text-[11px] font-black text-white uppercase tracking-widest">
                                    Canlı Piyasa
                                </p>
                            </div>
                            <button onClick={fetchLiveRates} disabled={isLoadingRates} className={`text-[10px] uppercase font-bold tracking-wider flex items-center justify-center gap-2 glass-surface w-28 py-2.5 rounded-xl transition-all shadow-sm active:scale-95 ${isLoadingRates ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/30' : 'text-zinc-300 hover:text-white hover:bg-white/10 hover:border-white/20 border-white/5'}`}>
                                <i className={`fa-solid fa-rotate-right ${isLoadingRates ? "fa-spin" : ""}`}></i> 
                                <span className="hidden sm:inline">YENİLE</span>
                            </button>
                        </div>
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 relative z-10">
                            {['USD', 'EUR', 'GRAM', 'ATA'].map(currency => {
                                const icons = { USD: 'fa-dollar-sign', EUR: 'fa-euro-sign', GRAM: 'fa-coins', ATA: 'fa-medal' };
                                const colors = { USD: 'text-green-400', EUR: 'text-blue-400', GRAM: 'text-amber-400', ATA: 'text-amber-500' };
                                const bgColors = { USD: 'bg-green-500/10', EUR: 'bg-blue-500/10', GRAM: 'bg-amber-500/10', ATA: 'bg-amber-500/10' };
                                
                                return (
                                    <div key={currency} className="glass-surface p-3 sm:p-4 rounded-2xl flex flex-col items-center border border-white/5 hover:border-white/20 transition-all hover:-translate-y-1 hover:shadow-xl hover:bg-white/[0.03] group/card relative overflow-hidden">
                                        <div className={`absolute -right-6 -top-6 w-20 h-20 rounded-full opacity-20 blur-xl ${bgColors[currency]} group-hover/card:opacity-40 transition-opacity duration-300 pointer-events-none`}></div>
                                        
                                        <div className="w-full flex items-center justify-center gap-2 mb-2 relative z-10">
                                            <i className={`fa-solid ${icons[currency]} ${colors[currency]} opacity-80 text-[10px]`}></i>
                                            <textarea
                                                rows={1}
                                                value={currencyLabels[currency] || currency}
                                                onChange={(e) => setCurrencyLabels(prev => ({ ...prev, [currency]: e.target.value }))}
                                                onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                                className="text-[9px] sm:text-[10px] text-zinc-300 font-bold tracking-widest uppercase bg-transparent text-center outline-none hover:text-white transition-colors border-b border-transparent focus:border-emerald-500/50 resize-none overflow-hidden max-w-[80%] leading-tight pb-0.5"
                                                style={{ minHeight: '16px' }}
                                                title="İsmi Değiştir"
                                            />
                                        </div>
                                        
                                        <div className="relative w-full z-10">
                                            <input
                                                type="number"
                                                value={rates[currency]}
                                                onChange={(e) => handleRateChange(currency, e.target.value)}
                                                className={`w-full text-xl sm:text-2xl font-black font-numbers outline-none bg-black/20 focus:bg-black/40 rounded-xl py-2 text-center transition-all border border-transparent focus:border-white/10 ${['GRAM', 'ATA'].includes(currency) ? 'text-amber-400' : 'text-white'}`}
                                            />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Asset Distribution Summary */}
                    {distribution.length > 0 && (
                        <div className="mb-10 max-w-3xl mx-auto flex flex-wrap justify-center gap-3 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                            {distribution.map(dist => (
                                <div key={dist.type} className="glass-surface px-4 py-2.5 rounded-2xl flex items-center gap-2.5 border border-transparent hover:border-white/10 transition-colors cursor-default">
                                    <div className={`w-2 h-2 rounded-full ${dist.type === 'TRY' ? 'bg-zinc-400' : dist.type === 'USD' ? 'bg-green-400' : dist.type === 'EUR' ? 'bg-blue-400' : 'bg-yellow-400'}`}></div>
                                    <span className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">{dist.label}</span>
                                    <span className="text-xs font-black text-white font-numbers">%{dist.percentage}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Portfolios Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 items-start">
                        {portfolio.map((person) => {
                            const personTotal = calculatePersonTotal(person.assets);
                            const isOpen = expandedPersons[person.id] !== false;

                            return (
                                <div key={person.id} className={`glass-card rounded-[2rem] transition-all duration-300 premium-border z-10 ${isOpen ? 'shadow-2xl border-white/10' : 'hover:border-white/10 shadow-lg'}`}>
