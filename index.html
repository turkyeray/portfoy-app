                                    <div onClick={() => togglePersonAccordion(person.id)} className={`p-5 sm:p-6 flex justify-between items-center cursor-pointer transition-colors ${isOpen ? 'bg-white/5 rounded-t-[2rem]' : 'rounded-[2rem]'}`}>
                                        <div className="flex flex-col flex-1 min-w-0 pr-3">
                                            <div className="relative w-full min-w-0 flex-1 pb-0.5">
                                                <div className="invisible whitespace-pre-wrap break-words text-lg sm:text-xl font-bold uppercase tracking-wide leading-tight p-0 m-0 w-full min-w-0 pointer-events-none">
                                                    {person.person || "İSİM GİRİNİZ"}
                                                </div>
                                                <DebouncedInput
                                                    as="textarea"
                                                    value={person.person}
                                                    onChange={(val) => updatePersonName(person.id, val)}
                                                    onClick={(e) => e.stopPropagation()}
                                                    className="absolute inset-0 w-full h-full bg-transparent text-lg sm:text-xl font-bold text-white uppercase tracking-wide leading-tight p-0 m-0 border-0 outline-none resize-none overflow-hidden"
                                                    placeholder="İSİM GİRİNİZ"
                                                    title={person.person}
                                                />
                                            </div>
                                            <div className="flex items-center gap-1.5 mt-0.5 pl-0.5">
                                                <div className="w-1.5 h-1.5 rounded-full bg-blue-400"></div>
                                                <p className="text-[9px] text-zinc-400 font-semibold uppercase tracking-widest">{person.assets.length} Varlık</p>
                                            </div>
                                        </div>
                                        <div className="text-right flex items-center gap-2 sm:gap-3 shrink-0">
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); togglePersonVisibility(person.id); }}
                                                className={`p-2 rounded-xl transition-all shadow-sm flex items-center justify-center shrink-0 border ${person.isHidden ? 'bg-red-500/10 text-red-400 border-red-500/20 hover:bg-red-500/20' : 'bg-white/5 text-zinc-400 border-white/5 hover:bg-white/10 hover:text-white'}`}
                                                title={person.isHidden ? "Hesaplamaya Dahil Et" : "Hesaplamadan Çıkar"}
                                            >
                                                <i className={`fa-solid ${person.isHidden ? 'fa-eye-slash' : 'fa-eye'} text-sm`}></i>
                                            </button>
                                            <div className="flex flex-col items-end">
                                                <span className={`text-sm sm:text-base font-bold font-numbers transition-colors ${person.isHidden ? 'text-zinc-500 line-through decoration-zinc-500/50' : 'text-white'}`}>{formatMoney(personTotal)}</span>
                                                {person.isHidden && <span className="text-[9px] text-red-400/80 uppercase tracking-wider font-semibold mt-0.5">Gizlendi</span>}
                                            </div>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ml-1 ${isOpen ? 'bg-white text-black rotate-180' : 'glass-surface text-zinc-400'}`}>
                                                <i className="fa-solid fa-chevron-down text-xs"></i>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Card Content (Assets) */}
                                    <div className={`accordion-content ${isOpen ? 'open' : ''}`}>
                                        <div className="px-4 sm:px-6 pb-6 pt-2 flex flex-col gap-4 border-t border-white/5">
                                            {person.assets.map((asset) => {
                                                const hasSubItems = asset.subItems && asset.subItems.length > 0;
                                                const assetValue = calculateAssetValue(asset);
                                                const isAssetOpen = expandedAssets[asset.id];

                                                return (
                                                    <div key={asset.id} className="glass-surface rounded-2xl border border-transparent hover:border-white/10 transition-all flex flex-col">

                                                        {/* Asset Header (Accordion Toggle) */}
                                                        <div onClick={() => toggleAssetAccordion(asset.id)} className="p-4 flex justify-between items-center cursor-pointer hover:bg-white/5 rounded-t-2xl transition-colors group">
                                                            <div className="flex items-center gap-2 flex-1 min-w-0 pr-2">
                                                                <div className="w-7 h-7 rounded-full bg-black/30 flex items-center justify-center shrink-0 group-hover:bg-emerald-500/20 transition-colors">
                                                                    <i className="fa-solid fa-wallet text-zinc-400 text-[10px] group-hover:text-emerald-400"></i>
                                                                </div>
                                                                <div className="relative w-full min-w-0 flex-1">
                                                                    <div className="invisible whitespace-pre-wrap break-words font-bold text-[11px] sm:text-sm leading-tight p-0 m-0 w-full min-w-0 pointer-events-none">
                                                                        {asset.name || "VARLIK ADI"}
                                                                    </div>
                                                                    <DebouncedInput
                                                                        as="textarea"
                                                                        value={asset.name}
                                                                        onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, name: val }))}
                                                                        onClick={(e) => e.stopPropagation()}
                                                                        title={asset.name}
                                                                        className="absolute inset-0 w-full h-full bg-transparent font-bold text-white text-[11px] sm:text-sm leading-tight p-0 m-0 border-0 outline-none placeholder:text-zinc-500 resize-none overflow-hidden"
                                                                        placeholder="VARLIK ADI"
                                                                    />
                                                                </div>
                                                                {asset.type === 'STOCK' && (
                                                                    <button 
                                                                        onClick={(e) => { e.stopPropagation(); forceFetchStockPrice(person.id, asset.id); }}
                                                                        className="p-1.5 rounded-lg text-emerald-400/80 hover:bg-emerald-500/20 hover:text-emerald-300 transition-colors shrink-0"
                                                                        title="Canlı Fiyatı Çek"
                                                                    >
                                                                        <i className="fa-solid fa-rotate-right text-[12px] shadow-sm"></i>
                                                                    </button>
                                                                )}
                                                            </div>
                                                            <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                                                                <button 
                                                                    onClick={(e) => toggleAssetVisibility(e, person.id, asset.id)}
                                                                    className={`p-1 rounded-md transition-all flex items-center justify-center shrink-0 border ${asset.isHidden ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-transparent text-zinc-500 hover:text-white border-transparent'}`}
                                                                    title={asset.isHidden ? "Hesaplamaya Dahil Et" : "Hesaplamadan Çıkar"}
                                                                >
                                                                    <i className={`fa-solid ${asset.isHidden ? 'fa-eye-slash' : 'fa-eye'} text-[10px]`}></i>
                                                                </button>
                                                                <div className="flex flex-col items-end">
                                                                    <span className={`text-[11px] sm:text-sm font-bold font-numbers transition-colors ${asset.isHidden ? 'text-zinc-500 line-through decoration-zinc-500/50' : 'text-emerald-400'}`}>{formatMoney(assetValue)}</span>
                                                                    {asset.isHidden && <span className="text-[7px] sm:text-[8px] text-red-400/80 uppercase tracking-wider font-semibold mt-[1px]">Gizlendi</span>}
                                                                    {hasSubItems && !isAssetOpen && !asset.isHidden && <div className="text-[8px] sm:text-[9px] text-zinc-500 font-semibold tracking-widest uppercase mt-[1px]">{asset.subItems.length} Kalem</div>}
                                                                </div>
                                                                <div className={`w-5 h-5 sm:w-6 sm:h-6 rounded-full flex items-center justify-center shrink-0 transition-transform duration-300 ml-0.5 sm:ml-1 ${isAssetOpen ? 'bg-white/20 text-white rotate-180' : 'text-zinc-500 group-hover:bg-white/10'}`}>
                                                                    <i className="fa-solid fa-chevron-down text-[9px]"></i>
                                                                </div>
                                                                <button onClick={(e) => { e.stopPropagation(); removeAsset(e, person.id, asset.id); }} className="p-1 sm:p-1.5 rounded-md text-zinc-500 hover:text-red-400 opacity-60 hover:opacity-100 z-20 relative ml-0.5 transition-colors">
                                                                    <i className="fa-solid fa-trash text-[10px] sm:text-[11px]"></i>
                                                                </button>
                                                            </div>
                                                        </div>

                                                        {/* Collapsible Content */}
                                                        <div className={`accordion-content ${isAssetOpen ? 'open' : ''}`}>
                                                            <div className="p-4 pt-1 flex flex-col gap-4 border-t border-white/5">

                                                                <div className="flex flex-col gap-3">
                                                                    {!hasSubItems ? (
                                                                        <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                            <div className="flex bg-black/40 border border-white/10 rounded-xl focus-within:border-emerald-500/50 transition-colors w-full relative">
                                                                                <DebouncedInput
                                                                                    type="number"
                                                                                    value={asset.amount}
                                                                                    onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, amount: val }))}
                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-white font-numbers font-bold text-sm py-2 px-1 text-center outline-none"
                                                                                    placeholder={asset.type === 'STOCK' ? "Adet" : "Miktar"}
                                                                                    title={asset.type === 'STOCK' ? "Adet" : "Miktar (Tutar)"}
                                                                                />
                                                                                <div className="w-[1px] bg-white/10"></div>
                                                                                
                                                                                {/* Hisse Güncel Fiyat, araya yerleşiyor */}
                                                                                {asset.type === 'STOCK' && (
                                                                                    <>
                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={asset.currentPrice || ''}
                                                                                            onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, currentPrice: val }))}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-blue-200 font-numbers font-bold text-sm py-2 px-1 text-center outline-none border-r border-white/10 placeholder:text-blue-500/50"
                                                                                            placeholder="Güncel"
                                                                                            title="Güncel Fiyat (₺)"
                                                                                        />
                                                                                    </>
                                                                                )}

                                                                                <DebouncedInput
                                                                                    type="number"
                                                                                    value={asset.costPrice || ''}
                                                                                    onChange={(val) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, costPrice: val }))}
                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-emerald-100 font-numbers font-bold text-sm py-2 px-1 text-center outline-none border-r border-white/10"
                                                                                    placeholder="Maliyet"
                                                                                    title="Birim Maliyet (₺)"
                                                                                />
                                                                                <CustomSelect
                                                                                    value={asset.type}
                                                                                    options={currencyLabels}
                                                                                    onChange={(newVal) => updatePortfolioAsset(person.id, asset.id, a => ({ ...a, type: newVal }))}
                                                                                    className="flex-[1.5] bg-black/30 text-zinc-300 min-w-[55px]"
                                                                                />
                                                                            </div>

                                                                            {asset.costPrice && asset.type !== 'TRY' && (() => {
                                                                                const pnl = calculatePnL(asset.amount, rates[asset.type], asset.costPrice, asset.type, asset.currentPrice);
                                                                                if (!pnl) return null;
                                                                                return (
                                                                                    <div className="flex justify-end pr-1 mt-0.5">
                                                                                        <span className={`text-[10px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isNeutral ? 'bg-zinc-500/20 text-zinc-400' : pnl.isProfit ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                            {pnl.isNeutral ? '' : pnl.isProfit ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                        </span>
                                                                                    </div>
                                                                                );
                                                                            })()}
                                                                        </div>
                                                                    ) : null}

                                                                </div>

                                                                {hasSubItems && (
                                                                    <div className="flex flex-col gap-2 pl-2 border-l-2 border-white/10 ml-2 mt-1 mb-2">
                                                                        {asset.subItems.map((sub) => (
                                                                            <div key={sub.id} className="flex flex-col gap-2 bg-black/20 p-2.5 rounded-xl border border-white/5 relative">
                                                                                <div className="flex items-center justify-between gap-2">
                                                                                    <div className="flex items-center gap-2 flex-1 min-w-0">
                                                                                        <DebouncedInput
                                                                                            type="text"
                                                                                            value={sub.name}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'name', val)}
                                                                                            className="bg-transparent py-1 px-1 rounded-md text-xs font-semibold text-zinc-200 outline-none flex-1 min-w-0 placeholder:text-zinc-600 focus:bg-white/5 transition-colors overflow-hidden text-ellipsis whitespace-nowrap"
                                                                                            placeholder="Kalem Adı"
                                                                                            title={sub.name}
                                                                                        />
                                                                                        {sub.type === 'STOCK' && (
                                                                                            <button 
                                                                                                onClick={(e) => { e.stopPropagation(); forceFetchStockPrice(person.id, asset.id, sub.id); }}
                                                                                                className="p-1 rounded-md text-emerald-400/80 hover:bg-emerald-500/20 hover:text-emerald-300 transition-colors shrink-0"
                                                                                                title="Canlı Fiyatı Çek"
                                                                                            >
                                                                                                <i className="fa-solid fa-rotate-right text-[12px] shadow-sm"></i>
                                                                                            </button>
                                                                                        )}
                                                                                    </div>
                                                                                    <button 
                                                                                        onClick={(e) => removeSubItem(e, person.id, asset.id, sub.id)} 
                                                                                        className="p-1.5 rounded-md transition-colors flex items-center justify-center text-zinc-500 hover:text-red-400"
                                                                                    >
                                                                                        <i className="fa-solid fa-trash text-[10px]"></i>
                                                                                    </button>
                                                                                </div>

                                                                                <div className="flex flex-col gap-1 w-full relative z-[100]">
                                                                                    <div className="flex glass-surface border border-white/10 rounded-lg focus-within:border-white/30 transition-colors w-full relative">
                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={sub.amount}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'amount', val)}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-white font-numbers font-bold text-xs py-2 px-1 text-center outline-none"
                                                                                            placeholder={sub.type === 'STOCK' ? 'Adet' : 'Miktar'}
                                                                                            title={sub.type === 'STOCK' ? 'Adet' : 'Miktar (Tutar)'}
                                                                                        />
                                                                                        <div className="w-[1px] bg-white/10"></div>
                                                                                        
                                                                                        {sub.type === 'STOCK' && (
                                                                                            <>
                                                                                                <DebouncedInput
                                                                                                    type="number"
                                                                                                    value={sub.currentPrice || ''}
                                                                                                    onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'currentPrice', val)}
                                                                                                    className="flex-[2.5] min-w-0 bg-transparent text-blue-200 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-white/10 placeholder:text-blue-500/50"
                                                                                                    placeholder="Güncel"
                                                                                                    title="Güncel Fiyat (₺)"
                                                                                                />
                                                                                            </>
                                                                                        )}

                                                                                        <DebouncedInput
                                                                                            type="number"
                                                                                            value={sub.costPrice || ''}
                                                                                            onChange={(val) => updateSubItem(person.id, asset.id, sub.id, 'costPrice', val)}
                                                                                            className="flex-[2.5] min-w-0 bg-transparent text-emerald-100 font-numbers font-bold text-xs py-2 px-1 text-center outline-none border-r border-white/10"
                                                                                            placeholder="Maliyet"
                                                                                            title="Birim Maliyet (₺)"
                                                                                        />
                                                                                        <CustomSelect
                                                                                            value={sub.type}
                                                                                            options={currencyLabels}
                                                                                            onChange={(newVal) => updateSubItem(person.id, asset.id, sub.id, 'type', newVal)}
                                                                                            className="flex-[1.5] bg-black/30 text-white min-w-[55px]"
                                                                                        />
                                                                                    </div>

                                                                                    <div className="flex justify-between items-center pr-1 mt-0.5">
                                                                                        {/* Proportion Badge */}
                                                                                        {assetValue > 0 ? (
                                                                                            <span className="text-[9.5px] font-semibold text-zinc-400 tracking-wide px-1">
                                                                                                %{( ( (sub.type === 'STOCK' ? (safeParseNum(sub.currentPrice) || rates.STOCK || 1) : (rates[sub.type] || 1)) * safeParseNum(sub.amount) / assetValue ) * 100).toFixed(1)} pay
                                                                                            </span>
                                                                                        ) : <span />}

                                                                                        {sub.costPrice && sub.type !== 'TRY' && (() => {
                                                                                            const pnl = calculatePnL(sub.amount, rates[sub.type], sub.costPrice, sub.type, sub.currentPrice);
                                                                                            if (!pnl) return null;
                                                                                            return (
                                                                                                <span className={`text-[9.5px] font-bold tracking-widest px-1.5 py-0.5 rounded-md ${pnl.isNeutral ? 'bg-zinc-500/20 text-zinc-400' : pnl.isProfit ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                                                    {pnl.isNeutral ? '' : pnl.isProfit ? '+' : ''}{pnl.percentage.toFixed(1)}% ({formatMoney(pnl.profit)})
                                                                                                </span>
                                                                                            );
                                                                                        })()}
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                )}

                                                                <button onClick={() => addSubItem(person.id, asset.id)} className="w-full text-[10px] text-zinc-300 hover:text-white font-bold tracking-widest uppercase flex items-center justify-center gap-1.5 glass-surface px-4 py-2.5 rounded-xl transition-colors hover:bg-white/5 border border-transparent hover:border-white/10 mt-1">
                                                                    <i className="fa-solid fa-plus text-[9px]"></i> Kalem Ekle
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}

                                            {/* Footer Actions (New Asset & Delete Person) */}
                                            <div className="flex flex-row justify-between items-center gap-3 pt-4 border-t border-white/5 mt-2 relative z-50">
                                                <button 
                                                    onClick={(e) => removePerson(e, person.id)} 
                                                    className="text-[10px] font-bold uppercase tracking-widest px-5 py-3.5 rounded-xl transition-all shrink-0 z-50 relative cursor-pointer flex items-center justify-center text-zinc-400 hover:text-red-400 glass-surface hover:bg-red-500/10 hover:border-red-500/30"
                                                >
                                                    KİŞİYİ SİL
                                                </button>
                                                <button onClick={() => addAsset(person.id)} className="flex-1 text-[10px] text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 font-bold uppercase tracking-widest py-3 rounded-xl hover:bg-emerald-500 hover:text-black transition-all shadow-sm">
                                                    + YENİ VARLIK
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Add New Person Button */}
                        <div className="pt-2 pb-10">
                            <button onClick={addNewPerson} className="w-full py-10 border border-dashed border-white/20 hover:border-emerald-500/50 glass-card rounded-[2rem] text-[10px] font-bold uppercase tracking-widest text-zinc-400 hover:text-white transition-all flex flex-col items-center gap-4 hover:bg-white/5 group">
                                <div className="w-12 h-12 rounded-full glass-surface flex items-center justify-center group-hover:bg-emerald-500 group-hover:text-black transition-colors">
                                    <i className="fa-solid fa-plus text-lg"></i>
                                </div>
                                YENİ PORTFÖY
                            </button>
                        </div>
                    </div>

                    {/* Delete Target Modal */}
                    {deleteTarget && (
                        <div className="fixed inset-0 z-[99999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card p-6 sm:p-8 rounded-[2rem] max-w-sm w-full border border-white/10 shadow-2xl animate-fade-in-up">
                                <div className="flex flex-col items-center text-center gap-5">
                                    <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-2 premium-border">
                                        <i className="fa-solid fa-triangle-exclamation text-3xl text-red-500 animate-pulse"></i>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-white tracking-tight">Emin misiniz?</h3>
                                    <p className="text-sm text-zinc-400 -mt-2 leading-relaxed">
                                        {deleteTarget.type === 'person' && "Bu kişiyi ve ona bağlı tüm varlıkları silmek istediğinize emin misiniz? Bu işlem geri alınamaz."}
                                        {deleteTarget.type === 'asset' && "Bu varlığı (ve varsa alt kalemlerini) kalıcı olarak silmek istediğinize emin misiniz?"}
                                        {deleteTarget.type === 'subItem' && "Bu alt kalemi silmek istediğinize emin misiniz?"}
                                    </p>
                                    <div className="flex w-full gap-3 mt-4">
                                        <button onClick={() => setDeleteTarget(null)} className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10 tracking-widest">İPTAL</button>
                                        <button 
                                            onClick={() => {
                                                if (deleteTarget.type === 'person') {
                                                    setPortfolio(prev => prev.filter(p => p.id !== deleteTarget.personId));
                                                    setExpandedPersons(prev => { const newState = { ...prev }; delete newState[deleteTarget.personId]; return newState; });
                                                } else if (deleteTarget.type === 'asset') {
                                                    setPortfolio(prev => prev.map(p => p.id === deleteTarget.personId ? { ...p, assets: p.assets.filter(a => a.id !== deleteTarget.assetId) } : p));
                                                } else if (deleteTarget.type === 'subItem') {
                                                    updatePortfolioAsset(deleteTarget.personId, deleteTarget.assetId, asset => ({ ...asset, subItems: asset.subItems.filter(s => s.id !== deleteTarget.subItemId) }));
                                                }
                                                setDeleteTarget(null);
                                            }} 
                                            className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-red-500/20 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/30 transition-colors tracking-widest"
                                        >
                                            SİL GİTSİN
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Disconnect Modal */}
                    {showDisconnectModal && (
                        <div className="fixed inset-0 z-[99999] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="glass-card p-6 sm:p-8 rounded-[2rem] max-w-sm w-full border border-white/10 shadow-2xl animate-fade-in-up">
                                <div className="flex flex-col items-center text-center gap-5">
                                    <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mb-2 premium-border">
                                        <i className="fa-solid fa-power-off text-3xl text-red-500 animate-pulse"></i>
                                    </div>
                                    <h3 className="text-xl sm:text-2xl font-bold text-white tracking-tight">Bağlantıyı Kes</h3>
                                    <p className="text-sm text-zinc-400 -mt-2 leading-relaxed">
                                        Cihaz kayıtlı GitHub erişimini unutacak. Kasaya tekrar erişmek için bilgilerinizi yeniden girmelisiniz. Emin misiniz?
                                    </p>
                                    <div className="flex w-full gap-3 mt-4">
                                        <button onClick={() => setShowDisconnectModal(false)} className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-white/5 hover:bg-white/10 text-white transition-colors border border-white/10 tracking-widest">İPTAL</button>
                                        <button 
                                            onClick={() => {
                                                localStorage.removeItem('gh_config_v5');
                                                window.location.reload();
                                            }} 
                                            className="flex-1 py-3.5 rounded-xl font-bold text-[11px] sm:text-xs bg-red-500/20 hover:bg-red-500 hover:text-white text-red-400 border border-red-500/30 transition-colors tracking-widest"
                                        >
                                            ÇIKIŞ YAP
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PortfolioApp />);
    </script>
</body>

</html>
